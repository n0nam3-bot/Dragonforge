# Movement Profiles
movements:
  - name: "Idle"
    duration: 10
    cycle:
      - {part: "head", action: "breathe", angle: [0, 0, 0]}
      - {part: "left_arm", action: "swing", angle: [0, 15, -5, 0]}
      - {part: "right_arm", action: "swing", angle: [0, -15, 5, 0]}
      - {part: "left_leg", action: "shift", angle: [0, 5, 0, -5]}
      - {part: "right_leg", action: "shift", angle: [0, -5, 5, 0]}

  - name: "Walk"
    duration: 20
    cycle:
      # Add walk cycle steps here
  - name: "Attack"
    duration: 15
