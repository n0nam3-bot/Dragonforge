<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f6ef7">
<title>SpriteSmith Studio</title>
<style>
:root{--bg:#f4f7fb;--panel:rgba(255,255,255,.88);--text:#152033;--muted:#637086;--border:#dbe3ef;--primary:#4f6ef7;--primary2:#7c5cff;--shadow:0 18px 50px rgba(28,44,75,.10);--r:28px}
*{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(79,110,247,.12),transparent 28%),radial-gradient(circle at bottom right,rgba(124,92,255,.10),transparent 22%),linear-gradient(135deg,#f9fbff 0%,#eef4ff 55%,#f9fbff 100%)}
button,input,select,textarea{font:inherit} button{cursor:pointer} #app{min-height:100%}
.shell{max-width:1600px;margin:0 auto;padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.topbar,.panel{border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(14px);box-shadow:var(--shadow)}
.topbar{display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;padding:20px 22px;border-radius:calc(var(--r) + 8px);margin-bottom:14px}
.brand{display:inline-flex;align-items:center;gap:8px;color:var(--primary);font-size:12px;letter-spacing:.25em;text-transform:uppercase;font-weight:800}.dot{width:10px;height:10px;border-radius:999px;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 0 0 6px rgba(79,110,247,.1)}
h1{margin:8px 0 6px;font-size:clamp(28px,3vw,44px);line-height:1.05;letter-spacing:-.03em}.lede{margin:0;max-width:980px;color:var(--muted);font-size:14px;line-height:1.65}
.actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.btn{border:1px solid var(--border);background:#fff;color:var(--text);padding:12px 16px;border-radius:16px;font-weight:700;display:inline-flex;gap:10px;align-items:center;box-shadow:0 8px 18px rgba(28,44,75,.06)}.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}.btn.success{background:linear-gradient(135deg,#17a763,#0d8f52);color:#fff;border-color:transparent}
.layout{display:grid;grid-template-columns:340px minmax(0,1fr) 360px;gap:14px}.col{display:flex;flex-direction:column;gap:14px}.panel{border-radius:var(--r);overflow:hidden}.ph{display:flex;align-items:center;gap:12px;padding:18px 18px 0;font-weight:800;color:#33415c}.pi{width:34px;height:34px;border-radius:14px;display:grid;place-items:center;background:#f1f5ff;border:1px solid #e2e9fb;color:#5267c9;flex:0 0 auto}.pb{padding:16px 18px 18px}
.stack{display:grid;gap:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#6d7a8e;margin:0 0 6px;font-weight:800}.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:16px;background:#fff;padding:11px 12px;color:var(--text);outline:none}.field textarea{resize:vertical;min-height:88px}
.range .row{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#6d7a8e;font-weight:800}.range input[type=range]{width:100%;accent-color:var(--primary)}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--border);background:#fff;padding:9px 12px;border-radius:999px;font-size:13px;font-weight:700;color:#41516b}.chip.on{background:#dfe8ff;border-color:#b7c9ff;color:#2640a8}
.previewWrap{display:grid;grid-template-columns:minmax(0,1fr) 240px;gap:14px}.canvasCard{padding:14px;border-radius:24px;border:1px solid var(--border);background:linear-gradient(180deg,#fdfdff,#eef3ff)}.canvasCard.sheet{background:linear-gradient(180deg,#fdfdff,#f3f6fc)}
.canvasFrame{width:100%;aspect-ratio:1/1;border-radius:20px;overflow:hidden;background:linear-gradient(45deg,rgba(0,0,0,.05) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.05) 75%,rgba(0,0,0,.05)),linear-gradient(45deg,rgba(0,0,0,.05) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.05) 75%,rgba(0,0,0,.05));background-size:24px 24px;background-position:0 0,12px 12px}.canvasFrame canvas{width:100%;height:100%;display:block}
.meta{display:grid;gap:12px}.card{border:1px solid var(--border);background:#fff;border-radius:24px;padding:14px}.kicker{text-transform:uppercase;letter-spacing:.12em;font-size:11px;font-weight:800;color:#6d7a8e}.title{font-size:22px;font-weight:900;margin-top:4px}.sub{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.6}
.poseGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.poseBtn{border:1px solid var(--border);background:#fff;border-radius:22px;padding:10px}.poseBtn.on{border-color:#7f96f9;background:#eef3ff}.poseName{text-align:center;font-size:12px;font-weight:800;color:#556378;margin-top:8px}
.specs{display:grid;gap:10px}.spec{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border:1px solid var(--border);background:#fff;border-radius:18px;padding:12px 14px}.spec .l{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#73819a;font-weight:800}.spec .v{text-align:right;font-size:13px;color:var(--text);max-width:62%}
.notice{border-radius:18px;padding:12px 14px;font-size:13px;line-height:1.6;background:#f4f7ff;border:1px solid #d8e2ff;color:#2d3f8a}.error{background:#fff0f0;border-color:#ffd0d0;color:#8a2d2d}.upload{border:1.5px dashed #bfd0ef;background:#fbfcff;border-radius:22px;padding:14px;text-align:center}.upload small{display:block;color:var(--muted);line-height:1.5}
.tools{display:flex;flex-wrap:wrap;gap:10px}.inline{display:flex;align-items:center;gap:8px;font-size:13px;color:#41516b;font-weight:700}.inline input{accent-color:var(--primary)}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:9999;background:#0f172a;color:#fff;padding:12px 16px;border-radius:999px;box-shadow:0 15px 35px rgba(0,0,0,.18);font-size:13px;font-weight:700;max-width:92vw;text-align:center}
@media (max-width:1280px){.layout,.previewWrap{grid-template-columns:1fr}}
@media (max-width:900px){.grid2,.poseGrid{grid-template-columns:1fr 1fr}}
@media (max-width:620px){.shell{padding:12px}.topbar{padding:16px}.grid2,.poseGrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(() => {
  'use strict';
  const app = document.getElementById('app');
  const poses = ['Idle','Walk','Run','Jump','Attack','Cast','Hurt','Victory'];
  const directions = ['Down','Left','Right','Up'];
  const storageKey = 'spritesmith-studio-ready-v1';
  const defaults = {
    name:'Nova', theme:'default', body:'balanced', hair:'Brown', skin:'Warm', eyes:'Brown',
    top:'Tee', bottom:'Pants', shoes:'Boots', headwear:'None', accessory:'None',
    hairStyle:'Short', eyeStyle:'Round', facial:'Clean', pose:0, dir:0,
    speed:1.4, frames:8, frameSize:128, imageScale:1, imageX:0, imageY:0, imageRotate:0, opacity:1,
    showGuides:true, bgTransparent:false, sheetColumns:4

  const bodyPresets = {

    balanced:{h:1, head:1, shoulders:1, waist:1, legs:1},
    athletic:{h:1.03, head:.95, shoulders:1.08, waist:.95, legs:1.05},

  const themeMap = {
    default:{bg:'#f4f6fb', a:'#5b7cfa', b:'#9b5de5', dark:'#253041', light:'#fff'},
    sunset:{bg:'#f8efe6', a:'#e76f51', b:'#f4a261', dark:'#2f2e41', light:'#fff7f1'},
    neon:{bg:'#12131a', a:'#7c5cff', b:'#2de2e6', dark:'#e9ecf1', light:'#1a1c26'},

  const hairMap = {Black:'#1f1f26', Brown:'#5c3d2e', Blonde:'#d9bd6b', Red:'#a93c2e', White:'#eceff6', Blue:'#4b6bd9', Pink:'#dd74b9', Green:'#59b167'};
  const state = load() || Object.assign({}, defaults, { abilities: {Dash:true,'Double Jump':true,Shield:false,Fire:false,Ice:false,Fly:false,Stealth:false,Heal:false} });
  let img = null, imgUrl = '', previewCanvas = null, previewCtx = null, sheetCanvas = null, sheetCtx = null;

  function load(){ try { return JSON.parse(localStorage.getItem(storageKey) || 'null'); } catch { return null; } }
  function save(){ try { localStorage.setItem(storageKey, JSON.stringify(state)); } catch {} }
  function set(p){ Object.assign(state, p); save(); render(); }
  function setAbility(name){ state.abilities[name] = !state.abilities[name]; save(); render(); }
  function activeAbilities(){ return Object.keys(state.abilities).filter(k => state.abilities[k]); }
  function cls(){ const a = activeAbilities(); if(a.includes('Fly')) return 'Skyborne'; if(a.includes('Fire') || a.includes('Ice')) return 'Elemental'; if(a.includes('Shield')) return 'Guardian'; return 'Adventurer'; }
  function spec(){ return { app:'SpriteSmith Studio', version:1, character:{ name:state.name, theme:state.theme, body:state.body, hair:state.hair, skin:state.skin, eyes:state.eyes, top:state.top, bottom:state.bottom, shoes:state.shoes, headwear:state.headwear, accessory:state.accessory, hairStyle:state.hairStyle, eyeStyle:state.eyeStyle, facial:state.facial, pose:poses[state.pose], dir:directions[state.dir], abilities:activeAbilities(), class:cls() }, source:{ mode:'single', image:!!img }, settings:{ speed:state.speed, frames:state.frames, frameSize:state.frameSize, imageScale:state.imageScale, imageX:state.imageX, imageY:state.imageY, imageRotate:state.imageRotate, opacity:state.opacity, bgTransparent:state.bgTransparent, showGuides:state.showGuides, sheetColumns:state.sheetColumns }, generatedAt:new Date().toISOString() }; }

  function motion(pose, frame, dir){ const t = frame / Math.max(1, state.frames - 1), w = Math.sin(t * Math.PI * 2), s = dir === 1 ? -1 : dir === 2 ? 1 : 0; let x=0,y=0,r=0,sc=1; if(pose==='Idle'){ y = Math.sin(t*Math.PI*2)*2; r = Math.sin(t*Math.PI*2)*.02; } else if(pose==='Walk'){ x=w*6*s; y=Math.abs(w)*-3; r=w*.04*s; } else if(pose==='Run'){ x=w*10*s; y=Math.abs(w)*-6; r=w*.08*s; sc=1.02; } else if(pose==='Jump'){ y=-18*Math.sin(t*Math.PI); r=-.05; sc=1.02-Math.sin(t*Math.PI)*.04; } else if(pose==='Attack'){ x=Math.sin(t*Math.PI)*7*s; r=Math.sin(t*Math.PI)*.08*s; } else if(pose==='Cast'){ y=Math.sin(t*Math.PI*2)*3; r=Math.sin(t*Math.PI*2)*.03; } else if(pose==='Hurt'){ x=Math.sin(t*Math.PI*10)*3; r=Math.sin(t*Math.PI*10)*.05; } else if(pose==='Victory'){ y=-6+Math.sin(t*Math.PI*2)*2; r=Math.sin(t*Math.PI*2)*.03; } return {x,y,r,sc}; }

  function drawSprite(ctx, w, h, poseIndex, frameIndex, dirIndex, allowImage=true){ const p = palette(); const body = bodyPresets[state.body] || bodyPresets.balanced; const pose = poses[poseIndex]; const m = motion(pose, frameIndex, dirIndex); const baseX = w * 0.5 + m.x; const baseY = m.y; const skin = skinMap[state.skin] || skinMap.Warm; const hair = hairMap[state.hair] || hairMap.Brown; const clothTop = state.top === 'Armor' ? p.b : state.top === 'Robe' ? p.light : p.a; const clothBottom = state.bottom === 'Armor Pants' ? p.b : state.bottom === 'Skirt' ? p.light : p.dark; const shoe = state.shoes === 'Sandals' ? p.b : p.dark; const cloak = state.accessory === 'Cape' ? p.b : state.accessory === 'Scarf' ? p.a : null; const active = activeAbilities();

    const bodyY = h*0.57 + baseY, headY = h*0.29 + baseY, bodyW = 44*body.shoulders*(w/256), waistW = 28*body.waist*(w/256), headR = 32*body.head*(w/256), topH = 68*body.h*(h/256), legH = 76*body.legs*(h/256), legW = 16*(w/256); const moving = pose==='Walk' || pose==='Run', jump = pose==='Jump', fight = pose==='Attack' || pose==='Hurt', cast = pose==='Cast', win = pose==='Victory'; const armShift = fight ? 18 : cast ? 10 : moving ? (frameIndex % 2 ? 7 : -7) : 0; const legShift = moving ? (frameIndex % 2 ? 10 : -10) : jump ? 6 : 0; const bob = moving ? (frameIndex % 2 ? 3 : -3) : jump ? -10 : win ? -5 : 0; const y = baseY + bob;
    if (cloak) { ctx.fillStyle = cloak; ctx.globalAlpha = 0.84; ctx.beginPath(); ctx.moveTo(baseX-bodyW*0.58, bodyY-18+y); ctx.quadraticCurveTo(baseX-bodyW*0.8, bodyY+20+y, baseX-bodyW*0.72, bodyY+72+y); ctx.lineTo(baseX+bodyW*0.72, bodyY+72+y); ctx.quadraticCurveTo(baseX+bodyW*0.8, bodyY+20+y, baseX+bodyW*0.58, bodyY-18+y); ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1; }

    if (active.includes('Fire') && cast) { ctx.fillStyle = '#ff9f1c'; ctx.globalAlpha = .9; ctx.beginPath(); ctx.moveTo(baseX+bodyW*0.78, bodyY+8+y); ctx.quadraticCurveTo(baseX+bodyW*1.02, bodyY-8+y, baseX+bodyW*1.05, bodyY+20+y); ctx.quadraticCurveTo(baseX+bodyW*1.01, bodyY+40+y, baseX+bodyW*0.75, bodyY+18+y); ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1; }
