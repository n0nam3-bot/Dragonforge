<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpriteSync Animator Demo (GH Pages)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎨 SpriteSync Animator Demo</h1>
        <p>Client-Side Prototype - No server required! Upload an image to start the process.</p>
    </header>

    <div class="container">
        
        <!-- STEP 1: UPLOAD AND CONTROLS -->
        <div class="control-panel">
            <h2>Step 1: Upload & Select Pose</h2>
            <input type="file" id="imageUpload" accept="image/*">

            <div class="controls">
                <label for="poseSelect">Pose Type:</label>
                <select id="poseSelect">
                    <option value="idle">Idle</option>
                    <option value="walk">Walk Cycle (Demo)</option>
                    <option value="attack">Attack (Demo)</option>
                </select>

                <label for="facingSelect">Facing Direction:</label>
                <select id="facingSelect">
                    <option value="right">Right (Facing Forward)</option>
                    <option value="left">Left (Facing Backward)</option>
                </select>
                
                <button id="generateBtn">▶️ Generate Animation</button>
            </div>
        </div>
        
        <!-- STEP 2: THE EDITOR AREA -->
        <div class="editor-area">
            <h2>Step 2: Character Rig Editor</h2>
            <div class="canvas-container">
                <!-- Canvas for drawing/displaying the character -->
                <canvas id="characterCanvas" width="600" height="400"></canvas>
            </div>
        </div>
    </body>
</html>
