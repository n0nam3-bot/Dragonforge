<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DragonBones Web Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111;--bg1:#1a1a1a;--bg2:#222;--bg3:#2d2d2d;--bg4:#383838;
  --br:#333;--br2:#444;--txt:#d4d4d4;--txt2:#888;--txt3:#4a4a4a;
  --acc:#e8811a;--acc2:#f5a445;--acc3:#6b3610;
  --blue:#3b82f6;--blue2:#1d4ed8;--green:#22c55e;--red:#ef4444;
  --yellow:#fbbf24;
}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
body{background:var(--bg);color:var(--txt);font:13px/1.4 -apple-system,'Segoe UI',Arial,sans-serif;display:flex;flex-direction:column}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ld-logo{font-size:30px;font-weight:800;color:var(--acc);letter-spacing:3px}
.ld-bar{width:200px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));animation:lda .8s ease forwards}
.ld-err{color:var(--red);font-size:12px;max-width:400px;text-align:center;line-height:1.6;padding:12px}
@keyframes lda{0%{width:0}100%{width:100%}}

/* Top bar */
#bar{height:40px;background:var(--bg1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;overflow-x:auto}
#bar::-webkit-scrollbar{display:none}
.btn{height:30px;padding:0 12px;background:var(--bg3);border:1px solid var(--br);border-radius:5px;color:var(--txt2);cursor:pointer;font:12px/1 inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.btn:hover{background:var(--bg4);color:var(--txt);border-color:var(--br2)}
.btn:active{opacity:.75}
.btn.primary{background:var(--blue2);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:var(--blue)}
.btn.accent{background:var(--acc3);border-color:var(--acc);color:var(--acc2)}
.btn.accent:hover{background:#7c4214}
.btn.success{background:#14532d;border-color:var(--green);color:var(--green)}
.btn.danger{background:#450a0a;border-color:var(--red);color:#fca5a5}
.btn.danger:hover{background:#5c1010}
.btn.sm{height:26px;padding:0 8px;font-size:11px}
.sep{width:1px;height:20px;background:var(--br);flex-shrink:0}
.logo{font-size:13px;font-weight:700;color:var(--acc);flex-shrink:0}
.modesw{display:flex;background:var(--bg);border:1px solid var(--br);border-radius:5px;overflow:hidden;flex-shrink:0}
.modebtn{padding:4px 12px;background:transparent;border:none;color:var(--txt2);cursor:pointer;font:12px/1 inherit}
.modebtn.on{background:var(--acc3);color:var(--acc2)}
.modebtn:hover:not(.on){color:var(--txt)}

/* Tools */
#tools{height:40px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 8px;gap:3px;flex-shrink:0;overflow-x:auto}
#tools::-webkit-scrollbar{display:none}
.tool{min-width:34px;height:32px;background:transparent;border:1px solid transparent;border-radius:5px;color:var(--txt2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;position:relative}
.tool:hover{background:var(--bg4);border-color:var(--br);color:var(--txt)}
.tool.on{background:var(--acc3);border-color:var(--acc);color:var(--acc2)}
.tool:active{opacity:.75}
.tool-sep{width:1px;height:22px;background:var(--br);margin:0 3px;flex-shrink:0}

/* Main */
#main{flex:1;display:flex;overflow:hidden;min-height:0;position:relative}

/* Left panel */
#left{width:220px;background:var(--bg1);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ptabs{display:flex;background:var(--bg);border-bottom:1px solid var(--br);flex-shrink:0}
.ptab{flex:1;padding:8px 4px;text-align:center;font-size:11px;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent}
.ptab.on{color:var(--txt);border-bottom-color:var(--acc)}
.plist{flex:1;overflow-y:auto}
.plist::-webkit-scrollbar{width:5px}
.plist::-webkit-scrollbar-track{background:var(--bg1)}
.plist::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
.plist-hdr{padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.plist-hdr span{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.plist-btns{display:flex;gap:4px}
.plist-btn{padding:2px 8px;background:var(--bg3);border:1px solid var(--br);border-radius:3px;color:var(--txt2);cursor:pointer;font:12px/1 inherit;min-height:24px}
.plist-btn:hover{background:var(--bg4);color:var(--txt)}
.row{display:flex;align-items:center;padding:6px 10px;cursor:pointer;gap:6px;min-height:32px;border-bottom:1px solid rgba(255,255,255,.03)}
.row:hover{background:var(--bg3)}
.row.sel{background:var(--blue2)}
.row.sel:hover{background:var(--blue)}
.row-icon{font-size:12px;flex-shrink:0}
.row-label{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-tag{font-size:10px;color:var(--txt3);flex-shrink:0}
.row-vis{font-size:11px;opacity:0;cursor:pointer;flex-shrink:0;padding:3px;min-width:20px;text-align:center}
.row:hover .row-vis,.row.sel .row-vis{opacity:1}
.empty{padding:20px 12px;color:var(--txt3);font-size:12px;text-align:center;line-height:1.8}

/* Viewport */
#vp-wrap{flex:1;position:relative;overflow:hidden;background:#070707;min-width:0}
#vp{position:absolute;top:0;left:0;touch-action:none;display:block}
#vp-status{position:absolute;bottom:8px;left:8px;font-size:10px;color:var(--txt3);pointer-events:none;font-family:monospace;line-height:1.8}
.vp-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;color:var(--txt3);font-size:13px;line-height:2}
#vp-zoom{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:3px}
.zb{width:30px;height:30px;background:rgba(22,22,22,.92);border:1px solid var(--br);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--txt2)}
.zb:hover{background:var(--bg3);color:var(--txt)}

/* Right panel */
#right{width:270px;background:var(--bg1);border-left:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#right-scroll{flex:1;overflow-y:auto}
#right-scroll::-webkit-scrollbar{width:5px}
#right-scroll::-webkit-scrollbar-track{background:var(--bg1)}
#right-scroll::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
.sec{border-bottom:1px solid var(--br)}
.sec-hdr{padding:8px 10px;background:var(--bg2);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;color:var(--txt)}
.sec-hdr::before{content:'▾';font-size:9px;color:var(--txt2);transition:.15s;flex-shrink:0}
.sec-hdr.col::before{transform:rotate(-90deg)}
.sec-body{padding:8px 10px}
.field{display:flex;align-items:center;margin-bottom:6px;gap:6px}
.field-lbl{width:66px;font-size:11px;color:var(--txt2);flex-shrink:0;text-align:right;padding-right:4px}
.input{flex:1;background:var(--bg);border:1px solid var(--br);color:var(--txt);padding:6px 8px;font-size:12px;font-family:monospace;border-radius:4px;min-width:0;-webkit-appearance:none;width:0}
.input:focus{outline:none;border-color:var(--blue)}
.input:hover{border-color:var(--br2)}
.input-2{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex:1}
.select{flex:1;background:var(--bg);border:1px solid var(--br);color:var(--txt);padding:6px 8px;font-size:12px;border-radius:4px;font-family:inherit;-webkit-appearance:none}
.select:focus{outline:none;border-color:var(--blue)}
.abtn{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--br);border-radius:5px;color:var(--txt);font:12px/1 inherit;cursor:pointer;margin-bottom:5px;text-align:left;display:flex;align-items:center;gap:7px;min-height:36px}
.abtn:hover{background:var(--bg4);border-color:var(--br2)}
.abtn:active{opacity:.75}
.abtn.primary{background:var(--blue2);border-color:var(--blue);color:#fff}
.abtn.primary:hover{background:var(--blue)}
.abtn.accent{background:var(--acc3);border-color:var(--acc);color:var(--acc2)}
.abtn.success{background:#14532d;border-color:var(--green);color:var(--green)}
.abtn.danger{background:#450a0a;border-color:var(--red);color:#fca5a5}
.abtn.danger:hover{background:#5c1010}
.props-empty{padding:30px 14px;color:var(--txt3);font-size:12px;text-align:center;line-height:2}

/* Splitters */
.spl-h{width:4px;background:var(--br);cursor:col-resize;flex-shrink:0;transition:background .15s}
.spl-h:hover,.spl-h.on{background:var(--blue)}
.spl-v{height:4px;background:var(--br);cursor:row-resize;flex-shrink:0;transition:background .15s}
.spl-v:hover,.spl-v.on{background:var(--blue)}

/* Timeline */
#tl{height:190px;background:var(--bg1);border-top:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
#tl-bar{height:34px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;overflow-x:auto}
#tl-bar::-webkit-scrollbar{display:none}
.tl-btn{min-width:26px;height:26px;background:var(--bg3);border:1px solid var(--br);border-radius:3px;color:var(--txt);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0}
.tl-btn:hover{background:var(--acc3);border-color:var(--acc)}
.tl-btn:active{opacity:.75}
.tl-btn.on{background:var(--acc3);border-color:var(--acc)}
.tl-frame{font-family:monospace;font-size:12px;color:var(--acc);background:var(--bg);border:1px solid var(--br);padding:2px 8px;border-radius:3px;min-width:60px;text-align:center;flex-shrink:0}
.tl-sel{background:var(--bg);border:1px solid var(--br);color:var(--txt);padding:3px 6px;font-size:11px;border-radius:3px;font-family:inherit;max-width:140px;flex-shrink:0;-webkit-appearance:none}
.tl-num{width:42px;background:var(--bg);border:1px solid var(--br);color:var(--txt);padding:3px 4px;font-size:11px;border-radius:3px;font-family:monospace;text-align:center;flex-shrink:0;-webkit-appearance:none}
.tl-lbl{font-size:10px;color:var(--txt2);white-space:nowrap;flex-shrink:0}
#tl-body{flex:1;display:flex;overflow:hidden}
#tl-names{width:220px;flex-shrink:0;border-right:1px solid var(--br);overflow-y:auto}
#tl-names::-webkit-scrollbar{width:4px}
#tl-names::-webkit-scrollbar-track{background:var(--bg1)}
#tl-names::-webkit-scrollbar-thumb{background:var(--br2)}
#tl-cvwrap{flex:1;position:relative;overflow:hidden}
#tl-cv{position:absolute;top:0;left:0;touch-action:none}
.tl-row{height:28px;display:flex;align-items:center;padding:0 8px;gap:5px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;flex-shrink:0;font-size:11px}
.tl-row:hover{background:var(--bg3)}
.tl-row.sel{background:var(--blue2)}
.tl-hdr{height:28px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;display:flex;align-items:center;padding:0 8px}

/* Status bar */
#status{height:22px;background:var(--acc3);border-top:1px solid rgba(0,0,0,.4);display:flex;align-items:center;padding:0 10px;gap:12px;flex-shrink:0;font-size:10px;color:rgba(255,255,255,.7)}
#status .si{color:rgba(255,255,255,.3)}

/* Modal */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px}
.mdlg{background:var(--bg2);border:1px solid var(--br2);border-radius:10px;padding:24px;min-width:290px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.8)}
.mdlg-title{font-size:15px;font-weight:600;margin-bottom:16px}
.mfield{margin-bottom:12px}
.mlbl{display:block;font-size:10px;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.minput{width:100%;background:var(--bg);border:1px solid var(--br);color:var(--txt);padding:9px 11px;font-size:13px;border-radius:5px;font-family:inherit;-webkit-appearance:none}
.minput:focus{outline:none;border-color:var(--blue)}
.mbtns{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap}
.mbtn{padding:9px 18px;border:1px solid var(--br);border-radius:5px;cursor:pointer;font:13px/1 inherit;background:var(--bg3);color:var(--txt);min-height:38px}
.mbtn:hover{background:var(--bg4)}
.mbtn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.mbtn.primary:hover{background:var(--blue2)}

/* Context menu */
#ctx{position:fixed;background:var(--bg2);border:1px solid var(--br2);border-radius:7px;z-index:9999;min-width:180px;box-shadow:0 10px 32px rgba(0,0,0,.7);display:none}
.ci{padding:10px 15px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;min-height:38px}
.ci:hover{background:var(--blue)}
.ci:active{background:var(--blue2)}
.ci.red{color:#fca5a5}
.ci.red:hover{background:#5c1010}
.csep{height:1px;background:var(--br);margin:3px 0}
.chdr{padding:4px 15px;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}

/* Toast */
.toast{position:fixed;top:54px;right:14px;background:var(--bg2);border:1px solid var(--br2);border-left:3px solid var(--acc);padding:9px 14px;border-radius:6px;z-index:9999;font-size:12px;animation:tsl .2s ease;pointer-events:none;max-width:280px;line-height:1.5}
.toast.ok{border-left-color:var(--green)}
.toast.err{border-left-color:var(--red)}
@keyframes tsl{from{transform:translateX(50px);opacity:0}to{transform:none;opacity:1}}

/* Mobile nav */
#mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--br);z-index:200;height:54px;align-items:stretch}
.mnbtn{flex:1;background:transparent;border:none;color:var(--txt2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font:9px/1 inherit;padding:4px 2px;min-height:0}
.mnbtn.on{color:var(--acc)}
.mnbtn:active{background:var(--bg3)}
.mnbtn-ico{font-size:20px;line-height:1}
#backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;touch-action:none}

/* Scrollbars */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
::-webkit-scrollbar-corner{background:var(--bg1)}

/* Weight bar */
.wbar{height:5px;background:var(--bg3);border-radius:3px;margin-top:2px;overflow:hidden}
.wfill{height:100%;border-radius:3px}

/* Mobile overrides */
@media(max-width:700px){
  #left{position:fixed;left:0;top:40px;bottom:54px;z-index:200;transform:translateX(-105%);box-shadow:5px 0 24px rgba(0,0,0,.7);transition:transform .25s ease}
  #left.open{transform:none}
  #right{position:fixed;right:0;top:40px;bottom:54px;z-index:200;transform:translateX(105%);box-shadow:-5px 0 24px rgba(0,0,0,.7);transition:transform .25s ease}
  #right.open{transform:none}
  .spl-h{display:none}
  #mnav{display:flex}
  body{padding-bottom:54px}
  #status{display:none}
  .btn span{display:none}
  #tl{height:160px}
}
@media(max-width:480px){
  .tool{min-width:38px;height:36px;font-size:18px}
  #bar{height:44px}
  .btn{height:34px}
  #vp-zoom{display:none}
}
@media(hover:none){
  .row{min-height:38px}
  .tl-row{height:32px}
  .ci{min-height:42px}
  .input,.select,.minput{font-size:14px;min-height:38px}
  .abtn{min-height:40px}
  .row-vis{opacity:.8}
}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-logo">⬡ DragonBones</div>
  <div style="font-size:11px;color:var(--txt2)">Web Editor</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- TOP BAR -->
<div id="bar">
  <span class="logo">⬡ DB</span>
  <button class="btn" id="b-new">🗋 <span>New</span></button>
  <button class="btn" id="b-open">📂 <span>Open</span></button>
  <button class="btn primary" id="b-img" style="gap:5px">🖼 <span>Import Image</span></button>
  <div class="sep"></div>
  <button class="btn" id="b-save">💾 <span>Save</span></button>
  <button class="btn primary" id="b-export">⬡ <span>Export JSON</span></button>
  <div class="sep"></div>
  <div class="modesw">
    <button class="modebtn on" id="m-design">Design</button>
    <button class="modebtn" id="m-anim">Animate</button>
  </div>
  <div class="sep"></div>
  <button class="btn sm" id="b-undo" title="Undo (Ctrl+Z)">↩</button>
  <button class="btn sm" id="b-redo" title="Redo (Ctrl+Y)">↪</button>
  <button class="btn sm" id="b-help">?</button>
</div>

<!-- TOOLS -->
<div id="tools">
  <button class="tool on" data-tool="select" title="Select (V)">↖</button>
  <button class="tool" data-tool="move" title="Move (W)">✥</button>
  <button class="tool" data-tool="rotate" title="Rotate (E)">↺</button>
  <button class="tool" data-tool="scale" title="Scale (R)">⤢</button>
  <div class="tool-sep"></div>
  <button class="tool" data-tool="bone" title="Draw Bone (A) — click and drag">🦴</button>
  <div class="tool-sep"></div>
  <button class="tool" data-tool="mesh-edit" title="Edit Mesh (M)">⬡</button>
  <button class="tool" data-tool="mesh-paint" title="Paint Weights (P)">🎨</button>
  <div class="tool-sep" style="margin-left:auto"></div>
  <button class="tool on" id="t-grid" title="Grid (G)" style="font-size:12px">⊞</button>
  <button class="tool on" id="t-bones" title="Bones (B)">🦴</button>
  <button class="tool on" id="t-sprites" title="Image (S)">🖼</button>
  <button class="tool on" id="t-names" title="Names (N)" style="font-size:12px">Aa</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="left">
    <div class="ptabs">
      <div class="ptab on" data-tab="bones">Bones</div>
      <div class="ptab" data-tab="slots">Slots</div>
      <div class="ptab" data-tab="skins">Skins</div>
    </div>
    <div class="plist-hdr">
      <span id="tab-label">Bones</span>
      <div class="plist-btns">
        <button class="plist-btn" id="lp-add">+</button>
        <button class="plist-btn" id="lp-del">−</button>
      </div>
    </div>
    <div class="plist" id="left-list"></div>
  </div>
  <div class="spl-h" id="spl-l"></div>

  <div id="vp-wrap">
    <canvas id="vp"></canvas>
    <div id="vp-status"></div>
    <div class="vp-hint" id="vp-hint">Import an image to begin<br><span style="font-size:11px;opacity:.6">or draw bones with the 🦴 tool</span></div>
    <div id="vp-zoom">
      <button class="zb" id="z-in" title="Zoom In (+)">+</button>
      <button class="zb" id="z-out" title="Zoom Out (-)">−</button>
      <button class="zb" id="z-fit" title="Fit (F)">⊡</button>
      <button class="zb" id="z-1" style="font-size:9px" title="1:1 (0)">1:1</button>
    </div>
  </div>

  <div class="spl-h" id="spl-r"></div>
  <div id="right">
    <div class="ptabs"><div class="ptab on">Properties</div></div>
    <div id="right-scroll"></div>
  </div>
</div>

<div class="spl-v" id="spl-tl"></div>

<!-- TIMELINE -->
<div id="tl">
  <div id="tl-bar">
    <button class="tl-btn" id="tl-start">⏮</button>
    <button class="tl-btn" id="tl-prev" title="Prev frame (,)">◀</button>
    <button class="tl-btn" id="tl-play" title="Play/Pause (Space)">▶</button>
    <button class="tl-btn" id="tl-next" title="Next frame (.)">▶</button>
    <button class="tl-btn" id="tl-end">⏭</button>
    <button class="tl-btn" id="tl-loop" title="Loop">🔁</button>
    <div class="tl-frame" id="tl-fc">0 / 60</div>
    <span class="tl-lbl">Anim:</span>
    <select class="tl-sel" id="tl-asel"></select>
    <button class="tl-btn" id="tl-newanim" title="New Animation">+</button>
    <button class="tl-btn" id="tl-delanim" title="Delete" style="font-size:10px">✕</button>
    <span class="tl-lbl" style="margin-left:4px">FPS:</span>

/* ═══════════════════════════════════════════════════════════════
   DragonBones Web Editor — Complete Working Engine
   Clean rebuild: image shows immediately, bg removal, full rig
   ═══════════════════════════════════════════════════════════════ */
const D2R=Math.PI/180,R2D=180/Math.PI;
const IS_TOUCH=('ontouchstart' in window)||navigator.maxTouchPoints>0;
const DLEN=80,DFPS=24,DDUR=60,GRID=20;
let _uid=1; const uid=p=>`${p||'x'}${_uid++}`;

/* ── 2D Matrix ─────────────────────────────────────────── */
class M2{
  constructor(a=1,b=0,c=0,d=1,e=0,f=0){this.a=a;this.b=b;this.c=c;this.d=d;this.e=e;this.f=f}
  static id(){return new M2()}
  static make(x,y,r,sx,sy){const C=Math.cos(r*D2R),S=Math.sin(r*D2R);return new M2(sx*C,sx*S,-sy*S,sy*C,x,y)}
  mul(o){return new M2(this.a*o.a+this.c*o.b,this.b*o.a+this.d*o.b,this.a*o.c+this.c*o.d,this.b*o.c+this.d*o.d,this.a*o.e+this.c*o.f+this.e,this.b*o.e+this.d*o.f+this.f)}
  pt(x,y){return{x:this.a*x+this.c*y+this.e,y:this.b*x+this.d*y+this.f}}
  inv(){const det=this.a*this.d-this.b*this.c;if(Math.abs(det)<1e-9)return M2.id();const i=1/det;return new M2(this.d*i,-this.b*i,-this.c*i,this.a*i,(this.c*this.f-this.d*this.e)*i,(this.b*this.e-this.a*this.f)*i)}
}

/* ── Data Model ────────────────────────────────────────── */
class Bone{constructor(name='bone',pid=null){this.id=uid('b');this.name=name;this.parentId=pid;this.x=0;this.y=0;this.rot=0;this.sx=1;this.sy=1;this.len=DLEN;this.vis=true}}
class Slot{constructor(name='slot',bid=null){this.id=uid('s');this.name=name;this.boneId=bid;this.di=0;this.z=0;this.vis=true;this.alpha=1}}
class Display{
  constructor(name='',type='image'){this.name=name;this.type=type;this.w=100;this.h=100;this.pivX=0.5;this.pivY=0.5;this.x=0;this.y=0;this.rot=0;this.sx=1;this.sy=1;this.url=null;this._img=null;this.mesh=null}
}
class Skin{constructor(name='default'){this.name=name;this.slots={}}
  ensure(id){if(!this.slots[id])this.slots[id]=[];return this.slots[id]}
  list(id){return this.slots[id]||[]}
  add(sid,d){const a=this.ensure(sid);a.push(d);return a.length-1}
  del(id){delete this.slots[id]}
}

/* BoneTrack: keyframes store ABSOLUTE pose values */
class BoneTrack{
  constructor(id){this.id=id;this.tf=[];this.rf=[];this.sf=[]}
  set(k,t,v){const a=this[k],e=a.find(f=>f.t===t);if(e)Object.assign(e,v);else{a.push({t,...v});a.sort((a,b)=>a.t-b.t)}}
  del(k,t){this[k]=this[k].filter(f=>f.t!==t)}
  has(){return this.tf.length||this.rf.length||this.sf.length}
  times(){const s=new Set();[...this.tf,...this.rf,...this.sf].forEach(f=>s.add(f.t));return[...s].sort((a,b)=>a-b)}
  eval(frame){return{x:this._lp(this.tf,'x',frame),y:this._lp(this.tf,'y',frame),rot:this._lp(this.rf,'rot',frame),sx:this._lp(this.sf,'sx',frame),sy:this._lp(this.sf,'sy',frame)}}
  _lp(arr,p,f){
    if(!arr.length)return null;
    if(f<=arr[0].t)return arr[0][p]??null;
    const last=arr[arr.length-1];if(f>=last.t)return last[p]??null;
    for(let i=0;i<arr.length-1;i++){const a=arr[i],b=arr[i+1];if(f>=a.t&&f<b.t){const t=(f-a.t)/(b.t-a.t);return(a[p]??0)+((b[p]??0)-(a[p]??0))*(t<.5?2*t*t:1-2*(1-t)*(1-t));}}
    return null;
  }
}
class SlotTrack{
  constructor(id){this.id=id;this.df=[]}
  set(t,di){const e=this.df.find(f=>f.t===t);if(e)e.di=di;else{this.df.push({t,di});this.df.sort((a,b)=>a.t-b.t)}}
  del(t){this.df=this.df.filter(f=>f.t!==t)}
  has(){return this.df.length>0}
  times(){return this.df.map(f=>f.t)}
  eval(frame){if(!this.df.length)return null;let v=this.df[0];for(const f of this.df){if(f.t<=frame)v=f;else break}return v.di}
}
class Animation{
  constructor(name='anim',fps=DFPS){this.name=name;this.fps=fps;this.dur=DDUR;this.loop=true;this.bt={};this.st={}}
  bt_(id){if(!this.bt[id])this.bt[id]=new BoneTrack(id);return this.bt[id]}
  st_(id){if(!this.st[id])this.st[id]=new SlotTrack(id);return this.st[id]}
  evalBone(id,frame){return this.bt[id]?this.bt[id].eval(frame):{x:null,y:null,rot:null,sx:null,sy:null}}
}
class Armature{
  constructor(name='Armature'){this.id=uid('arm');this.name=name;this.fps=DFPS;this.bones=[];this.slots=[];this.skins=[new Skin()];this.anims={}}
  get skin(){return this.skins[0]}
  bone(id){return this.bones.find(b=>b.id===id)}
  boneByName(n){return this.bones.find(b=>b.name===n)}
  slot(id){return this.slots.find(s=>s.id===id)}
  roots(){return this.bones.filter(b=>!b.parentId)}
  children(pid){return this.bones.filter(b=>b.parentId===pid)}
  allDesc(id){const r=[],q=[id];while(q.length){const p=q.shift();this.children(p).forEach(c=>{r.push(c.id);q.push(c.id)})}return r}
  wm(boneId,anim,frame){
    const chain=[];let cur=this.bone(boneId);
    while(cur){chain.unshift(cur);cur=cur.parentId?this.bone(cur.parentId):null}
    let m=M2.id();
    for(const b of chain){
      let x=b.x,y=b.y,r=b.rot,sx=b.sx,sy=b.sy;
      if(anim){const ev=anim.evalBone(b.id,frame);if(ev.x!==null)x=ev.x;if(ev.y!==null)y=ev.y;if(ev.rot!==null)r=ev.rot;if(ev.sx!==null)sx=ev.sx;if(ev.sy!==null)sy=ev.sy}
      m=m.mul(M2.make(x,y,r,sx,sy));
    }
    return m;
  }
  aabb(){let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;this.bones.forEach(b=>{const w=this.wm(b.id,null,0);[w.pt(0,0),w.pt(b.len,0)].forEach(p=>{mnx=Math.min(mnx,p.x);mny=Math.min(mny,p.y);mxx=Math.max(mxx,p.x);mxy=Math.max(mxy,p.y)})});return isFinite(mnx)?{x:mnx,y:mny,w:Math.max(1,mxx-mnx),h:Math.max(1,mxy-mny)}:{x:-200,y:-200,w:400,h:400}}
  removeBone(id){const b=this.bone(id);if(!b)return;this.children(id).forEach(c=>c.parentId=b.parentId);this.slots.filter(s=>s.boneId===id).forEach(s=>this.removeSlot(s.id));this.bones=this.bones.filter(b=>b.id!==id);Object.values(this.anims).forEach(a=>{delete a.bt[id]})}
  removeSlot(id){this.slots=this.slots.filter(s=>s.id!==id);this.skins.forEach(sk=>sk.del(id));Object.values(this.anims).forEach(a=>{delete a.st[id]})}
}

/* ── App State ─────────────────────────────────────────── */
const A={

  selBones:[],selSlot:null,

      brushR:40,brushStr:1.0,brushPainting:false},
  hist:[],hi:-1,tl:{fpx:.5,sx:0,rh:IS_TOUCH?30:26}
};

/* ── Helpers ───────────────────────────────────────────── */
const VP={w2c:(wx,wy)=>({x:wx*A.vp.sc+A.vp.x,y:wy*A.vp.sc+A.vp.y}),c2w:(cx,cy)=>({x:(cx-A.vp.x)/A.vp.sc,y:(cy-A.vp.y)/A.vp.sc})};

/* ── History ───────────────────────────────────────────── */
function sh(){const s=JSON.stringify(ser());A.hist=A.hist.slice(0,A.hi+1);A.hist.push(s);if(A.hist.length>80)A.hist.shift();A.hi=A.hist.length-1}

/* ── Toast ─────────────────────────────────────────────── */
let _tt=null;
function toast(m,t=''){document.querySelector('.toast')?.remove();const d=document.createElement('div');d.className='toast '+(t||'');d.textContent=m;document.body.appendChild(d);clearTimeout(_tt);_tt=setTimeout(()=>d.remove(),2600)}

/* ── Background Removal ────────────────────────────────── */
function removeBackground(disp,tolerance){
  if(!disp._img)return;
  const W=disp.w,H=disp.h;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const cx=cv.getContext('2d');cx.drawImage(disp._img,0,0);
  const id=cx.getImageData(0,0,W,H),d=id.data;
  const tol=tolerance||60;

  // Sample many edge pixels to find dominant background color
  const edgeSamples=[];
  for(let x=0;x<W;x+=2){edgeSamples.push([x,0],[x,H-1])}
  for(let y=0;y<H;y+=2){edgeSamples.push([0,y],[W-1,y])}
  // Find median RGB of edge samples
  let rSum=0,gSum=0,bSum=0;
  edgeSamples.forEach(([x,y])=>{const i=(y*W+x)*4;rSum+=d[i];gSum+=d[i+1];bSum+=d[i+2]});
  const n=edgeSamples.length;
  const bgR=rSum/n,bgG=gSum/n,bgB=bSum/n;

  // BFS flood fill from all 4 edges
  const visited=new Uint8Array(W*H);
  const queue=new Int32Array(W*H*2);
  let qHead=0,qTail=0;

  const tryAdd=(x,y)=>{
    if(x<0||x>=W||y<0||y>=H)return;
    const idx=y*W+x;
    if(visited[idx])return;
    const i=idx*4;
    const dr=d[i]-bgR,dg=d[i+1]-bgG,db=d[i+2]-bgB;
    const dist=Math.sqrt(dr*dr+dg*dg+db*db);
    // Also accept pure green-ish pixels even if slightly different from bg
    const [h,s,l]=rgbHsl(d[i],d[i+1],d[i+2]);
    const isGreenScreen=h>=0.22&&h<=0.48&&s>0.3&&l>0.1&&l<0.92;
    if(dist<tol||isGreenScreen){
      visited[idx]=1;queue[qTail++]=x;queue[qTail++]=y;
    }
  };
  // Seed all 4 edges
  for(let x=0;x<W;x++){tryAdd(x,0);tryAdd(x,H-1)}
  for(let y=0;y<H;y++){tryAdd(0,y);tryAdd(W-1,y)}
  // BFS expand
  while(qHead<qTail){
    const x=queue[qHead++],y=queue[qHead++];
    tryAdd(x-1,y);tryAdd(x+1,y);tryAdd(x,y-1);tryAdd(x,y+1);
  }

  // Apply transparency with smooth edges
  for(let idx=0;idx<W*H;idx++){
    if(!visited[idx])continue;
    const i=idx*4;
    // Check if near a non-background pixel for edge feathering
    const x=idx%W,y=idx/W|0;
    let nearFg=false;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      const nx=x+dx,ny=y+dy;
      if(nx<0||nx>=W||ny<0||ny>=H)continue;
      if(!visited[ny*W+nx]){nearFg=true;break}
      if(nearFg)break;
    }
    d[i+3]=nearFg?60:0; // soft edge on boundary pixels
  }

  cx.putImageData(id,0,0);
  const url=cv.toDataURL('image/png');
  const img=new Image();
  img.onload=()=>{disp._img=img;disp.url=url;A.imgs[disp.name]={url,img,w:W,h:H};sh();render();updateRight();toast('Background removed!','ok')};
  img.src=url;
}

function rgbHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2;
  if(mx===mn)return[0,0,l];
  const d=mx-mn,s=l>0.5?d/(2-mx-mn):d/(mx+mn);
  let h;
  if(mx===r)h=(g-b)/d+(g<b?6:0);
  else if(mx===g)h=(b-r)/d+2;
  else h=(r-g)/d+4;
  return[h/6,s,l];
}

/* ── Image Import ──────────────────────────────────────── */
document.getElementById('fi-img').addEventListener('change',async e=>{
  const files=[...e.target.files];e.target.value='';
  for(const f of files){
    try{
      const url=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)});
      const img=await new Promise((r,rej)=>{const i=new Image();i.onload=()=>r(i);i.onerror=rej;i.src=url});
      const name=f.name.replace(/\.[^.]+$/,'');
      A.imgs[name]={url,img,w:img.naturalWidth,h:img.naturalHeight};
      // Auto-setup: create bone + slot + assign image so it appears immediately
      autoSetupImage(name,img,url);
    }catch(err){toast('Failed to load: '+f.name,'err')}
  }
});

function autoSetupImage(name,img,url){
  const arm=A.arm;
  // Create root bone if none exists
  let rootBone=arm.roots()[0];
  if(!rootBone){
    rootBone=new Bone('root');
    rootBone.x=0;rootBone.y=0;
    arm.bones.push(rootBone);
  }
  // Find or create a slot for this bone
  let slot=arm.slots.find(s=>s.boneId===rootBone.id&&arm.skin.list(s.id).length===0);
  if(!slot){
    slot=new Slot(name+'_slot',rootBone.id);
    slot.z=arm.slots.length;
    arm.slots.push(slot);
    arm.skin.ensure(slot.id);
  }
  // Create display
  const d=new Display(name,'image');
  d.url=url;d._img=img;d.w=img.naturalWidth;d.h=img.naturalHeight;
  d.pivX=0.5;d.pivY=0.5;d.x=0;d.y=0;
  const idx=arm.skin.add(slot.id,d);
  slot.di=idx;
  // Hide hint
  document.getElementById('vp-hint').style.display='none';
  // Fit viewport to show image
  zoomFit();
  sh();all();
  toast(name+' imported — visible in viewport!','ok');
}

/* ── Mesh System ───────────────────────────────────────── */
function meshCreate(disp,cols,rows){
  cols=Math.max(1,+cols||4);rows=Math.max(1,+rows||6);
  const W=disp.w,H=disp.h,px=disp.pivX*W,py=disp.pivY*H;
  const verts=[],uvs=[],tris=[],wts=[];
  for(let r=0;r<=rows;r++)for(let c=0;c<=cols;c++){
    uvs.push({u:c/cols,v:r/rows});
    verts.push({x:(c/cols)*W-px,y:(r/rows)*H-py});
    wts.push([]);
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const i=r*(cols+1)+c;tris.push(i,i+1,i+(cols+1),i+1,i+(cols+2),i+(cols+1));
  }
  disp.type='mesh';disp.mesh={verts,uvs,tris,wts,cols,rows};
  sh();updateRight();render();
  toast(`Mesh: ${verts.length} verts · ${tris.length/3|0} tris`,'ok');
}

function meshBind(disp,slot){
  if(!disp.mesh){toast('Create mesh first','err');return}
  const arm=A.arm,bones=arm.bones.filter(b=>b.vis&&b.len>0);
  if(!bones.length){toast('Add bones first','err');return}
  const b0=arm.bone(slot.boneId),bm0=b0?arm.wm(b0.id,null,0):M2.id();
  const dm=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);
  const dwm=bm0.mul(dm);
  function segDist(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;if(l2<.001)return Math.hypot(px-ax,py-ay);const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));return Math.hypot(px-ax-t*dx,py-ay-t*dy)}
  disp.mesh.wts=disp.mesh.verts.map(v=>{
    const wp=dwm.pt(v.x,v.y);
    const dists=bones.map(b=>{const bm=arm.wm(b.id,null,0);const tp=bm.pt(b.len,0);return{id:b.id,d:Math.max(.1,segDist(wp.x,wp.y,bm.e,bm.f,tp.x,tp.y))}});
    const top=dists.sort((a,b)=>a.d-b.d).slice(0,4);
    const inv=top.map(t=>1/(t.d*t.d)),tot=inv.reduce((s,v)=>s+v,0);
    return top.map((t,i)=>{const bm=arm.wm(t.id,null,0);const lp=bm.inv().pt(wp.x,wp.y);return{bid:t.id,w:inv[i]/tot,lx:lp.x,ly:lp.y}});
  });
  sh();updateRight();render();
  toast('Weights bound to '+bones.length+' bones','ok');
}

function meshDeform(disp,slot,anim,frame,sc,ox,oy){
  const arm=A.arm,b0=arm.bone(slot.boneId);
  const bm0=b0?arm.wm(b0.id,anim,frame):M2.id();
  const dm=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);
  const dwm=bm0.mul(dm);
  return disp.mesh.verts.map((v,vi)=>{
    const ws=disp.mesh.wts[vi];
    if(!ws||!ws.length){const wp=dwm.pt(v.x,v.y);return{x:wp.x*sc+ox,y:wp.y*sc+oy}}
    let wx=0,wy=0;for(const{bid,w,lx,ly}of ws){const bm=arm.wm(bid,anim,frame);const p=bm.pt(lx,ly);wx+=p.x*w;wy+=p.y*w}
    return{x:wx*sc+ox,y:wy*sc+oy};
  });
}

/* Affine triangle texturing — verified formula */
function drawTri(c,img,x0,y0,x1,y1,x2,y2,u0,v0,u1,v1,u2,v2){
  const det=u0*(v1-v2)-u1*(v0-v2)+u2*(v0-v1);
  if(Math.abs(det)<0.001)return;
  const a=(x0*(v1-v2)-x1*(v0-v2)+x2*(v0-v1))/det;
  const b=(y0*(v1-v2)-y1*(v0-v2)+y2*(v0-v1))/det;
  const cc=(u0*(x1-x2)-u1*(x0-x2)+u2*(x0-x1))/det;
  const d=(u0*(y1-y2)-u1*(y0-y2)+u2*(y0-y1))/det;
  const e=(u0*(v1*x2-v2*x1)-u1*(v0*x2-v2*x0)+u2*(v0*x1-v1*x0))/det;
  const f=(u0*(v1*y2-v2*y1)-u1*(v0*y2-v2*y0)+u2*(v0*y1-v1*y0))/det;
  c.save();c.beginPath();c.moveTo(x0,y0);c.lineTo(x1,y1);c.lineTo(x2,y2);c.closePath();c.clip();
  c.setTransform(a,b,cc,d,e,f);c.drawImage(img,0,0);c.restore();
}

function drawMesh(c,disp,slot,anim,frame){
  if(!disp.mesh||!disp._img)return;
  const pts=meshDeform(disp,slot,anim,frame,A.vp.sc,A.vp.x,A.vp.y);
  const{tris,uvs}=disp.mesh,iw=disp._img.naturalWidth,ih=disp._img.naturalHeight;
  c.save();c.globalAlpha=slot.alpha;
  for(let i=0;i<tris.length;i+=3){
    const i0=tris[i],i1=tris[i+1],i2=tris[i+2];
    const p0=pts[i0],p1=pts[i1],p2=pts[i2],uv0=uvs[i0],uv1=uvs[i1],uv2=uvs[i2];
    drawTri(c,disp._img,p0.x,p0.y,p1.x,p1.y,p2.x,p2.y,uv0.u*iw,uv0.v*ih,uv1.u*iw,uv1.v*ih,uv2.u*iw,uv2.v*ih);
  }
  c.restore();
  if((A.tool==='mesh-edit'||A.tool==='mesh-paint')&&A.me.slot===slot.id)drawMeshUI(c,disp,pts);
}

function drawMeshUI(c,disp,pts){
  const mesh=disp.mesh,pb=A.me.pbone,isPaint=A.tool==='mesh-paint';c.save();

  // Draw filled triangle overlay showing bone influence (weight paint visualization)
  if(isPaint){
    for(let i=0;i<mesh.tris.length;i+=3){
      const i0=mesh.tris[i],i1=mesh.tris[i+1],i2=mesh.tris[i+2];
      const p0=pts[i0],p1=pts[i1],p2=pts[i2];
      // Average weight of 3 vertices for this triangle
      let avgW=0;
      [i0,i1,i2].forEach(vi=>{
        const inf=pb?mesh.wts[vi]?.find(w=>w.bid===pb):null;
        avgW+=inf?inf.w:0;
      });
      avgW/=3;
      if(avgW>0.01){
        // Red = high influence, fade to transparent for low
        const R=Math.round(255*Math.min(1,avgW*1.5));
        const G=Math.round(80*Math.max(0,1-avgW*2));
        c.beginPath();c.moveTo(p0.x,p0.y);c.lineTo(p1.x,p1.y);c.lineTo(p2.x,p2.y);c.closePath();
        c.fillStyle=`rgba(${R},${G},30,${0.25+avgW*0.45})`;c.fill();
      }
    }
  }

  // Draw wireframe
  const drawn=new Set();
  c.strokeStyle=isPaint?'rgba(255,255,255,.2)':'rgba(80,180,255,.5)';c.lineWidth=1;
  for(let i=0;i<mesh.tris.length;i+=3){
    [[mesh.tris[i],mesh.tris[i+1]],[mesh.tris[i+1],mesh.tris[i+2]],[mesh.tris[i+2],mesh.tris[i]]].forEach(([a,b])=>{
      const k=Math.min(a,b)+'-'+Math.max(a,b);if(drawn.has(k))return;drawn.add(k);
      c.beginPath();c.moveTo(pts[a].x,pts[a].y);c.lineTo(pts[b].x,pts[b].y);c.stroke();
    });
  }

  // Draw vertex dots (only in edit mode, not paint mode — too cluttered)
  if(!isPaint){
    pts.forEach((p,vi)=>{
      const sel=A.me.vert===vi;
      const r=(sel?8:5)*(IS_TOUCH?1.4:1);
      c.beginPath();c.arc(p.x,p.y,r,0,Math.PI*2);
      c.fillStyle=sel?'#fff':'rgba(80,180,255,.9)';c.fill();
      c.strokeStyle='#0009';c.lineWidth=1;c.stroke();
    });
  }

  // Draw brush circle cursor in paint mode
  if(isPaint&&pb){
    const br=A.me.brushR||40;
    c.beginPath();c.arc(_mouse.x,_mouse.y,br,0,Math.PI*2);
    c.strokeStyle='rgba(255,255,255,.7)';c.lineWidth=1.5;c.setLineDash([4,4]);c.stroke();c.setLineDash([]);
    c.beginPath();c.arc(_mouse.x,_mouse.y,1.5,0,Math.PI*2);
    c.fillStyle='#fff';c.fill();
  }

  c.restore();
}

function paintVert(disp,slot,vi,boneId,w){
  // Paint a single vertex (called by brush loop)
  const mesh=disp.mesh;if(!mesh)return;
  const arm=A.arm,b0=arm.bone(slot.boneId);
  const bm0=b0?arm.wm(b0.id,null,0):M2.id();
  const dwm=bm0.mul(M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy));
  const vw=dwm.pt(mesh.verts[vi].x,mesh.verts[vi].y);
  const lp=arm.wm(boneId,null,0).inv().pt(vw.x,vw.y);
  const ws=mesh.wts[vi]||(mesh.wts[vi]=[]);
  const ex=ws.find(f=>f.bid===boneId);
  if(ex){ex.w=Math.max(0,Math.min(1,w));ex.lx=lp.x;ex.ly=lp.y}
  else if(w>0.001)ws.push({bid:boneId,w:Math.max(0,Math.min(1,w)),lx:lp.x,ly:lp.y});
  // Normalize so weights sum to 1
  const tot=ws.reduce((s,f)=>s+f.w,0);
  if(tot>0)ws.forEach(f=>f.w/=tot);
  else ws.length=0;
}

function brushPaint(cx,cy){
  // Paint all mesh vertices within brush radius — called continuously on drag
  if(!A.me.slot||!A.me.pbone)return;
  const slot=A.arm.slot(A.me.slot);
  const dsps=A.arm.skin.list(A.me.slot);
  const disp=dsps[slot?.di];
  if(!slot||!disp||!disp.mesh)return;
  const pts=meshDeform(disp,slot,anim_(),A.frame,A.vp.sc,A.vp.x,A.vp.y);
  const br=A.me.brushR||40;
  const str=A.me.brushStr||1.0;
  let painted=false;
  pts.forEach((p,vi)=>{
    const dist=Math.hypot(cx-p.x,cy-p.y);
    if(dist>br)return;
    // Soft falloff from center of brush
    const falloff=1-Math.pow(dist/br,2);
    const amt=falloff*str;
    // Get current weight for this bone
    const ws=disp.mesh.wts[vi]||(disp.mesh.wts[vi]=[]);
    const ex=ws.find(w=>w.bid===A.me.pbone);
    const curW=ex?ex.w:0;
    // Blend toward target (1.0) by amt — prevents hard edges
    const newW=Math.min(1,curW+(1-curW)*amt*0.3);
    if(newW>0.01){paintVert(disp,slot,vi,A.me.pbone,newW);painted=true;}
  });
  if(painted)render();
}

function findMeshVert(cx,cy,disp,slot){
  if(!disp||!disp.mesh)return -1;
  const pts=meshDeform(disp,slot,anim_(),A.frame,A.vp.sc,A.vp.x,A.vp.y);
  const hr=IS_TOUCH?22:12;let ni=-1,nd=Infinity;
  pts.forEach((p,vi)=>{const d=Math.hypot(cx-p.x,cy-p.y);if(d<hr&&d<nd){ni=vi;nd=d}});
  return ni;
}

/* ── Render ────────────────────────────────────────────── */
let _mouse={x:0,y:0};

function render(){
  const c=ctx,W=A.vp.w,H=A.vp.h,sc=A.vp.sc,ox=A.vp.x,oy=A.vp.y;
  c.clearRect(0,0,W,H);c.fillStyle='#080808';c.fillRect(0,0,W,H);
  if(A.ui.grid){
    const g=GRID*sc,mg=g*5;
    const lines=(sz,col)=>{c.strokeStyle=col;c.lineWidth=1;for(let x=(ox%sz+sz)%sz;x<W;x+=sz){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke()}for(let y=(oy%sz+sz)%sz;y<H;y+=sz){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke()}};
    lines(g,'rgba(255,255,255,.03)');lines(mg,'rgba(255,255,255,.07)');
    const o=VP.w2c(0,0);c.strokeStyle='rgba(255,255,255,.18)';c.lineWidth=1;c.beginPath();c.moveTo(o.x-10,o.y);c.lineTo(o.x+10,o.y);c.stroke();c.beginPath();c.moveTo(o.x,o.y-10);c.lineTo(o.x,o.y+10);c.stroke();
  }
  const an=anim_(),fr=A.frame,arm=A.arm;
  if(A.ui.sprites){
    [...arm.slots].sort((a,b)=>a.z-b.z).forEach(slot=>{
      if(!slot.vis)return;
      const b=arm.bone(slot.boneId);if(!b||!b.vis)return;
      let di=slot.di;if(an&&an.st[slot.id]){const v=an.st[slot.id].eval(fr);if(v!==null)di=v}
      const dsps=arm.skin.list(slot.id),disp=dsps[di];if(!disp||!disp._img)return;
      if(disp.type==='mesh'){drawMesh(c,disp,slot,an,fr);return}
      const wm=arm.wm(b.id,an,fr);
      const dm=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);
      const fm=wm.mul(dm);
      const px=disp.pivX*disp.w,py=disp.pivY*disp.h;
      c.save();c.globalAlpha=slot.alpha;
      c.setTransform(fm.a*sc,fm.b*sc,fm.c*sc,fm.d*sc,fm.e*sc+ox,fm.f*sc+oy);
      if(A.selSlot===slot.id){c.strokeStyle='rgba(80,180,255,.85)';c.lineWidth=2/sc;c.strokeRect(-px,-py,disp.w,disp.h)}
      c.drawImage(disp._img,-px,-py,disp.w,disp.h);c.restore();
    });
  }
  if(A.ui.bones){arm.bones.forEach(b=>{if(b.vis)drawBone(c,b,an,fr)})}
  if(A.bDraw.on){
    const s=VP.w2c(A.bDraw.px,A.bDraw.py);
    c.save();c.strokeStyle='rgba(251,191,36,.7)';c.lineWidth=2;c.setLineDash([5,4]);
    c.beginPath();c.moveTo(s.x,s.y);c.lineTo(_mouse.x,_mouse.y);c.stroke();c.setLineDash([]);
    c.beginPath();c.arc(s.x,s.y,6,0,Math.PI*2);c.fillStyle='rgba(251,191,36,.8)';c.fill();c.restore();
  }
  const wp=VP.c2w(_mouse.x,_mouse.y);
  document.getElementById('vp-status').textContent=`X:${wp.x.toFixed(1)} Y:${wp.y.toFixed(1)}  ·  Zoom:${Math.round(sc*100)}%`;
  document.getElementById('st-zoom').textContent=Math.round(sc*100)+'%';
}

function drawBone(c,b,an,fr){
  const arm=A.arm,wm=arm.wm(b.id,an,fr);
  const op=VP.w2c(wm.e,wm.f),tp0=wm.pt(b.len,0),tp=VP.w2c(tp0.x,tp0.y);
  const sel=A.selBones.includes(b.id),sc=A.vp.sc,dx=tp.x-op.x,dy=tp.y-op.y,len=Math.hypot(dx,dy);
  c.save();
  if(len>1){
    const nx=-dy/len,ny=dx/len,rw=9*sc,tw=2.5*sc;
    c.beginPath();c.moveTo(op.x+nx*rw,op.y+ny*rw);c.lineTo(tp.x+nx*tw,tp.y+ny*tw);c.lineTo(tp.x-nx*tw,tp.y-ny*tw);c.lineTo(op.x-nx*rw,op.y-ny*rw);c.closePath();
    const g=c.createLinearGradient(op.x,op.y,tp.x,tp.y);
    g.addColorStop(0,sel?'rgba(249,115,22,.95)':'rgba(251,191,36,.9)');
    g.addColorStop(1,sel?'rgba(253,186,116,.5)':'rgba(253,224,71,.35)');
    c.fillStyle=g;c.fill();c.strokeStyle=sel?'#f97316':'rgba(251,191,36,.75)';c.lineWidth=1;c.stroke();
    c.beginPath();c.arc(tp.x,tp.y,(sel?6:4)*sc,0,Math.PI*2);c.fillStyle=sel?'#fb923c':'rgba(251,191,36,.8)';c.fill();c.strokeStyle='#0009';c.lineWidth=1;c.stroke();
  }
  c.beginPath();c.arc(op.x,op.y,(sel?10:8)*sc,0,Math.PI*2);c.fillStyle=sel?'#f97316':'#fbbf24';c.fill();c.strokeStyle='#0009';c.lineWidth=1.5;c.stroke();
  if(sel&&A.tool==='rotate'){c.beginPath();c.arc(op.x,op.y,14*sc,0,Math.PI*2);c.strokeStyle='rgba(96,165,250,.6)';c.lineWidth=1.5;c.stroke()}
  if(A.ui.names&&sc>.35&&len>1){
    const mx=(op.x+tp.x)/2,my=(op.y+tp.y)/2;
    c.font=`${Math.max(9,11*sc)}px -apple-system,Arial`;c.fillStyle=sel?'#fff':'rgba(255,255,255,.6)';c.textAlign='center';c.textBaseline='middle';c.fillText(b.name,mx,my-(13*sc));
  }
  if(A.mode==='anim'&&A.anim&&A.anim.bt[b.id]?.times().includes(Math.round(A.frame))){
    c.beginPath();c.arc(op.x,op.y,3*sc,0,Math.PI*2);c.fillStyle='#fde047';c.fill();
  }
  c.restore();
}

/* ── Timeline Render ───────────────────────────────────── */
function renderTL(){renderTLNames();renderTLCanvas()}
function tlRows(){if(!A.anim)return[];return[...A.arm.bones.map(b=>({type:'bone',id:b.id,name:b.name})),...A.arm.slots.map(s=>({type:'slot',id:s.id,name:s.name}))]}

function renderTLNames(){
  const cont=document.getElementById('tl-names');
  cont.innerHTML='<div class="tl-hdr"><span style="font-size:10px;color:var(--txt2)">TRACKS</span></div>';
  if(!A.anim){const d=document.createElement('div');d.className='tl-row';d.style.color='var(--txt3)';d.textContent='Create an animation first';cont.appendChild(d);return}
  tlRows().forEach(row=>{
    const hasKF=row.type==='bone'?(A.anim.bt[row.id]?.has()):(A.anim.st[row.id]?.has());
    const isSel=row.type==='bone'?A.selBones.includes(row.id):A.selSlot===row.id;
    const d=document.createElement('div');d.className='tl-row'+(isSel?' sel':'');d.style.height=A.tl.rh+'px';
    d.innerHTML=`<span style="font-size:10px;color:${row.type==='bone'?'#fbbf24':'#60a5fa'}">${row.type==='bone'?'⬡':'◆'}</span><span style="flex:1;font-size:11px;color:${hasKF?'#fff':'var(--txt2)'};margin-left:4px">${row.name}</span>${hasKF?'<span style="color:#fde047;font-size:9px">◆</span>':''}`;
    d.addEventListener('click',()=>{if(row.type==='bone')selBone(row.id);else selSlot(row.id)});
    cont.appendChild(d);
  });
}

function renderTLCanvas(){
  const c=tlx,W=tlcv.width,H=tlcv.height;
  c.clearRect(0,0,W,H);c.fillStyle='#0c0c0c';c.fillRect(0,0,W,H);
  if(!A.anim)return;
  const dur=A.anim.dur,fpx=A.tl.fpx,sx=A.tl.sx,rh=A.tl.rh,hH=26;
  c.fillStyle='#181818';c.fillRect(0,0,W,hH);c.fillStyle='#2a2a2a';c.fillRect(0,hH-1,W,1);
  const step=Math.max(1,Math.ceil(55*fpx));
  c.font='9px monospace';c.textAlign='center';
  for(let f=0;f<=dur;f+=step){const x=(f-sx)/fpx;if(x<-2||x>W+2)continue;c.fillStyle='#333';c.fillRect(x,hH-5,1,5);if(f%(step*5)===0||step>4){c.fillStyle='#777';c.fillText(f,x,hH-8)}}
  tlRows().forEach((row,i)=>{
    const y=hH+i*rh;if(y>H)return;
    c.fillStyle=i%2?'#0f0f0f':'#0c0c0c';c.fillRect(0,y,W,rh);
    let times=[];
    if(row.type==='bone'&&A.anim.bt[row.id])times=A.anim.bt[row.id].times();
    else if(row.type==='slot'&&A.anim.st[row.id])times=A.anim.st[row.id].times();
    if(times.length>1){c.strokeStyle='rgba(253,224,71,.2)';c.lineWidth=2;c.beginPath();const ky=y+rh/2;let first=true;times.forEach(t=>{const x=(t-sx)/fpx;if(first){c.moveTo(x,ky);first=false}else c.lineTo(x,ky)});c.stroke()}
    times.forEach(t=>{const x=(t-sx)/fpx;if(x<-8||x>W+8)return;const ky=y+rh/2,at=Math.abs(t-A.frame)<.5;c.save();c.translate(x,ky);c.rotate(Math.PI/4);const sz=IS_TOUCH?5:4;c.fillStyle=at?'#fff':'#fde047';c.strokeStyle='#0009';c.lineWidth=1;c.fillRect(-sz,-sz,sz*2,sz*2);c.strokeRect(-sz,-sz,sz*2,sz*2);c.restore()});
    const isSel=row.type==='bone'?A.selBones.includes(row.id):A.selSlot===row.id;
    if(isSel){c.fillStyle='rgba(37,99,235,.18)';c.fillRect(0,y,W,rh);c.fillStyle='rgba(59,130,246,.9)';c.fillRect(0,y,3,rh)}
    c.fillStyle='rgba(255,255,255,.03)';c.fillRect(0,y+rh-1,W,1);
  });
  const ex=(dur-sx)/fpx;if(ex>0&&ex<W){c.fillStyle='rgba(239,68,68,.18)';c.fillRect(ex,0,W,H);c.fillStyle='#ef4444';c.fillRect(ex-1,0,2,H)}
  const phX=(A.frame-sx)/fpx;
  if(phX>=-2&&phX<=W+2){
    c.fillStyle='rgba(255,255,255,.1)';c.fillRect(phX,hH,1,H);c.fillStyle='#fff';c.fillRect(phX-1.5,0,3,hH);
    c.beginPath();c.moveTo(phX-5,0);c.lineTo(phX+5,0);c.lineTo(phX,8);c.closePath();c.fill();
    c.font='9px monospace';c.textAlign='center';c.fillStyle='rgba(255,255,255,.9)';c.fillText(Math.floor(A.frame),phX,hH+10);
  }
}

/* ── Left Panel ────────────────────────────────────────── */
function renderLeft(){
  const t=A.ui.tab,cont=document.getElementById('left-list');cont.innerHTML='';
  if(t==='bones')renderBoneTree(cont);
  else if(t==='slots')renderSlotList(cont);
  else renderSkinList(cont);
}
function renderBoneTree(cont){
  const arm=A.arm;
  function node(b,depth){
    const kids=arm.children(b.id),sel=A.selBones.includes(b.id);
    const d=document.createElement('div');d.className='row'+(sel?' sel':'');
    d.innerHTML=`<span style="width:${depth*14}px;flex-shrink:0"></span><span class="row-icon" style="color:${sel?'#fb923c':'#fbbf24'}">⬡</span><span class="row-label">${b.name}</span><span class="row-vis">${b.vis?'👁':'🚫'}</span>`;
    d.addEventListener('click',e=>{e.stopPropagation();selBone(b.id,e.ctrlKey||e.metaKey)});
    d.addEventListener('dblclick',()=>askRename('bone',b.id,b.name));
    d.addEventListener('contextmenu',e=>{e.preventDefault();showBoneCtx(b.id,e.clientX,e.clientY)});
    d.querySelector('.row-vis').addEventListener('click',e=>{e.stopPropagation();b.vis=!b.vis;sh();renderLeft();render()});
    cont.appendChild(d);kids.forEach(k=>node(k,depth+1));
  }
  arm.roots().forEach(b=>node(b,0));
  if(!arm.bones.length){const p=document.createElement('div');p.className='empty';p.textContent='No bones yet.\n\nUse the 🦴 Bone tool: click and drag in the canvas to draw a bone.';cont.appendChild(p)}
}
function renderSlotList(cont){
  const arm=A.arm;
  [...arm.slots].sort((a,b)=>b.z-a.z).forEach(slot=>{
    const bone=arm.bone(slot.boneId),sel=A.selSlot===slot.id;
    const d=document.createElement('div');d.className='row'+(sel?' sel':'');
    d.innerHTML=`<span class="row-icon" style="color:#60a5fa">◆</span><span class="row-label">${slot.name}</span><span class="row-tag">[${bone?bone.name:'—'}]</span><span class="row-vis">${slot.vis?'👁':'🚫'}</span>`;
    d.addEventListener('click',()=>selSlot(slot.id));
    d.addEventListener('dblclick',()=>askRename('slot',slot.id,slot.name));
    d.querySelector('.row-vis').addEventListener('click',e=>{e.stopPropagation();slot.vis=!slot.vis;sh();renderLeft();render()});
    cont.appendChild(d);
  });
  if(!arm.slots.length){const p=document.createElement('div');p.className='empty';p.textContent='No slots yet.';cont.appendChild(p)}
}
function renderSkinList(cont){
  A.arm.skins.forEach((sk,si)=>{
    const h=document.createElement('div');h.style.cssText='padding:6px 10px;font-size:12px;font-weight:600;background:var(--bg2);border-bottom:1px solid var(--br)';h.textContent='🎨 '+sk.name+(si===0?' (default)':'');cont.appendChild(h);
    let any=false;
    Object.entries(sk.slots).forEach(([sid,dsps])=>{
      const slot=A.arm.slot(sid);dsps.forEach((d,di)=>{
        if(!d)return;any=true;const r=document.createElement('div');r.className='row';
        r.innerHTML=`<span style="width:10px"></span><span class="row-icon" style="color:#60a5fa">◆</span><span class="row-tag" style="margin-right:5px">${slot?slot.name:sid}</span><span class="row-label">${d.name||'unnamed'}</span><span class="row-tag">${d.type==='mesh'?'🕸':'📷'}</span>`;
        if(d._img){const cv=document.createElement('canvas');cv.width=24;cv.height=24;cv.style.cssText='flex-shrink:0;border:1px solid var(--br);border-radius:3px;margin-right:4px';setTimeout(()=>{const x=cv.getContext('2d');x.drawImage(d._img,0,0,24,24)},10);r.appendChild(cv)}
        cont.appendChild(r);
      });
    });
    if(!any){const p=document.createElement('div');p.className='empty';p.style.padding='10px';p.textContent='No displays.';cont.appendChild(p)}
  });
}

/* ── Right Panel (Properties) ──────────────────────────── */
function updateRight(){
  const cont=document.getElementById('right-scroll');cont.innerHTML='';
  if(A.selBones.length===1)rightBone(cont,A.arm.bone(A.selBones[0]));
  else if(A.selBones.length>1){const d=document.createElement('div');d.className='props-empty';d.textContent=`${A.selBones.length} bones selected\nDrag to move all`;cont.appendChild(d)}
  else if(A.selSlot)rightSlot(cont,A.arm.slot(A.selSlot));
  else rightArm(cont);
}

function mkSec(cont,title,open=true){
  const s=document.createElement('div');s.className='sec';
  const h=document.createElement('div');h.className='sec-hdr'+(open?'':' col');h.textContent=title;
  const b=document.createElement('div');b.className='sec-body';b.style.display=open?'block':'none';
  h.addEventListener('click',()=>{h.classList.toggle('col');b.style.display=h.classList.contains('col')?'none':'block'});
  s.appendChild(h);s.appendChild(b);cont.appendChild(s);return b;
}

function selIn(par,lbl,opts,cur,fn){const r=document.createElement('div');r.className='field';if(lbl){const l=document.createElement('span');l.className='field-lbl';l.textContent=lbl;r.appendChild(l)}const s=document.createElement('select');s.className='select';opts.forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l||v;if(v===cur)o.selected=true;s.appendChild(o)});s.addEventListener('change',()=>fn(s.value));r.appendChild(s);par.appendChild(r);return s}
function xy(par,lbl,xv,yv,fnx,fny,step=.1){const r=document.createElement('div');r.className='field';if(lbl){const l=document.createElement('span');l.className='field-lbl';l.textContent=lbl;r.appendChild(l)}const g=document.createElement('div');g.className='input-2';const xi=numIn(xv,fnx,step);xi.placeholder='X';const yi=numIn(yv,fny,step);yi.placeholder='Y';g.appendChild(xi);g.appendChild(yi);r.appendChild(g);par.appendChild(r)}

  xy(b,'Position',bone.x,bone.y,v=>{bone.x=v;sh();render()},v=>{bone.y=v;sh();render()});
  fld(b,'Rotation',numIn(bone.rot,v=>{bone.rot=v;sh();render()}));
  xy(b,'Scale',bone.sx,bone.sy,v=>{bone.sx=v;sh();render()},v=>{bone.sy=v;sh();render()},0.001);

/* ── Selection ─────────────────────────────────────────── */
function selBone(id,add=false){
  if(add){const i=A.selBones.indexOf(id);if(i>=0)A.selBones.splice(i,1);else A.selBones.push(id)}
  else{A.selBones=[id];A.selSlot=null}
  renderLeft();updateRight();render();renderTL();
  document.getElementById('st-sel').textContent='Bone: '+(A.arm.bone(id)?.name||id);
}
function selSlot(id){A.selSlot=id;A.selBones=[];renderLeft();updateRight();render();document.getElementById('st-sel').textContent='Slot: '+(A.arm.slot(id)?.name||id)}
function deselect(){A.selBones=[];A.selSlot=null;renderLeft();updateRight();render();document.getElementById('st-sel').textContent='Nothing selected'}

/* ── Bone/Slot Operations ──────────────────────────────── */
function mkBoneAt(wx,wy,ex,ey,pid=null){
  const dx=ex-wx,dy=ey-wy,len=Math.hypot(dx,dy)||DLEN,rot=Math.atan2(dy,dx)*R2D;
  let bx=wx,by=wy;
  if(pid){const lp=A.arm.wm(pid,null,0).inv().pt(wx,wy);bx=lp.x;by=lp.y}
  const b=new Bone('bone_'+A.arm.bones.length,pid);b.x=bx;b.y=by;b.rot=rot;b.len=Math.max(5,len);
  A.arm.bones.push(b);
  const sl=new Slot(b.name+'_slot',b.id);sl.z=A.arm.slots.length;A.arm.slots.push(sl);A.arm.skin.ensure(sl.id);
  A.selBones=[b.id];sh();renderLeft();updateRight();render();renderTL();toast('Bone: '+b.name,'ok');return b;
}
function deleteBone(id){const desc=A.arm.allDesc(id);[id,...desc].forEach(bid=>A.arm.removeBone(bid));A.selBones=A.selBones.filter(x=>![id,...desc].includes(x));sh();renderLeft();updateRight();render();renderTL();toast('Bone deleted')}
function deleteSlot(id){if(A.selSlot===id)A.selSlot=null;A.arm.removeSlot(id);sh();renderLeft();updateRight();render();toast('Slot deleted')}
function assignImg(slotId){
  const names=Object.keys(A.imgs);
  if(!names.length){toast('Import images first (top bar → Import Image)','err');return}
  pickModal('Assign Image','Choose image for this slot:',names,name=>{
    if(!name)return;const imgData=A.imgs[name];const d=new Display(name,'image');
    d.url=imgData.url;d._img=imgData.img;d.w=imgData.w;d.h=imgData.h;
    const idx=A.arm.skin.add(slotId,d);const slot=A.arm.slot(slotId);if(slot)slot.di=idx;
    sh();renderLeft();updateRight();render();toast('Assigned: '+name,'ok');
  });
}

/* ── Mode / Tool ───────────────────────────────────────── */
function setMode(m){
  A.mode=m;
  document.getElementById('m-design').classList.toggle('on',m==='design');
  document.getElementById('m-anim').classList.toggle('on',m==='anim');
  document.getElementById('st-mode').textContent=m==='design'?'Design':'Animate';
  updateRight();render();renderTL();
}
function setTool(t){
  A.tool=t;
  document.querySelectorAll('.tool[data-tool]').forEach(b=>b.classList.toggle('on',b.dataset.tool===t));
  const labels={select:'Select',move:'Move',rotate:'Rotate',scale:'Scale',bone:'Draw Bone','mesh-edit':'Edit Mesh','mesh-paint':'Paint Weights'};
  document.getElementById('st-tool').textContent=labels[t]||t;
  const cursors={select:'default',move:'move',rotate:'alias',scale:'nwse-resize',bone:'crosshair','mesh-edit':'crosshair','mesh-paint':'crosshair'};
  canvas.style.cursor=cursors[t]||'default';
}

/* ── Animation ─────────────────────────────────────────── */
function newAnim(){
  askText('New Animation','Name:','anim_'+Object.keys(A.arm.anims).length,name=>{
    if(!name)return;if(A.arm.anims[name]){toast('Already exists','err');return}
    const an=new Animation(name,A.arm.fps);A.arm.anims[name]=an;A.anim=an;
    setMode('anim');refreshAnimSel();sh();renderTL();toast('Animation: '+name,'ok');
  });
}
function delAnim(){if(!A.anim)return;if(!confirm('Delete "'+A.anim.name+'"?'))return;
  delete A.arm.anims[A.anim.name];const ns=Object.keys(A.arm.anims);A.anim=ns.length?A.arm.anims[ns[0]]:null;
  refreshAnimSel();sh();renderTL();render();toast('Deleted')}
function refreshAnimSel(){
  const sel=document.getElementById('tl-asel');sel.innerHTML='<option value="">-- none --</option>';

  document.getElementById('tl-fps').value=A.anim?A.anim.fps:DFPS;

function selAnim(name){A.anim=A.arm.anims[name]||null;if(A.anim)setMode('anim');A.frame=0;A.playing=false;updFC();renderTL();render()}

function getCurPose(bid){
  const b=A.arm.bone(bid);if(!b)return null;
  if(A.mode==='anim'&&A.anim){const ev=A.anim.evalBone(bid,A.frame);return{x:ev.x??b.x,y:ev.y??b.y,rot:ev.rot??b.rot,sx:ev.sx??b.sx,sy:ev.sy??b.sy}}
  return{x:b.x,y:b.y,rot:b.rot,sx:b.sx,sy:b.sy};
}
function addKF(){
  if(!A.anim||A.mode!=='anim'){toast('Switch to Animate mode first','err');return}
  if(!A.selBones.length&&!A.selSlot){toast('Select a bone or slot first','err');return}
  const frame=Math.round(A.frame);
  A.selBones.forEach(bid=>{const cur=getCurPose(bid);const tr=A.anim.bt_(bid);tr.set('tf',frame,{x:cur.x,y:cur.y});tr.set('rf',frame,{rot:cur.rot});tr.set('sf',frame,{sx:cur.sx,sy:cur.sy})});
  if(A.selSlot){const s=A.arm.slot(A.selSlot);if(s)A.anim.st_(A.selSlot).set(frame,s.di)}
  sh();renderTL();updateRight();render();toast('Keyframe at '+frame,'ok');
}
function delKF(){if(!A.anim)return;const frame=Math.round(A.frame);
  A.selBones.forEach(bid=>{const t=A.anim.bt[bid];if(t){t.del('tf',frame);t.del('rf',frame);t.del('sf',frame)}});
  if(A.selSlot){const t=A.anim.st[A.selSlot];if(t)t.del(frame)}
  sh();renderTL();updateRight();toast('Keyframe deleted')}

let _raf=null,_lt=0;
function togglePlay(){if(!A.anim){toast('Create an animation first','err');return}
  A.playing=!A.playing;document.getElementById('tl-play').textContent=A.playing?'⏸':'▶';
  if(A.playing){_lt=performance.now();tick()}else if(_raf)cancelAnimationFrame(_raf)}
function stopPlay(){A.playing=false;A.frame=0;document.getElementById('tl-play').textContent='▶';updFC();render();renderTL()}
function tick(){_raf=requestAnimationFrame(t=>{if(!A.playing)return;if(!A.anim){A.playing=false;return}
  const dt=(t-_lt)/1000;_lt=t;A.frame+=dt*A.anim.fps;
  if(A.frame>=A.anim.dur){A.frame=A.loop?A.frame%A.anim.dur:A.anim.dur;if(!A.loop){A.playing=false;document.getElementById('tl-play').textContent='▶'}}
  A.frame=Math.max(0,Math.min(A.anim.dur,A.frame));updFC();render();renderTL();if(A.playing)tick()})}
function stepFrame(d){A.frame=Math.max(0,Math.min(A.anim?A.anim.dur:9999,Math.round(A.frame)+d));updFC();render();renderTL()}
function goStart(){A.frame=0;updFC();render();renderTL()}
function goEnd(){A.frame=A.anim?A.anim.dur:0;updFC();render();renderTL()}

/* ── Zoom ──────────────────────────────────────────────── */
function zoomBy(f,cx,cy){if(cx===undefined){cx=A.vp.w/2;cy=A.vp.h/2}
  const ns=Math.max(.04,Math.min(20,A.vp.sc*f));A.vp.x=cx-(cx-A.vp.x)*(ns/A.vp.sc);A.vp.y=cy-(cy-A.vp.y)*(ns/A.vp.sc);A.vp.sc=ns;render()}
function zoomFit(){
  // If there are slots with images, fit to them; otherwise fit to bones
  const arm=A.arm;let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;let found=false;
  arm.slots.forEach(slot=>{
    const dsps=arm.skin.list(slot.id),disp=dsps[slot.di];
    if(!disp||!disp._img)return;
    const b=arm.bone(slot.boneId);if(!b)return;
    const wm=arm.wm(b.id,null,0);const dm=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);const fm=wm.mul(dm);
    const px=disp.pivX*disp.w,py=disp.pivY*disp.h;
    [[0,0],[disp.w,0],[0,disp.h],[disp.w,disp.h]].forEach(([cx2,cy2])=>{
      const p=fm.pt(cx2-px,cy2-py);mnx=Math.min(mnx,p.x);mny=Math.min(mny,p.y);mxx=Math.max(mxx,p.x);mxy=Math.max(mxy,p.y);found=true;
    });
  });
  if(!found){const aabb=arm.aabb();mnx=aabb.x;mny=aabb.y;mxx=aabb.x+aabb.w;mxy=aabb.y+aabb.h;found=arm.bones.length>0}
  if(!found){A.vp.sc=1;A.vp.x=A.vp.w/2;A.vp.y=A.vp.h/2;render();return}
  const pw=mxx-mnx||400,ph=mxy-mny||400,pad=60;
  A.vp.sc=Math.max(.04,Math.min(20,(A.vp.w-pad*2)/pw,(A.vp.h-pad*2)/ph));
  A.vp.x=A.vp.w/2-(mnx+pw/2)*A.vp.sc;A.vp.y=A.vp.h/2-(mny+ph/2)*A.vp.sc;render();}
function zoomReset(){A.vp.sc=1;A.vp.x=A.vp.w/2;A.vp.y=A.vp.h/2;render()}

/* ── Hit test ──────────────────────────────────────────── */
const BHIT=()=>(IS_TOUCH?20:11)*A.vp.sc;
function findBone(cx,cy){
  const arm=A.arm,an=anim_(),fr=A.frame,hr=BHIT();
  for(let i=arm.bones.length-1;i>=0;i--){const b=arm.bones[i];if(!b.vis)continue;
    const wm=arm.wm(b.id,an,fr),op=VP.w2c(wm.e,wm.f);
    if(Math.hypot(cx-op.x,cy-op.y)<hr)return b.id;
    if(b.len>0){const tp=wm.pt(b.len,0);const tc=VP.w2c(tp.x,tp.y);
      if(Math.hypot(cx-tc.x,cy-tc.y)<hr*.7)return b.id;
      const dx=tc.x-op.x,dy=tc.y-op.y,l2=dx*dx+dy*dy;
      if(l2>0){const t=Math.max(0,Math.min(1,((cx-op.x)*dx+(cy-op.y)*dy)/l2));if(Math.hypot(cx-op.x-t*dx,cy-op.y-t*dy)<hr*.8)return b.id;}}}
  return null;
}

function getActiveMeshDisp(){if(!A.me.slot)return null;const slot=A.arm.slot(A.me.slot);if(!slot)return null;const dsps=A.arm.skin.list(slot.id);return{disp:dsps[slot.di],slot};}

/* ── Pointer Down/Move/Up ──────────────────────────────── */
function pDown(cx,cy,btn,mods){
  closeCtx();
  if(btn===1||(btn===0&&mods.alt)){A.drag={on:true,type:'pan',sx:cx,sy:cy,pvx:A.vp.x,pvy:A.vp.y,orig:{}};canvas.style.cursor='grabbing';return}
  if(btn!==0)return;
  const {disp,slot}=getActiveMeshDisp()||{};
  if((A.tool==='mesh-edit'||A.tool==='mesh-paint')&&disp){
    if(A.tool==='mesh-paint'){
      // Start brush painting — don't need to find exact vertex
      A.me.brushPainting=true;
      brushPaint(cx,cy);
      return;
    }
    // mesh-edit: find nearest vertex
    const vi=findMeshVert(cx,cy,disp,slot);
    if(vi>=0){
      A.me.vert=vi;
      A.me.don=true;A.me.dsx=cx;A.me.dsy=cy;A.me.dov={x:disp.mesh.verts[vi].x,y:disp.mesh.verts[vi].y};
      updateRight();render();return;
    }else{A.me.vert=null;updateRight();render()}
  }
  if(A.tool==='bone'){const wp=VP.c2w(cx,cy);A.bDraw={on:true,px:wp.x,py:wp.y,pid:findBone(cx,cy)||null};return}
  const hit=findBone(cx,cy);
  if(hit){if(!A.selBones.includes(hit))selBone(hit,mods.ctrl);
    const orig={};A.selBones.forEach(bid=>{const p=getCurPose(bid);if(p)orig[bid]=p});
    const type=A.tool==='rotate'?'rotate':A.tool==='scale'?'scale':'move';
    A.drag={on:true,type,sx:cx,sy:cy,orig};
  }else if(!mods.ctrl)deselect();
  render();
}

function pMove(cx,cy,buttons){
  _mouse={x:cx,y:cy};
  if(A.drag.on){
    if(A.drag.type==='pan'){A.vp.x=A.drag.pvx+(cx-A.drag.sx);A.vp.y=A.drag.pvy+(cy-A.drag.sy)}
    else if(A.drag.type==='move'){const dx=(cx-A.drag.sx)/A.vp.sc,dy=(cy-A.drag.sy)/A.vp.sc;
      A.selBones.forEach(bid=>{const b=A.arm.bone(bid),ot=A.drag.orig[bid];if(!b||!ot)return;
        const nx=ot.x+dx,ny=ot.y+dy;
        if(A.mode==='anim'&&A.anim){A.anim.bt_(bid).set('tf',Math.round(A.frame),{x:nx,y:ny})}else{b.x=nx;b.y=ny}})}
    else if(A.drag.type==='rotate'){
      A.selBones.forEach(bid=>{const b=A.arm.bone(bid),ot=A.drag.orig[bid];if(!b||!ot)return;
        const wm=A.arm.wm(bid,null,0),oc=VP.w2c(wm.e,wm.f);
        const sa=Math.atan2(A.drag.sy-oc.y,A.drag.sx-oc.x),ca=Math.atan2(cy-oc.y,cx-oc.x);
        const nr=((ot.rot+(ca-sa)*R2D)%360+360)%360;
        if(A.mode==='anim'&&A.anim){A.anim.bt_(bid).set('rf',Math.round(A.frame),{rot:nr})}else b.rot=nr})}
    else if(A.drag.type==='scale'){
      A.selBones.forEach(bid=>{const b=A.arm.bone(bid),ot=A.drag.orig[bid];if(!b||!ot)return;
        const wm=A.arm.wm(bid,null,0),oc=VP.w2c(wm.e,wm.f);
        const sd=Math.hypot(A.drag.sx-oc.x,A.drag.sy-oc.y)||1,cd=Math.hypot(cx-oc.x,cy-oc.y)||1,ratio=cd/sd;
        const ns=Math.max(.01,ot.sx*ratio);
        if(A.mode==='anim'&&A.anim){A.anim.bt_(bid).set('sf',Math.round(A.frame),{sx:ns,sy:Math.max(.01,ot.sy*ratio)})}else{b.sx=ns;b.sy=ns}})}
    render();if(A.drag.type!=='pan')renderTL();
  }
  if(A.me.brushPainting&&buttons&&A.tool==='mesh-paint'){
    brushPaint(cx,cy);
  }else if(A.me.don&&buttons){
    const {disp}=getActiveMeshDisp()||{};
    if(disp&&disp.mesh&&A.me.vert!==null){
      disp.mesh.verts[A.me.vert].x=A.me.dov.x+(cx-A.me.dsx)/A.vp.sc;
      disp.mesh.verts[A.me.vert].y=A.me.dov.y+(cy-A.me.dsy)/A.vp.sc;
      render();}
  }else if(A.bDraw.on&&buttons)render();
  if(!A.drag.on&&!A.me.don){
    if(A.tool==='bone')canvas.style.cursor='crosshair';
    else if(A.tool==='rotate')canvas.style.cursor='alias';
    else if(A.tool==='scale')canvas.style.cursor='nwse-resize';
    else if(A.tool==='mesh-edit'||A.tool==='mesh-paint')canvas.style.cursor='crosshair';
    else if(findBone(cx,cy))canvas.style.cursor='pointer';
    else canvas.style.cursor='default';
  }
}

function pUp(cx,cy,btn){
  if(A.bDraw.on&&btn===0){A.bDraw.on=false;const wp=VP.c2w(cx,cy);const d=Math.hypot(wp.x-A.bDraw.px,wp.y-A.bDraw.py);if(d>4/A.vp.sc)mkBoneAt(A.bDraw.px,A.bDraw.py,wp.x,wp.y,A.bDraw.pid);render();return}
  if(A.me.brushPainting){A.me.brushPainting=false;sh();updateRight();return}
  if(A.me.don){A.me.don=false;sh();return}
  if(A.drag.on){if(A.drag.type!=='pan')sh();A.drag.on=false}
  if(A.tool==='bone')canvas.style.cursor='crosshair';else canvas.style.cursor='default';
}

/* Mouse events */
canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();_mouse={x:e.clientX-r.left,y:e.clientY-r.top};pDown(e.clientX-r.left,e.clientY-r.top,e.button,{alt:e.altKey,ctrl:e.ctrlKey||e.metaKey})});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();pMove(e.clientX-r.left,e.clientY-r.top,e.buttons)});
canvas.addEventListener('mouseup',e=>{const r=canvas.getBoundingClientRect();pUp(e.clientX-r.left,e.clientY-r.top,e.button)});
canvas.addEventListener('mouseleave',()=>{A.bDraw.on=false;A.me.don=false});
canvas.addEventListener('wheel',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();zoomBy(e.deltaY<0?1.1:1/1.1,e.clientX-r.left,e.clientY-r.top)},{passive:false});
canvas.addEventListener('contextmenu',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();const cx=e.clientX-r.left,cy=e.clientY-r.top;const hit=findBone(cx,cy);if(hit)showBoneCtx(hit,e.clientX,e.clientY);else showVpCtx(e.clientX,e.clientY)});
canvas.addEventListener('dblclick',e=>{const r=canvas.getBoundingClientRect();const hit=findBone(e.clientX-r.left,e.clientY-r.top);if(hit)askRename('bone',hit,A.arm.bone(hit)?.name||'')});

/* Touch events */
const T={d:0,mx:0,my:0,lt:null,lx:0,ly:0,lap:0};
canvas.addEventListener('touchstart',e=>{e.preventDefault();clearTimeout(T.lt);const r=canvas.getBoundingClientRect();
  if(e.touches.length===1){const t=e.touches[0],cx=t.clientX-r.left,cy=t.clientY-r.top;_mouse={x:cx,y:cy};
    const now=Date.now();if(now-T.lap<300&&Math.abs(cx-T.lx)<20&&Math.abs(cy-T.ly)<20){const hit=findBone(cx,cy);if(hit){askRename('bone',hit,A.arm.bone(hit)?.name||'');return}}
    T.lap=now;T.lx=cx;T.ly=cy;
    T.lt=setTimeout(()=>{const hit=findBone(cx,cy);if(hit)showBoneCtx(hit,t.clientX,t.clientY);else showVpCtx(t.clientX,t.clientY)},600);
    pDown(cx,cy,0,{alt:false,ctrl:false});
  }else if(e.touches.length===2){A.drag.on=false;A.bDraw.on=false;A.me.don=false;const t0=e.touches[0],t1=e.touches[1];T.d=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);T.mx=(t0.clientX+t1.clientX)/2-r.left;T.my=(t0.clientY+t1.clientY)/2-r.top;}
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();clearTimeout(T.lt);const r=canvas.getBoundingClientRect();
  if(e.touches.length===1){const t=e.touches[0];_mouse={x:t.clientX-r.left,y:t.clientY-r.top};pMove(t.clientX-r.left,t.clientY-r.top,1)}
  else if(e.touches.length===2){const t0=e.touches[0],t1=e.touches[1];const nd=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);const nm={x:(t0.clientX+t1.clientX)/2-r.left,y:(t0.clientY+t1.clientY)/2-r.top};if(T.d>0)zoomBy(nd/T.d,nm.x,nm.y);A.vp.x+=nm.x-T.mx;A.vp.y+=nm.y-T.my;T.d=nd;T.mx=nm.x;T.my=nm.y;render();}
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();clearTimeout(T.lt);if(e.changedTouches.length){const t=e.changedTouches[0],r=canvas.getBoundingClientRect();pUp(t.clientX-r.left,t.clientY-r.top,0)}if(e.touches.length===0)T.d=0;},{passive:false});
canvas.addEventListener('touchcancel',()=>{clearTimeout(T.lt);A.drag.on=false;A.bDraw.on=false;A.me.don=false;A.me.brushPainting=false;T.d=0},{passive:false});

/* Timeline input */
const tlcvEl=document.getElementById('tl-cv');
function tlHit(cx,cy){const hH=26,rh=A.tl.rh,fpx=A.tl.fpx,sx=A.tl.sx;
  if(cy<hH){A.frame=Math.max(0,Math.min(A.anim?A.anim.dur:9999,cx*fpx+sx));updFC();render();renderTL();return}
  const ri=Math.floor((cy-hH)/rh);const rows=tlRows();if(ri>=0&&ri<rows.length){const row=rows[ri];if(row.type==='bone')selBone(row.id);else selSlot(row.id)}
  A.frame=Math.max(0,Math.min(A.anim?A.anim.dur:9999,cx*fpx+sx));updFC();render();renderTL();}
tlcvEl.addEventListener('mousedown',e=>{const r=tlcvEl.getBoundingClientRect();tlHit(e.clientX-r.left,e.clientY-r.top)});
tlcvEl.addEventListener('mousemove',e=>{if(e.buttons!==1)return;const r=tlcvEl.getBoundingClientRect();A.frame=Math.max(0,Math.min(A.anim?A.anim.dur:9999,(e.clientX-r.left)*A.tl.fpx+A.tl.sx));updFC();render();renderTL()});
tlcvEl.addEventListener('touchstart',e=>{e.preventDefault();const r=tlcvEl.getBoundingClientRect();tlHit(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:false});
tlcvEl.addEventListener('touchmove',e=>{e.preventDefault();const r=tlcvEl.getBoundingClientRect();A.frame=Math.max(0,Math.min(A.anim?A.anim.dur:9999,(e.touches[0].clientX-r.left)*A.tl.fpx+A.tl.sx));updFC();render();renderTL()},{passive:false});
tlcvEl.addEventListener('wheel',e=>{e.preventDefault();if(e.ctrlKey){A.tl.fpx=Math.max(.04,Math.min(6,A.tl.fpx*(e.deltaY>0?1.15:.87)))}else{A.tl.sx=Math.max(0,A.tl.sx+(e.deltaX+e.deltaY)*.4)}renderTL()},{passive:false});

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
  const k=e.key.toLowerCase();
  if(e.ctrlKey||e.metaKey){
    if(k==='z'){e.preventDefault();undo()}else if(k==='y'||(k==='z'&&e.shiftKey)){e.preventDefault();redo()}
    else if(k==='s'){e.preventDefault();saveProj()}else if(k==='o'){e.preventDefault();document.getElementById('fi-json').click()}
    else if(k==='n'){e.preventDefault();newProj()}else if(k==='d'){e.preventDefault();dupBones()}
    else if(k==='a'){e.preventDefault();A.selBones=[...A.arm.bones.map(b=>b.id)];renderLeft();updateRight();render()}
    return;
  }
  if(k==='v')setTool('select');else if(k==='w')setTool('move');else if(k==='e')setTool('rotate');
  else if(k==='r')setTool('scale');else if(k==='a')setTool('bone');
  else if(k==='m'){if(A.me.slot){setTool(A.tool==='mesh-edit'?'select':'mesh-edit');updateRight();render()}}
  else if(k==='p'){if(A.me.slot){setTool(A.tool==='mesh-paint'?'select':'mesh-paint');updateRight();render()}}
  else if(k==='g'){A.ui.grid=!A.ui.grid;document.getElementById('t-grid').classList.toggle('on',A.ui.grid);render()}
  else if(k==='b'){A.ui.bones=!A.ui.bones;document.getElementById('t-bones').classList.toggle('on',A.ui.bones);render()}
  else if(k==='s'){A.ui.sprites=!A.ui.sprites;document.getElementById('t-sprites').classList.toggle('on',A.ui.sprites);render()}
  else if(k==='n'){A.ui.names=!A.ui.names;document.getElementById('t-names').classList.toggle('on',A.ui.names);render()}
  else if(k==='f')zoomFit();else if(k==='0')zoomReset();
  else if(k==='+'||k==='=')zoomBy(1.2);else if(k==='-')zoomBy(1/1.2);
  else if(k==='k')addKF();else if(k===' '){e.preventDefault();togglePlay()}
  else if(k==='home')goStart();else if(k==='end')goEnd();
  else if(k===',')stepFrame(-1);else if(k==='.')stepFrame(1);
  else if(k==='escape')deselect();
  else if(k==='delete'||k==='backspace'){e.preventDefault();if(A.selBones.length)deleteBone(A.selBones[0]);else if(A.selSlot)deleteSlot(A.selSlot)}
});

/* ── Context Menus ─────────────────────────────────────── */
function showBoneCtx(id,x,y){if(!A.selBones.includes(id))selBone(id);const b=A.arm.bone(id);if(!b)return;
  showCtxAt(x,y,`<div class="chdr">${b.name}</div>
    <div class="ci" data-a="rename" data-id="${id}">✎ Rename…</div>
    <div class="ci" data-a="child" data-id="${id}">⬡ Create Child Bone</div>
    <div class="ci" data-a="addslot" data-id="${id}">◆ Create Slot</div>
    <div class="csep"></div>
    <div class="ci" data-a="kf" data-id="${id}">◆ Add Keyframe</div>
    <div class="ci" data-a="dup" data-id="${id}">⧉ Duplicate</div>
    <div class="csep"></div>
    <div class="ci red" data-a="del" data-id="${id}">✕ Delete Bone</div>`);}
function showVpCtx(x,y){const wp=VP.c2w(_mouse.x,_mouse.y);
  showCtxAt(x,y,`<div class="ci" data-a="newroot">⬡ New Root Bone Here</div>
    <div class="ci" data-a="impimg">📂 Import Image…</div>
    <div class="csep"></div>
    <div class="ci" data-a="fit">⊡ Fit to View (F)</div>
    <div class="ci" data-a="reset">1:1 Reset Zoom (0)</div>`);}
function showCtxAt(x,y,html){const m=document.getElementById('ctx');m.innerHTML=html;m.style.display='block';m.style.left=Math.min(x,window.innerWidth-200)+'px';m.style.top=Math.min(y,window.innerHeight-280)+'px';m.querySelectorAll('.ci[data-a]').forEach(el=>el.addEventListener('click',()=>{handleCtx(el.dataset.a,el.dataset.id);closeCtx()}))}
function closeCtx(){document.getElementById('ctx').style.display='none'}
document.addEventListener('mousedown',e=>{if(!e.target.closest('#ctx'))closeCtx()});
document.addEventListener('touchstart',e=>{if(!e.target.closest('#ctx'))closeCtx()},{passive:true});
function handleCtx(act,id){const wp=VP.c2w(_mouse.x,_mouse.y);
  if(act==='rename')askRename('bone',id,A.arm.bone(id)?.name||'');
  else if(act==='del')deleteBone(id);
  else if(act==='child'){const b=new Bone('bone_'+A.arm.bones.length,id);A.arm.bones.push(b);const sl=new Slot(b.name+'_slot',b.id);sl.z=A.arm.slots.length;A.arm.slots.push(sl);A.arm.skin.ensure(sl.id);A.selBones=[b.id];sh();renderLeft();updateRight();render()}
  else if(act==='addslot'){const sl=new Slot('slot_'+A.arm.slots.length,id);sl.z=A.arm.slots.length;A.arm.slots.push(sl);A.arm.skin.ensure(sl.id);A.selSlot=sl.id;A.selBones=[];sh();renderLeft();updateRight()}
  else if(act==='kf'){const prev=A.selBones;A.selBones=[id];addKF();A.selBones=prev}
  else if(act==='dup'){const prev=A.selBones;A.selBones=[id];dupBones();A.selBones=prev}

function mkSpl(id,dir,getSize,setSize){
  const el=document.getElementById(id);let on=false,start=0,init=0;
  const md=e=>{on=true;start=dir==='h'?e.clientX:e.clientY;init=getSize();el.classList.add('on');e.preventDefault()};
  const mm=e=>{if(!on)return;const d=(dir==='h'?e.clientX:e.clientY)-start;setSize(Math.max(80,Math.min(550,init+d)));resize();render();renderTL()};
  const mu=()=>{on=false;el.classList.remove('on')};
  el.addEventListener('mousedown',md);document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  el.addEventListener('touchstart',e=>{on=true;start=dir==='h'?e.touches[0].clientX:e.touches[0].clientY;init=getSize();e.preventDefault()},{passive:false});
  document.addEventListener('touchmove',e=>{if(!on)return;const pos=dir==='h'?e.touches[0].clientX:e.touches[0].clientY;setSize(Math.max(80,Math.min(550,init+(pos-start))));resize();render();renderTL()},{passive:true});
  document.addEventListener('touchend',()=>{on=false},{passive:true});
}

function load(raw){
  _uid=1;A.imgs={};const arm=new Armature(raw.name||'Armature');arm.fps=raw.fps||DFPS;
  (raw.bones||[]).forEach(b=>{const bn=new Bone(b.name,b.pid||null);bn.id=b.id;Object.assign(bn,{x:b.x||0,y:b.y||0,rot:b.rot||0,sx:b.sx??1,sy:b.sy??1,len:b.len||DLEN,vis:b.vis??true});arm.bones.push(bn)});
  (raw.slots||[]).forEach(s=>{const sl=new Slot(s.name,s.bid||null);sl.id=s.id;Object.assign(sl,{di:s.di||0,z:s.z||0,vis:s.vis??true,alpha:s.alpha??1});arm.slots.push(sl)});
  arm.skins=[];

    Object.entries(sk.slots||{}).forEach(([sid,ds])=>{skin.slots[sid]=(ds||[]).map(d=>{if(!d)return null;const disp=new Display(d.name,d.type||'image');Object.assign(disp,{w:d.w,h:d.h,pivX:d.pivX??0.5,pivY:d.pivY??0.5,x:d.x||0,y:d.y||0,rot:d.rot||0,sx:d.sx??1,sy:d.sy??1});
      if(d.url){disp.url=d.url;const img=new Image();img.src=d.url;disp._img=img;A.imgs[d.name]={url:d.url,img,w:d.w,h:d.h}}
      if(d.mesh)disp.mesh={verts:d.mesh.verts.map(v=>({...v})),uvs:[...d.mesh.uvs],tris:[...d.mesh.tris],wts:d.mesh.wts.map(ws=>(ws||[]).map(w=>({...w}))),cols:d.mesh.cols,rows:d.mesh.rows};
      return disp;})});arm.skins.push(skin)});
  if(!arm.skins.length)arm.skins.push(new Skin());
  Object.entries(raw.anims||{}).forEach(([n,a])=>{const an=new Animation(a.name,a.fps||DFPS);an.dur=a.dur||DDUR;an.loop=a.loop??true;
    Object.entries(a.bt||{}).forEach(([id,t])=>{const tr=new BoneTrack(id);tr.tf=[...(t.tf||[])];tr.rf=[...(t.rf||[])];tr.sf=[...(t.sf||[])];an.bt[id]=tr});
    Object.entries(a.st||{}).forEach(([id,t])=>{const tr=new SlotTrack(id);tr.df=[...(t.df||[])];an.st[id]=tr});arm.anims[n]=an});
  const ids=[...arm.bones.map(b=>b.id),...arm.slots.map(s=>s.id)];ids.forEach(id=>{const n=parseInt(id.replace(/\D/g,''));if(!isNaN(n)&&n>=_uid)_uid=n+1});
  A.arm=arm;A.selBones=[];A.selSlot=null;A.anim=null;A.frame=0;A.playing=false;
  A.me={slot:null,vert:null,pbone:null,pw:1,don:false,dsx:0,dsy:0,dov:{x:0,y:0}};
  // Show/hide hint
  const hasImgs=arm.skins.some(sk=>Object.values(sk.slots).some(ds=>ds.some(d=>d&&d._img)));
  document.getElementById('vp-hint').style.display=hasImgs?'none':'block';
}
function loadDB(json){
  _uid=1;A.imgs={};const a0=json.armature?.[0];if(!a0){toast('No armature','err');return}
  const arm=new Armature(a0.name||'Armature');arm.fps=a0.frameRate||json.frameRate||DFPS;
  const bmap={};
  (a0.bone||[]).forEach(b=>{const bn=new Bone(b.name,null);bn.x=b.transform?.x||0;bn.y=b.transform?.y||0;bn.rot=b.transform?.skX||0;bn.sx=b.transform?.scX??1;bn.sy=b.transform?.scY??1;bn.len=b.length||DLEN;bmap[b.name]=bn.id;arm.bones.push(bn)});
  (a0.bone||[]).forEach(b=>{if(b.parent){const child=arm.boneByName(b.name);if(child)child.parentId=bmap[b.parent]||null}});
  const smap={};
  (a0.slot||[]).forEach((s,i)=>{const bone=arm.boneByName(s.parent);const sl=new Slot(s.name,bone?.id||null);sl.z=s.z||i;smap[s.name]=sl.id;arm.slots.push(sl)});
  arm.skins=[];
  (a0.skin||[]).forEach(sk=>{const skin=new Skin(sk.name||'default');(sk.slot||[]).forEach(ss=>{const sid=smap[ss.name];if(!sid)return;skin.slots[sid]=(ss.display||[]).map(d=>{const disp=new Display(d.name||'','image');disp.x=d.transform?.x||0;disp.y=d.transform?.y||0;disp.rot=d.transform?.skX||0;disp.sx=d.transform?.scX??1;disp.sy=d.transform?.scY??1;disp.w=d.width||100;disp.h=d.height||100;disp.pivX=d.pivot?.x??0.5;disp.pivY=d.pivot?.y??0.5;return disp})});arm.skins.push(skin)});
  if(!arm.skins.length)arm.skins.push(new Skin());
  (a0.animation||[]).forEach(a=>{const an=new Animation(a.name,arm.fps);an.dur=a.duration||DDUR;an.loop=(a.playTimes||0)===0;
    (a.bone||[]).forEach(bt=>{const bid=bmap[bt.name];if(!bid)return;const tr=an.bt_(bid);let t=0;(bt.translateFrame||[]).forEach(f=>{tr.set('tf',t,{x:f.x||0,y:f.y||0});t+=f.duration||1});t=0;(bt.rotateFrame||[]).forEach(f=>{tr.set('rf',t,{rot:f.rotate||0});t+=f.duration||1});t=0;(bt.scaleFrame||[]).forEach(f=>{tr.set('sf',t,{sx:f.x??1,sy:f.y??1});t+=f.duration||1})});
    (a.slot||[]).forEach(st=>{const sid=smap[st.name];if(!sid)return;const tr=an.st_(sid);let t=0;(st.frame||[]).forEach(f=>{tr.set(t,f.displayIndex||0);t+=f.duration||1})});arm.anims[a.name]=an});
  A.arm=arm;A.selBones=[];A.selSlot=null;const ns=Object.keys(arm.anims);A.anim=ns.length?arm.anims[ns[0]]:null;A.frame=0;
}
function exportDBJSON(){

      slot:Object.entries(a.st).filter(([,t])=>t.has()).map(([sid,t])=>({name:sn(sid),frame:t.df.map((f,i)=>({duration:(t.df[i+1]?.t||a.dur)-f.t,displayIndex:f.di||0}))}))})),
    ik:[]}],textureAtlas:[{width:2048,height:2048,name:'texture',imagePath:arm.name+'_tex.png',SubTexture:arm.skins.flatMap(sk=>Object.values(sk.slots).flatMap(ds=>ds.filter(Boolean).map(d=>({name:d.name,x:0,y:0,width:d.w,height:d.h}))))}]};

document.getElementById('tl-delanim').addEventListener('click',delAnim);
document.getElementById('tl-fps').addEventListener('change',function(){if(A.anim){A.anim.fps=Math.max(1,+this.value);A.arm.fps=A.anim.fps;sh()}});
document.getElementById('tl-dur').addEventListener('change',function(){if(A.anim){A.anim.dur=Math.max(1,+this.value);sh();renderTL()}});
document.getElementById('tl-kf').addEventListener('click',addKF);
document.getElementById('tl-dkf').addEventListener('click',delKF);
document.querySelectorAll('.ptab[data-tab]').forEach(t=>t.addEventListener('click',()=>{A.ui.tab=t.dataset.tab;document.querySelectorAll('.ptab[data-tab]').forEach(x=>x.classList.toggle('on',x===t));document.getElementById('tab-label').textContent=t.textContent;renderLeft()}));
document.getElementById('lp-add').addEventListener('click',()=>{const tab=A.ui.tab;if(tab==='bones'){const b=new Bone('bone_'+A.arm.bones.length);A.arm.bones.push(b);const sl=new Slot(b.name+'_slot',b.id);sl.z=A.arm.slots.length;A.arm.slots.push(sl);A.arm.skin.ensure(sl.id);A.selBones=[b.id];sh();renderLeft();updateRight();render()}else if(tab==='slots'){const sl=new Slot('slot_'+A.arm.slots.length,A.selBones[0]||null);sl.z=A.arm.slots.length;A.arm.slots.push(sl);A.arm.skin.ensure(sl.id);A.selSlot=sl.id;A.selBones=[];sh();renderLeft();updateRight()}else askText('New Skin','Name:','skin_'+A.arm.skins.length,n=>{if(n){A.arm.skins.push(new Skin(n));sh();renderLeft();toast('Skin: '+n)}})});
document.getElementById('lp-del').addEventListener('click',()=>{if(A.selBones.length)deleteBone(A.selBones[0]);else if(A.selSlot)deleteSlot(A.selSlot);else toast('Nothing selected','err')});

/* ── Resize ────────────────────────────────────────────── */
window.addEventListener('resize',()=>{resize();render();renderTL()});
if(window.ResizeObserver){new ResizeObserver(()=>{resize();render();renderTL()}).observe(document.getElementById('vp-wrap'))}

/* ── Init ──────────────────────────────────────────────── */
function init(){
  try{
    resize();A.vp.x=A.vp.w/2;A.vp.y=A.vp.h/2;
    sh();all();
    setTimeout(()=>{
      const ld=document.getElementById('loading');
      ld.style.transition='opacity .35s ease';ld.style.opacity='0';
      setTimeout(()=>{try{ld.remove()}catch(e){}},360);
      toast(IS_TOUCH?'Tap 🖼 to import your image. Two fingers to pan/zoom.':'Click 🖼 Import Image to get started.');
    },800);
  }catch(err){
    const ld=document.getElementById('loading');
    ld.innerHTML=`<div class="ld-logo">⬡ DragonBones</div><div class="ld-err">Load error: ${err.message}<br><br>Please refresh the page.</div>`;
    console.error('Init error:',err);
  }
}
init();
</script>
</body>
</html>
