<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SpriteSmith Studio — Pixel Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <div class="hdr-logo">
    <span class="logo-name">SpriteSmith</span>
    <span class="logo-tag">PIXEL EDITOR v7</span>
  </div>
  <div class="hdr-mid">
    <label class="hdr-lbl">W <input type="number" id="cfgW" value="64" min="8" max="256" step="8"></label>
    <label class="hdr-lbl">H <input type="number" id="cfgH" value="64" min="8" max="256" step="8"></label>
    <button class="btn btn-ghost btn-sm" id="newBtn">✦ New</button>
    <label class="btn btn-ghost btn-sm" title="Import image as first frame">
      ⬆ Import <input type="file" id="importFile" accept="image/*" hidden>
    </label>
    <label class="btn btn-ghost btn-sm" title="Load saved project">
      📂 Load <input type="file" id="loadFile" accept=".sss" hidden>
    </label>
    <button class="btn btn-ghost btn-sm" id="saveProjectBtn">💾 Save</button>
  </div>
  <div class="hdr-right">
    <button class="btn btn-amber btn-sm" id="exportBtn">↓ Export PNG</button>
    <button class="btn btn-amber btn-sm" id="exportJsonBtn">↓ Export JSON</button>
  </div>
</header>

<div id="layout">

  <!-- LEFT TOOLBAR -->
  <aside id="toolpanel">
    <div class="tool-section">
      <div class="tool-grid" id="toolGrid">
        <button class="tool-btn active" data-tool="pencil" title="Pencil (B)">✏</button>
        <button class="tool-btn" data-tool="eraser"  title="Eraser (E)">◻</button>
        <button class="tool-btn" data-tool="fill"    title="Fill (F)">🪣</button>
        <button class="tool-btn" data-tool="picker"  title="Eyedropper (I)">💉</button>
        <button class="tool-btn" data-tool="rect"    title="Rectangle (R)">▭</button>
        <button class="tool-btn" data-tool="move"    title="Move (M)">✥</button>
        <button class="tool-btn" data-tool="select"  title="Select (S)">⬚</button>
        <button class="tool-btn" data-tool="line"    title="Line (L)">╱</button>
      </div>
    </div>

    <div class="tool-section">
      <div class="color-swatches">
        <div id="primarySwatch"   class="swatch swatch-primary" title="Primary colour (click to change)"></div>
        <div id="secondarySwatch" class="swatch swatch-secondary" title="Secondary colour (right-click canvas)"></div>
        <button class="swatch-swap" id="swapColors" title="Swap colours (X)">⇄</button>
      </div>
      <input type="color" id="colorPicker" value="#ffffff" style="display:none">
      <input type="color" id="colorPicker2" value="#000000" style="display:none">
    </div>

    <div class="tool-section">
      <div class="palette-grid" id="paletteGrid"></div>
      <div class="palette-actions">
        <button class="btn btn-ghost btn-xs" id="addPaletteColor">+</button>
        <button class="btn btn-ghost btn-xs" id="clearPalette">✕</button>
      </div>
    </div>

    <div class="tool-section">
      <div class="ctl-row">
        <span class="ctl-lbl">SIZE</span>
        <select id="brushSize" class="sel-sm">
          <option value="1" selected>1px</option>
          <option value="2">2px</option>
          <option value="3">3px</option>
          <option value="4">4px</option>
        </select>
      </div>
      <div class="ctl-row">
        <span class="ctl-lbl">ZOOM</span>
        <div class="zoom-btns">
          <button class="btn btn-ghost btn-xs" id="zoomOut">−</button>
          <span id="zoomLabel">8×</span>
          <button class="btn btn-ghost btn-xs" id="zoomIn">+</button>
        </div>
      </div>
      <div class="ctl-row">
        <span class="ctl-lbl">GRID</span>
        <label class="toggle-label">
          <input type="checkbox" id="showGrid" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="tool-section">
      <div class="shortcut-hint">B pencil · E erase<br>F fill · I pick<br>R rect · L line<br>M move · X swap<br>Z undo · [ ] brush</div>
    </div>
  </aside>

  <!-- EDITOR AREA -->
  <div id="editorArea">

    <!-- CANVAS WRAPPER -->
    <div id="canvasWrap">
      <canvas id="editorCanvas"></canvas>
    </div>

    <!-- FRAME STRIP -->
    <div id="frameStrip">
      <div id="frameList"></div>
      <div id="frameActions">
        <button class="btn btn-ghost btn-xs" id="addFrame"  title="Add blank frame">+ Frame</button>
        <button class="btn btn-ghost btn-xs" id="dupFrame"  title="Duplicate current frame">⊕ Dup</button>
        <button class="btn btn-ghost btn-xs" id="delFrame"  title="Delete current frame">✕ Del</button>
        <button class="btn btn-ghost btn-xs" id="moveLeft"  title="Move frame left">◀</button>
        <button class="btn btn-ghost btn-xs" id="moveRight" title="Move frame right">▶</button>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL: Preview + Onion -->
  <aside id="previewPanel">

    <div class="panel-sect">
      <div class="panel-hdr-sm">ANIMATION PREVIEW</div>
      <div id="previewWrap">
        <canvas id="previewCanvas" width="128" height="128"></canvas>
      </div>
      <div class="preview-controls">
        <button class="btn btn-ghost btn-xs" id="playBtn">▶ Play</button>
        <label class="ctl-lbl">FPS
          <input type="number" id="fpsInput" value="8" min="1" max="60" style="width:36px">
        </label>
      </div>
    </div>

    <div class="panel-sect">
      <div class="panel-hdr-sm">ONION SKIN</div>
      <label class="toggle-label">
        <input type="checkbox" id="onionToggle">
        <span class="toggle-track"></span>
        <span style="font-size:9px;color:var(--txt2);margin-left:4px">Enable</span>
      </label>
      <div class="ctl-row">
        <span class="ctl-lbl">PREV</span>
        <input type="range" id="onionPrev" class="slider-sm" min="0" max="3" step="1" value="1">
        <span id="onionPrevVal" class="ctl-accent">1</span>
      </div>
      <div class="ctl-row">
        <span class="ctl-lbl">OPACITY</span>
        <input type="range" id="onionOpacity" class="slider-sm" min="10" max="70" step="5" value="35">
        <span id="onionOpacityVal" class="ctl-accent">35%</span>
      </div>
    </div>

    <div class="panel-sect">
      <div class="panel-hdr-sm">FRAME INFO</div>
      <div id="frameInfo" class="frame-info-text">Frame 1 / 1</div>
      <div id="cursorInfo" class="frame-info-text">—</div>
    </div>

    <div class="panel-sect">
      <div class="panel-hdr-sm">SPRITE SHEET</div>
      <div class="ctl-row">
        <span class="ctl-lbl">LAYOUT</span>
        <select id="sheetLayout" class="sel-sm">
          <option value="horizontal">Strip</option>
          <option value="grid">Grid</option>
        </select>
      </div>
      <div class="sheet-preview-wrap">
        <canvas id="sheetThumb"></canvas>
      </div>
    </div>

  </aside>
</div>

<div id="toast" class="toast"></div>

<!-- MODAL: New sprite -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-ttl">New Sprite</div>
    <label>Width (px) <input type="number" id="mW" value="64" min="8" max="512"></label>
    <label>Height (px) <input type="number" id="mH" value="64" min="8" max="512"></label>
    <label>Frames <input type="number" id="mF" value="1" min="1" max="64"></label>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalOk">Create</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
