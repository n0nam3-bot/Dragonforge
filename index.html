<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Debugger</title>
    <style>
        body { margin: 0; background: #222; color: #eee; font-family: sans-serif; overflow: hidden; }
        #canvas { display: block; width: 100vw; height: 100vh; background: #000; }
        #overlay { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; pointer-events: none;
        }
        button { 
            pointer-events: auto; padding: 10px 15px; margin-right: 10px; font-size: 14px; cursor: pointer; background: #4CAF50; border: none; color: white; border-radius: 4px;
        }
        .debug { color: #aaa; font-size: 12px; margin-top: 5px; }
        .status-text { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        #fileInput { display: none; }
        .btn-upload { background: #4CAF50; padding: 10px; cursor: pointer; border-radius: 4px; color: white; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="status-text" id="status">👈 Click "Open Image" to Start</div>
        <div class="debug">
            <div id="console"></div>
            <br>
            <button onclick="uploadImage()">📂 Open Image</button>
            <button onclick="reset()">🔄 Reset</button>
            <button onclick="toggleDraw()">👁 Toggle Draw</button>
        </div>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <script>
        // --- SETUP ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const consoleEl = document.getElementById('console');
        const fileInput = document.getElementById('fileInput');
        
        let image = null;
        let pose = null;
        let runningMode = false; // True = camera, False = image
        
        // --- LOGGING ---
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            consoleEl.innerHTML = `> [${time}] ${msg}<br>${consoleEl.innerHTML}`;
        }

        // --- INITIALIZATION ---
        async function init() {
            const poseC = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
            
            poseC.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.3
            });

            poseC.onResults(onResults);
            pose = poseC;
            log("MediaPipe Pose Model Loaded. Waiting for image...");
        }

        init();

        // --- EVENT LISTENERS ---
        // Allow clicking the "Open Image" button
        document.querySelector('.btn-upload').click = (e) => fileInput.click();
        
        // Listen to file input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Resize canvas to image size (but capped)
                    const maxW = 1280;
                    let w = img.width;
                    let h = img.height;
                    
                    // Simple scaling for performance
                    if (w > maxW) {
                        h = h * (maxW / w);
                        w = maxW;
                    }

                    canvas.width = w;
                    canvas.height = h;
                    
                    image = img;
                    
                    // Draw the image first
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    // Tell MediaPipe to process
                    log("Image loaded. Starting Pose Detection...");
                    pose.send({image: image});
                    statusEl.innerText = "👀 Processing...";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- DRAWING ---
        function onResults(results) {
            if (!image) return;

            // Clear and redraw image
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(image, 0, 0);

            if (results.poseLandmarks) {
                log(`Pose detected! (${results.poseLandmarks.length} points)`);
                
                try {
                    // Connect skeleton lines
                    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, 0, DrawingUtils.RED, 2);
                    
                    // Draw landmarks
                    drawLandmarks(ctx, results.poseLandmarks, 5);
                    
                    // Status message
                    statusEl.innerText = "✅ Skeleton Found!";
                    statusEl.style.color = "#6bff6b";
                    log("Drawing skeleton complete.");

                } catch (e) {
                    statusEl.innerText = "Error Drawing: " + e.message;
                    log("ERROR: " + e.message);
                }
            } else {
                log("No pose found (waiting for tracking).");
            }
        }

        function drawConnectors(ctx, landmarks, connect, color, lineWidth) {
            for (let i = 0; i < connect.length; i++) {
                const start = landmarks[connect[i][0]];
                const end = landmarks[connect[i][1]];
                ctx.beginPath();
                ctx.moveTo(start.x * canvas.width, start.y * canvas.height);
                ctx.lineTo(end.x * canvas.width, end.y * canvas.height);
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        function drawLandmarks(ctx, landmarks, color) {
            for (let i = 0; i < landmarks.length; i++) {
                const pt = landmarks[i];
                ctx.beginPath();
                ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 4, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
            }
        }

        function toggleDraw() {
            log("Debug: Clearing canvas to show raw image.");
            ctx.drawImage(image, 0, 0);
        }

        function reset() {
            log("Resetting...");
            fileInput.value = '';
            image = null;
            statusEl.innerText = "👈 Click 'Open Image' to Start";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        // Allow dragging image onto page to work too
        canvas.addEventListener('dragover', (e) => e.preventDefault());
        canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if(file) fileInput.files[0] = file;
        });

    </script>
</body>
</html>
