<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skeleton Demo</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; padding: 20px; }
        #canvas { background: #111; border: 1px solid #444; display: block; max-width: 100%; margin: 0 auto; }
        #controls { text-align: center; padding: 15px; background: #333; border-radius: 8px; margin-top: 15px; }
        input[type="file"] { display: none; }
        .btn { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .status { margin-top: 10px; font-size: 14px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <input type="file" id="upload" accept="image/*">
        <label for="upload" class="btn">Upload Image</label>
        <div id="status" class="status">Waiting for image...</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const upload = document.getElementById('upload');
        const status = document.getElementById('status');
        let results = null;

        // Setup Pose Model
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.3
        });

        pose.onResults((results) => {
            this.onResults(results);
        });

        // Handle image upload
        upload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    status.textContent = 'Skeleton detected!';
                    status.style.color = '#6bff6b';

                    // Start pose detection
                    pose.send({ image: img });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Process each frame
        function onResults(results) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.poseLandmarks) {
                // Draw skeleton
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, 0, DrawingUtils.RED, 2);
                drawLandmarks(ctx, results.poseLandmarks, 5);
            }
        }

        // Connects skeleton points
        function drawConnectors(ctx, landmarks, connect, color, lineWidth) {
            for (let i = 0; i < connect.length; i++) {
                const line = connect[i];
                const start = landmarks[line[0]];
                const end = landmarks[line[1]];
                ctx.beginPath();
                ctx.moveTo(start.x * canvas.width, start.y * canvas.height);
                ctx.lineTo(end.x * canvas.width, end.y * canvas.height);
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        // Draw joints
        function drawLandmarks(ctx, landmarks, color) {
            for (let i = 0; i < landmarks.length; i++) {
                const point = landmarks[i];
                ctx.beginPath();
                ctx.arc(point.x * canvas.width, point.y * canvas.height, 5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
            }
        }
    </script>
</body>
</html>
