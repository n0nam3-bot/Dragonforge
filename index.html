<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Animation Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Sprite Sheet Animator</h1>
        <div id="toast" class="toast">Ready</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="control-group">
            <label>Layout:</label>
            <select id="layoutSelect">
                <option value="horizontal">Horizontal Strip</option>
                <option value="grid">Grid</option>
            </select>
            <label>Size:</label>
            <select id="sizeSelect">
                <option value="32">32px</option>
                <option value="64">64px</option>
                <option value="128">128px</option>
            </select>
        </div>
        <div class="control-group">
            <label>Frames:</label>
            <input type="range" id="framesSlider" min="1" max="64" value="1">
        </div>
        <button id="bakeBtn">Bake to Sheet</button>
        <button id="exportPNG">Export PNG</button>
        <button id="exportJSON">Export JSON</button>
    </div>

    <div class="canvas-container">
        <!-- Background / Preview Canvas -->
        <div class="canvas-wrapper">
            <canvas id="previewCanvas" width="640" height="640"></canvas>
        </div>

        <!-- Skeleton / Editor Canvas -->
        <div class="canvas-wrapper" id="skelWrap">
            <canvas id="skelCanvas" width="640" height="640"></canvas>
        </div>

        <!-- Final Sprite Sheet Output -->
        <div class="canvas-wrapper">
            <canvas id="sheetCanvas" width="640" height="640"></canvas>
        </div>
    </div>

    <!-- Import order matters for ES Modules -->
    <script type="module" src="bodyDetect.js"></script>
    <script type="module" src="skelEditor.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
