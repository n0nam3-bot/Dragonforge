/* Export / Import */
function exportRaw(){
  const arm=S.arm;
  return{name:arm.name,fps:arm.fps,
    bones:arm.bones.map(b=>({id:b.id,name:b.name,pid:b.parentId,x:b.x,y:b.y,rot:b.rot,sx:b.sx,sy:b.sy,len:b.len,vis:b.vis})),
    slots:arm.slots.map(s=>({id:s.id,name:s.name,bid:s.boneId,idx:s.dispIdx,z:s.z,vis:s.vis,alpha:s.alpha})),
    skins:arm.skins.map(sk=>({name:sk.name,slots:Object.fromEntries(Object.entries(sk.slots).map(([sid,ds])=>[sid,ds.map(d=>d?({
      name:d.name,type:d.type,w:d.w,h:d.h,pivX:d.pivX,pivY:d.pivY,
      x:d.x,y:d.y,rot:d.rot,sx:d.sx,sy:d.sy,dataURL:d.dataURL,
      mesh:d.mesh?{verts:d.mesh.verts,uvs:d.mesh.uvs,tris:d.mesh.tris,weights:d.mesh.weights,cols:d.mesh.cols,rows:d.mesh.rows}:null
    }):null)]))})),
    anims:Object.fromEntries(Object.entries(arm.anims).map(([n,a])=>[n,{name:a.name,fps:a.fps,dur:a.dur,loop:a.loop,
      bt:Object.fromEntries(Object.entries(a.bt).map(([id,t])=>[id,{boneId:t.boneId,tf:[...t.tf],rf:[...t.rf],sf:[...t.sf]}])),
      st:Object.fromEntries(Object.entries(a.st).map(([id,t])=>[id,{slotId:t.slotId,df:[...t.df]}]))}]))};}
function importRaw(raw){_uid=1;S.imgs={};
  const arm=new Armature(raw.name||'Armature');arm.fps=raw.fps||DFPS;
  (raw.bones||[]).forEach(b=>{const bone=new Bone(b.name,b.pid||null);bone.id=b.id;Object.assign(bone,{x:b.x||0,y:b.y||0,rot:b.rot||0,sx:b.sx??1,sy:b.sy??1,len:b.len||DLEN,vis:b.vis??true});arm.bones.push(bone)});
  (raw.slots||[]).forEach(s=>{const slot=new Slot(s.name,s.bid||null);slot.id=s.id;Object.assign(slot,{dispIdx:s.idx||0,z:s.z||0,vis:s.vis??true,alpha:s.alpha??1});arm.slots.push(slot)});
  arm.skins=[];
  (raw.skins||[]).forEach(sk=>{const skin=new Skin(sk.name);
    Object.entries(sk.slots||{}).forEach(([sid,ds])=>{skin.slots[sid]=(ds||[]).map(d=>{if(!d)return null;
      const disp=new Display(d.name,d.type||'image');Object.assign(disp,{w:d.w,h:d.h,pivX:d.pivX??0.5,pivY:d.pivY??0.5,x:d.x||0,y:d.y||0,rot:d.rot||0,sx:d.sx??1,sy:d.sy??1});
      if(d.dataURL){disp.dataURL=d.dataURL;const img=new Image();img.src=d.dataURL;disp._img=img;S.imgs[d.name]={url:d.dataURL,img,w:d.w,h:d.h}}
      if(d.mesh)disp.mesh={...d.mesh,verts:[...d.mesh.verts.map(v=>({...v}))],uvs:[...d.mesh.uvs],tris:[...d.mesh.tris],weights:d.mesh.weights.map(bws=>[...(bws||[]).map(w=>({...w}))])};
      return disp;})});arm.skins.push(skin)});
  if(!arm.skins.length)arm.skins.push(new Skin());
  Object.entries(raw.anims||{}).forEach(([n,a])=>{const anim=new Animation(a.name,a.fps||DFPS);anim.dur=a.dur||DDUR;anim.loop=a.loop??true;
    Object.entries(a.bt||{}).forEach(([id,t])=>{const tr=new BoneTrack(id);tr.tf=[...(t.tf||[])];tr.rf=[...(t.rf||[])];tr.sf=[...(t.sf||[])];anim.bt[id]=tr});
    Object.entries(a.st||{}).forEach(([id,t])=>{const tr=new SlotTrack(id);tr.df=[...(t.df||[])];anim.st[id]=tr});
    arm.anims[n]=anim});
  const allIds=[...arm.bones.map(b=>b.id),...arm.slots.map(s=>s.id)];allIds.forEach(id=>{const n=parseInt(id.replace(/\D/g,''));if(!isNaN(n)&&n>=_uid)_uid=n+1});
  S.arm=arm;S.selBones=[];S.selSlot=null;S.anim=null;S.frame=0;S.playing=false;
  S.meshEdit={slot:null,selVert:null,paintBone:null,paintW:1,dragOn:false,dsx:0,dsy:0,dov:{x:0,y:0}};
}
function importDB(json){_uid=1;S.imgs={};
  const a0=json.armature?.[0];if(!a0){toast('No armature found','err');return}
  const arm=new Armature(a0.name||'Armature');arm.fps=a0.frameRate||json.frameRate||DFPS;
  const bmap={};
  (a0.bone||[]).forEach(b=>{const bone=new Bone(b.name,null);bone.x=b.transform?.x||0;bone.y=b.transform?.y||0;bone.rot=b.transform?.skX||0;bone.sx=b.transform?.scX??1;bone.sy=b.transform?.scY??1;bone.len=b.length||DLEN;bmap[b.name]=bone.id;arm.bones.push(bone)});
  (a0.bone||[]).forEach(b=>{if(b.parent){const child=arm.boneByName(b.name);if(child)child.parentId=bmap[b.parent]||null}});
  const smap={};
  (a0.slot||[]).forEach((s,i)=>{const bone=arm.boneByName(s.parent);const slot=new Slot(s.name,bone?.id||null);slot.z=s.z||i;smap[s.name]=slot.id;arm.slots.push(slot)});
  arm.skins=[];
  (a0.skin||[]).forEach(sk=>{const skin=new Skin(sk.name||'default');
    (sk.slot||[]).forEach(ss=>{const sid=smap[ss.name];if(!sid)return;skin.slots[sid]=(ss.display||[]).map(d=>{
      const disp=new Display(d.name||'','image');disp.x=d.transform?.x||0;disp.y=d.transform?.y||0;disp.rot=d.transform?.skX||0;disp.sx=d.transform?.scX??1;disp.sy=d.transform?.scY??1;disp.w=d.width||100;disp.h=d.height||100;disp.pivX=d.pivot?.x??0.5;disp.pivY=d.pivot?.y??0.5;return disp;})});arm.skins.push(skin)});
  if(!arm.skins.length)arm.skins.push(new Skin());
  (a0.animation||[]).forEach(a=>{const anim=new Animation(a.name,arm.fps);anim.dur=a.duration||DDUR;anim.loop=(a.playTimes||0)===0;
    (a.bone||[]).forEach(bt=>{const bid=bmap[bt.name];if(!bid)return;const tr=anim.bt_(bid);
      let t=0;(bt.translateFrame||[]).forEach(f=>{tr.set('tf',t,{x:f.x||0,y:f.y||0},f.tweenEasing??0);t+=f.duration||1});
      t=0;(bt.rotateFrame||[]).forEach(f=>{tr.set('rf',t,{rot:f.rotate||0},f.tweenEasing??0);t+=f.duration||1});
      t=0;(bt.scaleFrame||[]).forEach(f=>{tr.set('sf',t,{sx:f.x??1,sy:f.y??1},f.tweenEasing??0);t+=f.duration||1})});
    (a.slot||[]).forEach(st=>{const sid=smap[st.name];if(!sid)return;const tr=anim.st_(sid);let t=0;(st.frame||[]).forEach(f=>{tr.set(t,{idx:f.displayIndex||0});t+=f.duration||1})});
    arm.anims[a.name]=anim});
  S.arm=arm;S.selBones=[];S.selSlot=null;const an=Object.keys(arm.anims);S.anim=an.length?arm.anims[an[0]]:null;S.frame=0;
}
function exportDBJSON(){
  const arm=S.arm;const bn=id=>arm.bone(id)?.name||id,sn=id=>arm.slot(id)?.name||id;
  const aabb=arm.aabb();
  const out={frameRate:arm.fps,name:arm.name,version:'5.5',compatibleVersion:'5.5',
    armature:[{type:'Armature',frameRate:arm.fps,name:arm.name,
      aabb:{x:Math.round(aabb.x),y:Math.round(aabb.y),width:Math.round(aabb.w),height:Math.round(aabb.h)},
      bone:arm.bones.map(b=>({length:b.len,name:b.name,...(b.parentId?{parent:bn(b.parentId)}:{}),transform:{x:b.x,y:b.y,skX:b.rot,skY:b.rot,scX:b.sx,scY:b.sy}})),
      slot:arm.slots.map(s=>({name:s.name,parent:bn(s.boneId)||'root',z:s.z})),
      skin:arm.skins.map(sk=>({name:sk.name,slot:Object.entries(sk.slots).filter(([,d])=>d?.length).map(([sid,ds])=>({name:sn(sid),
        display:ds.filter(Boolean).map(d=>({name:d.name,...(d.type!=='image'?{type:d.type}:{}),
          transform:{x:d.x,y:d.y,skX:d.rot,skY:d.rot,scX:d.sx,scY:d.sy},pivot:{x:d.pivX,y:d.pivY},width:d.w,height:d.h}))}))})),
      animation:Object.values(arm.anims).map(a=>({duration:a.dur,name:a.name,playTimes:a.loop?0:1,frame:[],
        bone:Object.entries(a.bt).filter(([,t])=>t.has()).map(([bid,t])=>({name:bn(bid),
          translateFrame:t.tf.map((f,i)=>({duration:(t.tf[i+1]?.time||a.dur)-f.time,tweenEasing:f.ease??0,x:f.x||0,y:f.y||0})),
          rotateFrame:t.rf.map((f,i)=>({duration:(t.rf[i+1]?.time||a.dur)-f.time,tweenEasing:f.ease??0,rotate:f.rot||0})),
          scaleFrame:t.sf.map((f,i)=>({duration:(t.sf[i+1]?.time||a.dur)-f.time,tweenEasing:f.ease??0,x:f.sx??1,y:f.sy??1}))})),
        slot:Object.entries(a.st).filter(([,t])=>t.has()).map(([sid,t])=>({name:sn(sid),
          frame:t.df.map((f,i)=>({duration:(t.df[i+1]?.time||a.dur)-f.time,displayIndex:f.idx||0}))}))})),
      ik:[]}],
    textureAtlas:[{width:2048,height:2048,name:'texture',imagePath:arm.name+'_tex.png',
      SubTexture:arm.skins.flatMap(sk=>Object.values(sk.slots).flatMap(ds=>ds.filter(Boolean).map(d=>({name:d.name,x:0,y:0,width:d.w,height:d.h}))))}]};
  dlJson(out,arm.name+'_ske.json');toast('Exported: '+arm.name+'_ske.json','ok');
}
function exportAtlas(){
  const dsps=[];S.arm.skins.forEach(sk=>Object.values(sk.slots).forEach(arr=>arr.forEach(d=>{if(d&&d._img)dsps.push(d)})));
  if(!dsps.length){toast('No images to export','err');return}
  const canvas=document.createElement('canvas');canvas.width=2048;canvas.height=2048;
  const c=canvas.getContext('2d');let x=0,y=0,rowH=0;
  dsps.forEach(d=>{if(x+d.w>2048){x=0;y+=rowH;rowH=0}c.drawImage(d._img,x,y,d.w,d.h);x+=d.w+2;rowH=Math.max(rowH,d.h+2)});
  canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=S.arm.name+'_tex.png';a.click();toast('Texture atlas exported','ok')},'image/png');
}
function saveProject(){dlJson(exportRaw(),S.arm.name+'_project.json');toast('Saved','ok')}
function dlJson(obj,name){const b=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click()}
function newProject(){if(!confirm('Start new project? Unsaved changes will be lost.'))return;
  _uid=1;S.arm=new Armature();S.imgs={};S.selBones=[];S.selSlot=null;S.anim=null;S.frame=0;S.playing=false;
  S.hist=[];S.hIdx=-1;S.meshEdit={slot:null,selVert:null,paintBone:null,paintW:1,dragOn:false,dsx:0,dsy:0,dov:{x:0,y:0}};
  zoomReset();saveH();refreshAll();toast('New project')}
document.getElementById('file-json').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  try{const text=await f.text();const raw=JSON.parse(text);
    if(raw.armature&&Array.isArray(raw.armature)){importDB(raw);S.hist=[];S.hIdx=-1}
    else if(raw.bones)importRaw(raw);else{toast('Unknown format','err');return}
    refreshAll();toast('Loaded: '+f.name,'ok');
  }catch(ex){toast('Error: '+ex.message,'err');console.error(ex)}e.target.value=''});

/* Splitters */
function mkSpl(id,dir,getEl,getSize,setSize){
  const el=document.getElementById(id);let on=false,start=0,init=0;
  const md=e=>{on=true;start=dir==='h'?e.clientX:e.clientY;init=getSize();el.classList.add('drag');e.preventDefault()};
  const mm=e=>{if(!on)return;const d=(dir==='h'?e.clientX:e.clientY)-start;setSize(Math.max(80,Math.min(550,init+d)));resize();render();renderTL()};
  const mu=()=>{on=false;el.classList.remove('drag')};
  el.addEventListener('mousedown',md);document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  el.addEventListener('touchstart',e=>{start=dir==='h'?e.touches[0].clientX:e.touches[0].clientY;init=getSize();on=true;e.preventDefault()},{passive:false});
  document.addEventListener('touchmove',e=>{if(!on)return;const pos=dir==='h'?e.touches[0].clientX:e.touches[0].clientY;setSize(Math.max(80,Math.min(550,init+(pos-start))));resize();render();renderTL()},{passive:true});
  document.addEventListener('touchend',()=>{on=false},{passive:true});}
mkSpl('spl-l','h',()=>null,()=>document.getElementById('left-panel').offsetWidth,w=>{document.getElementById('left-panel').style.width=w+'px';document.getElementById('tl-tracks').style.width=w+'px'});
mkSpl('spl-r','h',()=>null,()=>document.getElementById('right-panel').offsetWidth,w=>document.getElementById('right-panel').style.width=w+'px');
mkSpl('spl-tl','v',()=>null,()=>document.getElementById('timeline').offsetHeight,h=>document.getElementById('timeline').style.height=h+'px');

/* Mobile panels */
function togglePanel(id){
  if(id==='tl'){const tl=document.getElementById('timeline');tl.style.display=tl.style.display==='none'?'flex':'none';document.getElementById('mn-anim').classList.toggle('on',tl.style.display!=='none');resize();render();renderTL();return}
  const panel=document.getElementById(id+'-panel');const isOpen=panel.classList.contains('open');
  document.getElementById('left-panel').classList.remove('open');document.getElementById('right-panel').classList.remove('open');
  document.getElementById('mn-hier').classList.remove('on');document.getElementById('mn-props').classList.remove('on');
  document.getElementById('backdrop').style.display='none';
  if(!isOpen){panel.classList.add('open');document.getElementById('backdrop').style.display='block';document.getElementById('mn-'+( id==='left'?'hier':'props')).classList.add('on')}
}
function closeAllPanels(){document.getElementById('left-panel').classList.remove('open');document.getElementById('right-panel').classList.remove('open');document.getElementById('backdrop').style.display='none';document.getElementById('mn-hier').classList.remove('on');document.getElementById('mn-props').classList.remove('on')}
let _fabOpen=false;
function toggleMobileTools(){
  _fabOpen=!_fabOpen;document.getElementById('mn-tools').classList.toggle('on',_fabOpen);
  if(_fabOpen){
    const tools=[['select','↖','Select'],['move','✥','Move'],['rotate','↺','Rotate'],['scale','⤢','Scale'],['bone','🦴','Bone']];
    let html='';tools.forEach(([t,ic,lbl])=>html+=`<button onclick="setTool('${t}');_fabOpen=false;document.getElementById('mn-tools').classList.remove('on');this.parentNode.remove();toast('${lbl} tool')" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;background:var(--bg3);border:1px solid var(--br);border-radius:5px;color:var(--txt);font:14px/1 inherit;margin-bottom:6px;cursor:pointer">${ic} ${lbl}</button>`);
    const fab=document.createElement('div');fab.style.cssText='position:fixed;left:12px;bottom:70px;z-index:300;width:160px';fab.innerHTML=html;document.body.appendChild(fab);
    setTimeout(()=>document.addEventListener('click',function h(e){if(!e.target.closest('.fab-menu')){fab.remove();_fabOpen=false;document.getElementById('mn-tools').classList.remove('on');document.removeEventListener('click',h)}},true),100);
  }
}

/* Toolbar wiring */
document.querySelectorAll('.tool[data-tool]').forEach(b=>b.addEventListener('click',()=>setTool(b.dataset.tool)));
document.getElementById('mode-design').addEventListener('click',()=>setMode('design'));
document.getElementById('mode-anim').addEventListener('click',()=>setMode('anim'));
document.getElementById('tb-grid').addEventListener('click',()=>{S.ui.grid=!S.ui.grid;document.getElementById('tb-grid').classList.toggle('on',S.ui.grid);render()});
document.getElementById('tb-bones').addEventListener('click',()=>{S.ui.bones=!S.ui.bones;document.getElementById('tb-bones').classList.toggle('on',S.ui.bones);render()});
document.getElementById('tb-sprites').addEventListener('click',()=>{S.ui.sprites=!S.ui.sprites;document.getElementById('tb-sprites').classList.toggle('on',S.ui.sprites);render()});
document.getElementById('tb-names').addEventListener('click',()=>{S.ui.names=!S.ui.names;document.getElementById('tb-names').classList.toggle('on',S.ui.names);render()});

document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);
document.getElementById('btn-help').addEventListener('click',()=>infoModal('Help — DragonBones Web Editor',`
  <b style="color:var(--acc2)">Single sprite rigging (your use case):</b><br>
  1. <b>Import Image</b> — click "Import Image" in the top bar<br>
  2. <b>Draw skeleton</b> — select the 🦴 Bone tool, then click+drag on the canvas to draw bones over your character<br>
  3. <b>Assign image</b> — click the slot in the hierarchy → Properties → Assign Image<br>
  4. <b>Create mesh</b> — in Properties scroll to "Mesh Deformation" → Create Mesh Grid<br>
  5. <b>Auto-bind</b> — click "Auto-Bind Weights" so each part of the mesh follows its nearest bone<br>
  6. <b>Animate</b> — switch to Animate mode, move bones, press K to add keyframes, Space to play<br><br>
  <b style="color:var(--acc2)">Multi-part sprites (sliced character):</b><br>
  Import each body part as a separate image, assign each to its own slot+bone, no mesh needed.<br><br>
  <b style="color:var(--acc2)">Controls:</b><br>
  V/W/E/R = Select/Move/Rotate/Scale &nbsp; A = Bone tool<br>
  M = Edit mesh verts &nbsp; P = Paint weights<br>
  K = Add keyframe &nbsp; Space = Play/Pause<br>
  F = Fit view &nbsp; 0 = Reset zoom &nbsp; Scroll = Zoom<br>
  Ctrl+Z/Y = Undo/Redo &nbsp; Del = Delete selected<br>
  <i>Mobile: Two fingers = pan/pinch-zoom · Long press = context menu</i>`));
/* Panel tabs */
document.querySelectorAll('.panel-tab[data-ltab]').forEach(t=>t.addEventListener('click',()=>{
  S.ui.ltab=t.dataset.ltab;document.querySelectorAll('.panel-tab[data-ltab]').forEach(x=>x.classList.toggle('on',x===t));
  document.getElementById('ltab-label').textContent=t.textContent;renderLeft()}));
document.getElementById('lp-add').addEventListener('click',()=>{
  if(S.ui.ltab==='bones'){const b=new Bone('bone_'+S.arm.bones.length);S.arm.bones.push(b);const sl=new Slot(b.name+'_slot',b.id);sl.z=S.arm.slots.length;S.arm.slots.push(sl);S.arm.skin.ensure(sl.id);S.selBones=[b.id];saveH();renderLeft();updateRight();render()}
  else if(S.ui.ltab==='slots'){const sl=new Slot('slot_'+S.arm.slots.length,S.selBones[0]||null);sl.z=S.arm.slots.length;S.arm.slots.push(sl);S.arm.skin.ensure(sl.id);S.selSlot=sl.id;S.selBones=[];saveH();renderLeft();updateRight()}
  else promptModal('New Skin','Name:','skin_'+S.arm.skins.length,n=>{if(n){S.arm.skins.push(new Skin(n));saveH();renderLeft();toast('Skin: '+n)}})});
document.getElementById('lp-del').addEventListener('click',()=>{if(S.selBones.length)deleteBone(S.selBones[0]);else if(S.selSlot)deleteSlot(S.selSlot);else toast('Nothing selected','err')});
/* Viewport buttons */
document.getElementById('vbtn-zi').addEventListener('click',()=>zoomBy(1.2));
document.getElementById('vbtn-zo').addEventListener('click',()=>zoomBy(1/1.2));
document.getElementById('vbtn-fit').addEventListener('click',zoomFit);
document.getElementById('vbtn-1').addEventListener('click',zoomReset);
/* Timeline */
document.getElementById('tl-start').addEventListener('click',goStart);
document.getElementById('tl-prev').addEventListener('click',()=>stepFrame(-1));

document.getElementById('tl-next').addEventListener('click',()=>stepFrame(1));
document.getElementById('tl-end').addEventListener('click',goEnd);

document.getElementById('tl-anim-sel').addEventListener('change',function(){selAnim(this.value)});
document.getElementById('tl-new-anim').addEventListener('click',newAnim);
document.getElementById('tl-del-anim').addEventListener('click',delAnim);
document.getElementById('tl-fps').addEventListener('change',function(){if(S.anim){S.anim.fps=Math.max(1,+this.value);S.arm.fps=S.anim.fps;saveH()}});
document.getElementById('tl-dur').addEventListener('change',function(){if(S.anim){S.anim.dur=Math.max(1,+this.value);saveH();renderTL()}});
document.getElementById('tl-add-kf').addEventListener('click',addKF);
document.getElementById('tl-del-kf').addEventListener('click',delKF);

/* Resize observer */
window.addEventListener('resize',()=>{resize();render();renderTL()});
if(window.ResizeObserver){new ResizeObserver(()=>{resize();render();renderTL()}).observe(document.getElementById('vpwrap'))}

/* Init */
function init(){
  resize();S.vp.x=S.vp.w/2;S.vp.y=S.vp.h/2;
  saveH();refreshAll();
  setTimeout(()=>{const ld=document.getElementById('loading');ld.style.transition='opacity .35s';ld.style.opacity='0';setTimeout(()=>ld.remove(),350);
    toast(IS_TOUCH?'Welcome! Tap 🦴 to draw bones. Two fingers to pan/zoom.':'Welcome! Use the 🦴 Bone tool to draw your skeleton, then assign your image to a slot.')},900);
}
init();
