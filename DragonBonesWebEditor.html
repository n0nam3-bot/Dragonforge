<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DragonBones Web Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --bg0:#0f0f0f;--bg1:#161616;--bg2:#1e1e1e;--bg3:#262626;--bg4:#303030;
  --br:#333;--br2:#404040;--txt:#d4d4d4;--txt2:#888;--txt3:#4a4a4a;
  --acc:#e8811a;--acc2:#f5a445;--acc3:#6b3610;
  --blue:#3b82f6;--blue2:#1d4ed8;--green:#22c55e;--red:#ef4444;
  --bone:#fbbf24;--bone2:#f97316;--kf:#fde047;
}
body{background:var(--bg0);color:var(--txt);font:13px/1.4 -apple-system,'Segoe UI',Arial,sans-serif;
  overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;touch-action:none}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;gap:14px}
.ld-logo{font-size:28px;font-weight:800;color:var(--acc);letter-spacing:3px}
.ld-bar{width:180px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));
  border-radius:2px;animation:lda .8s ease forwards}
@keyframes lda{0%{width:0}100%{width:100%}}

/* Top bar */
#topbar{height:38px;background:var(--bg1);border-bottom:1px solid var(--br);
  display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;z-index:100}
.tbar-logo{font-size:13px;font-weight:700;color:var(--acc);margin-right:4px}
.tbar-btn{height:28px;padding:0 10px;background:var(--bg3);border:1px solid var(--br);
  border-radius:4px;color:var(--txt2);cursor:pointer;font:12px/1 inherit;
  display:flex;align-items:center;gap:5px;white-space:nowrap}
.tbar-btn:hover{background:var(--bg4);color:var(--txt);border-color:var(--br2)}
.tbar-btn:active{opacity:.8}
.tbar-btn.prim{background:var(--blue2);border-color:var(--blue);color:#fff}
.tbar-btn.prim:hover{background:var(--blue);border-color:var(--blue)}
.tbar-sep{width:1px;height:20px;background:var(--br);margin:0 2px}
.modesw{display:flex;background:var(--bg0);border:1px solid var(--br);border-radius:5px;overflow:hidden}
.modebtn{padding:4px 12px;background:transparent;border:none;color:var(--txt2);
  cursor:pointer;font:12px/1 inherit}
.modebtn.on{background:var(--acc3);color:var(--acc2)}
.modebtn:hover:not(.on){color:var(--txt)}

/* Tools */
#tools{height:38px;background:var(--bg2);border-bottom:1px solid var(--br);
  display:flex;align-items:center;padding:0 8px;gap:3px;flex-shrink:0}
.tool{width:32px;height:30px;background:transparent;border:1px solid transparent;
  border-radius:4px;color:var(--txt2);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center}
.tool:hover{background:var(--bg4);border-color:var(--br);color:var(--txt)}
.tool.on{background:var(--acc3);border-color:var(--acc);color:var(--acc2)}
.tool[title]:hover::after{content:attr(title);position:absolute;top:calc(100% + 4px);
  left:50%;transform:translateX(-50%);background:var(--bg1);border:1px solid var(--br);
  padding:3px 8px;white-space:nowrap;font-size:11px;pointer-events:none;
  z-index:999;border-radius:3px;min-width:max-content;color:var(--txt)}
.tool-sep{width:1px;height:20px;background:var(--br);margin:0 3px}

/* Main */
#main{flex:1;display:flex;overflow:hidden;min-height:0;position:relative}

/* Left Panel */
#left-panel{width:220px;background:var(--bg1);border-right:1px solid var(--br);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s ease}
.panel-tab-bar{display:flex;background:var(--bg0);border-bottom:1px solid var(--br);flex-shrink:0}
.panel-tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;color:var(--txt2);
  cursor:pointer;border-bottom:2px solid transparent}
.panel-tab.on{color:var(--txt);border-bottom-color:var(--acc)}
.panel-tab:hover{color:var(--txt)}
.panel-header{padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--br);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-header span{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.phbtn{padding:2px 8px;background:var(--bg3);border:1px solid var(--br);border-radius:3px;
  color:var(--txt2);cursor:pointer;font:11px/1 inherit;min-height:22px}
.phbtn:hover{background:var(--bg4);color:var(--txt)}
.panel-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.panel-scroll::-webkit-scrollbar{width:5px}
.panel-scroll::-webkit-scrollbar-track{background:var(--bg1)}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
.tree-item{display:flex;align-items:center;padding:5px 8px;cursor:pointer;gap:4px;min-height:28px}
.tree-item:hover{background:var(--bg3)}
.tree-item.sel{background:var(--blue2)}
.tree-item.sel:hover{background:var(--blue)}
.ti-icon{font-size:12px;flex-shrink:0}
.ti-label{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-badge{font-size:10px;color:var(--txt3);flex-shrink:0}
.ti-vis{font-size:11px;opacity:0;cursor:pointer;flex-shrink:0;padding:2px}
.tree-item:hover .ti-vis{opacity:1}
.panel-empty{padding:20px 12px;color:var(--txt3);font-size:12px;text-align:center;line-height:1.7}

/* Viewport */
#vpwrap{flex:1;position:relative;overflow:hidden;background:#080808;min-width:0}
#vp{position:absolute;top:0;left:0;touch-action:none;display:block}
.vp-info{position:absolute;font-size:10px;font-family:monospace;pointer-events:none}
#vp-coords{bottom:8px;left:8px;color:var(--txt3)}
#vp-hint{top:8px;left:50%;transform:translateX(-50%);color:var(--acc);
  background:rgba(0,0,0,.6);padding:4px 10px;border-radius:4px;font-size:11px;
  white-space:nowrap;display:none}
.vp-zoom-ctrl{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:3px}
.vpz-btn{width:28px;height:28px;background:rgba(22,22,22,.9);border:1px solid var(--br);
  border-radius:4px;color:var(--txt2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center}
.vpz-btn:hover{background:var(--bg3);color:var(--txt)}

/* Right Panel */
#right-panel{width:260px;background:var(--bg1);border-left:1px solid var(--br);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s ease}
.props-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.props-scroll::-webkit-scrollbar{width:5px}
.props-scroll::-webkit-scrollbar-track{background:var(--bg1)}
.props-scroll::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
.section{border-bottom:1px solid var(--br)}
.section-hdr{padding:7px 10px;background:var(--bg2);display:flex;align-items:center;
  cursor:pointer;font-size:12px;font-weight:600;gap:6px;color:var(--txt)}
.section-hdr::before{content:'▾';font-size:9px;color:var(--txt2);transition:.15s;flex-shrink:0}
.section-hdr.col::before{transform:rotate(-90deg)}
.section-body{padding:8px 10px}
.field{display:flex;align-items:center;margin-bottom:6px;gap:6px}
.field-label{width:64px;font-size:11px;color:var(--txt2);flex-shrink:0;text-align:right;padding-right:4px}
.field-input{flex:1;background:var(--bg0);border:1px solid var(--br);color:var(--txt);
  padding:5px 7px;font-size:12px;font-family:monospace;border-radius:3px;min-width:0;
  -webkit-appearance:none;width:0}
.field-input:focus{outline:none;border-color:var(--blue)}
.field-input:hover{border-color:var(--br2)}
.field-2col{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex:1}
.field-select{flex:1;background:var(--bg0);border:1px solid var(--br);color:var(--txt);
  padding:5px 7px;font-size:12px;border-radius:3px;font-family:inherit;-webkit-appearance:none}
.field-select:focus{outline:none;border-color:var(--blue)}
.action-btn{width:100%;padding:7px;background:var(--bg3);border:1px solid var(--br);
  border-radius:4px;color:var(--txt);font:12px/1 inherit;cursor:pointer;margin-bottom:5px;
  text-align:left;display:flex;align-items:center;gap:6px;min-height:32px}
.action-btn:hover{background:var(--bg4);border-color:var(--br2)}
.action-btn:active{opacity:.8}
.action-btn.prim{background:var(--blue2);border-color:var(--blue);color:#fff}
.action-btn.prim:hover{background:var(--blue)}
.action-btn.success{background:#15532a;border-color:var(--green);color:var(--green)}
.action-btn.success:hover{background:#1a6634}
.action-btn.danger{background:#450a0a;border-color:var(--red);color:#fca5a5}
.action-btn.danger:hover{background:#5c1010}
.action-btn.accent{background:var(--acc3);border-color:var(--acc);color:var(--acc2)}
.action-btn.accent:hover{background:#7c4214}
.props-empty{padding:24px 14px;color:var(--txt3);font-size:12px;text-align:center;line-height:1.8}

/* Splitter */
.spl-h{width:4px;cursor:col-resize;background:var(--br);flex-shrink:0}
.spl-h:hover,.spl-h.drag{background:var(--blue)}
.spl-v{height:4px;cursor:row-resize;background:var(--br);flex-shrink:0}
.spl-v:hover,.spl-v.drag{background:var(--blue)}

/* Timeline */
#timeline{height:190px;background:var(--bg1);border-top:1px solid var(--br);
  display:flex;flex-direction:column;flex-shrink:0}
#tl-toolbar{height:32px;background:var(--bg2);border-bottom:1px solid var(--br);
  display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;overflow-x:auto}
#tl-toolbar::-webkit-scrollbar{display:none}
.tl-btn{min-width:26px;height:26px;background:var(--bg3);border:1px solid var(--br);
  border-radius:3px;color:var(--txt);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0}
.tl-btn:hover{background:var(--acc3);border-color:var(--acc)}
.tl-btn:active{opacity:.8}
.tl-btn.on{background:var(--acc3);border-color:var(--acc)}
.tl-frame{font-family:monospace;font-size:12px;color:var(--acc);background:var(--bg0);
  border:1px solid var(--br);padding:2px 8px;border-radius:3px;min-width:60px;text-align:center;flex-shrink:0}
.tl-select{background:var(--bg0);border:1px solid var(--br);color:var(--txt);padding:3px 6px;
  font-size:11px;border-radius:3px;font-family:inherit;max-width:130px;flex-shrink:0;-webkit-appearance:none}
.tl-num{width:42px;background:var(--bg0);border:1px solid var(--br);color:var(--txt);
  padding:3px 4px;font-size:11px;border-radius:3px;font-family:monospace;text-align:center;
  flex-shrink:0;-webkit-appearance:none}
.tl-label{font-size:10px;color:var(--txt2);white-space:nowrap;flex-shrink:0}
#tl-body{flex:1;display:flex;overflow:hidden}
#tl-tracks{width:220px;flex-shrink:0;border-right:1px solid var(--br);overflow-y:auto}
#tl-tracks::-webkit-scrollbar{width:4px}
#tl-tracks::-webkit-scrollbar-track{background:var(--bg1)}
#tl-tracks::-webkit-scrollbar-thumb{background:var(--br2)}
#tl-canvas-wrap{flex:1;position:relative;overflow:hidden}
#tl-canvas{position:absolute;top:0;left:0;touch-action:none}
.tl-track-row{height:26px;display:flex;align-items:center;padding:0 8px;gap:4px;
  border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;flex-shrink:0}
.tl-track-row:hover{background:var(--bg3)}
.tl-track-row.sel{background:var(--blue2)}
.tl-track-hdr{height:26px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;
  display:flex;align-items:center;padding:0 8px}

/* Status */
#status{height:22px;background:var(--acc3);border-top:1px solid rgba(0,0,0,.4);
  display:flex;align-items:center;padding:0 10px;gap:14px;flex-shrink:0;font-size:10px;color:rgba(255,255,255,.7)}
#status .sep{color:rgba(255,255,255,.3)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:10000;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--br2);border-radius:8px;padding:22px;
  min-width:280px;max-width:90vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{display:block;font-size:10px;color:var(--txt2);margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.5px}
.modal-input{width:100%;background:var(--bg0);border:1px solid var(--br);color:var(--txt);
  padding:8px 10px;font-size:13px;border-radius:4px;font-family:inherit;-webkit-appearance:none}
.modal-input:focus{outline:none;border-color:var(--blue)}
.modal-input select{-webkit-appearance:none}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.modal-btn{padding:8px 18px;border:1px solid var(--br);border-radius:4px;cursor:pointer;
  font:13px/1 inherit;background:var(--bg3);color:var(--txt);min-height:36px}
.modal-btn.prim{background:var(--blue);border-color:var(--blue);color:#fff}
.modal-btn.prim:hover{background:var(--blue2)}
.modal-btn:hover{background:var(--bg4)}

/* Context menu */
#ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--br2);
  border-radius:6px;z-index:9999;min-width:175px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);display:none}
.ctx-item{padding:9px 15px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;min-height:36px}
.ctx-item:hover{background:var(--blue)}
.ctx-item:active{background:var(--blue2)}
.ctx-item.red{color:#fca5a5}.ctx-item.red:hover{background:#5c1010}
.ctx-sep{height:1px;background:var(--br);margin:3px 0}
.ctx-hdr{padding:4px 15px;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}

/* Toast */
.toast{position:fixed;top:54px;right:14px;background:var(--bg2);
  border:1px solid var(--br2);border-left:3px solid var(--acc);
  padding:8px 14px;border-radius:5px;z-index:9999;font-size:12px;
  animation:tslin .2s ease;pointer-events:none;max-width:260px}
.toast.ok{border-left-color:var(--green)}
.toast.err{border-left-color:var(--red)}
@keyframes tslin{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}

/* Mobile nav */
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--bg1);border-top:1px solid var(--br);z-index:200;
  height:52px;align-items:stretch}
.mn-btn{flex:1;background:transparent;border:none;color:var(--txt2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;font-size:9px;font-family:inherit;padding:4px 2px}
.mn-btn.on{color:var(--acc)}
.mn-btn:active{background:var(--bg3)}
.mn-ico{font-size:18px;line-height:1}

/* Backdrop */
#backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150;touch-action:none}

/* Weight paint overlay colors */
.w-bar{height:6px;border-radius:3px;background:var(--bg3);margin-top:3px;overflow:hidden}
.w-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue2),var(--acc))}

@media(max-width:700px){
  #left-panel{position:fixed;left:0;top:38px;bottom:52px;z-index:200;
    transform:translateX(-105%);box-shadow:4px 0 24px rgba(0,0,0,.7)}
  #left-panel.open{transform:translateX(0)}
  #right-panel{position:fixed;right:0;top:38px;bottom:52px;z-index:200;
    transform:translateX(105%);box-shadow:-4px 0 24px rgba(0,0,0,.7)}
  #right-panel.open{transform:translateX(0)}
  .spl-h{display:none}
  #mobile-nav{display:flex}
  body{padding-bottom:52px}
  #status{display:none}
  .tbar-btn span{display:none}
  .tbar-logo{font-size:12px}
}
@media(max-width:480px){
  #tools .tool{width:36px;height:34px;font-size:17px}
  #timeline{height:160px}
}
@media(hover:none){
  .tree-item,.tl-track-row,.ctx-item,.action-btn{min-height:34px}
  .field-input,.field-select,.modal-input{font-size:14px;min-height:36px}
  .ti-vis{opacity:.7}
}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}::-webkit-scrollbar-corner{background:var(--bg1)}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-logo">⬡ DragonBones</div>
  <div style="font-size:11px;color:var(--txt2)">Web Editor · v5.5</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <span class="tbar-logo">⬡ DB</span>
  <button class="tbar-btn" id="btn-new" title="New">🗋 <span>New</span></button>
  <button class="tbar-btn" id="btn-open" title="Open">📂 <span>Open</span></button>
  <button class="tbar-btn" id="btn-import-img" title="Import images">🖼 <span>Import Image</span></button>
  <div class="tbar-sep"></div>
  <button class="tbar-btn" id="btn-save" title="Save (Ctrl+S)">💾 <span>Save</span></button>
  <button class="tbar-btn prim" id="btn-export" title="Export DragonBones JSON">⬡ <span>Export JSON</span></button>
  <div class="tbar-sep"></div>
  <div class="modesw">
    <button class="modebtn on" id="mode-design">Design</button>
    <button class="modebtn" id="mode-anim">Animate</button>
  </div>
  <div class="tbar-sep" style="margin-left:auto"></div>
  <button class="tbar-btn" id="btn-undo" title="Undo Ctrl+Z">↩</button>
  <button class="tbar-btn" id="btn-redo" title="Redo Ctrl+Y">↪</button>
  <button class="tbar-btn" id="btn-help" title="Help">?</button>
</div>

<!-- TOOL BAR -->
<div id="tools">
  <button class="tool on" data-tool="select" title="Select (V)">↖</button>
  <button class="tool" data-tool="move" title="Move (W)">✥</button>
  <button class="tool" data-tool="rotate" title="Rotate (E)">↺</button>
  <button class="tool" data-tool="scale" title="Scale (R)">⤢</button>
  <div class="tool-sep"></div>
  <button class="tool" data-tool="bone" title="Draw Bone (A) — click+drag">🦴</button>
  <div class="tool-sep"></div>
  <button class="tool" data-tool="mesh-vert" title="Edit Mesh Vertices (M)">⬡</button>
  <button class="tool" data-tool="mesh-weight" title="Paint Bone Weights (P)">🎨</button>
  <div class="tool-sep" style="margin-left:auto"></div>
  <button class="tool on" id="tb-grid" title="Grid (G)" style="font-size:11px">⊞</button>
  <button class="tool on" id="tb-bones" title="Bones (B)">🦴</button>
  <button class="tool on" id="tb-sprites" title="Sprites (S)">🖼</button>
  <button class="tool on" id="tb-names" title="Names (N)" style="font-size:11px">Aa</button>
  <button class="tool" id="tb-snap" title="Snap (X)" style="font-size:11px">⊟</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-tab-bar">
      <div class="panel-tab on" data-ltab="bones">Bones</div>
      <div class="panel-tab" data-ltab="slots">Slots</div>
      <div class="panel-tab" data-ltab="skins">Skins</div>
    </div>
    <div class="panel-header">
      <span id="ltab-label">Bones</span>
      <div style="display:flex;gap:4px">
        <button class="phbtn" id="lp-add">+</button>
        <button class="phbtn" id="lp-del">−</button>
      </div>
    </div>
    <div class="panel-scroll" id="left-content"></div>
  </div>
  <div class="spl-h" id="spl-l"></div>

  <!-- VIEWPORT -->
  <div id="vpwrap">
    <canvas id="vp"></canvas>
    <div id="vp-coords" class="vp-info"></div>
    <div id="vp-hint" class="vp-info"></div>
    <div class="vp-zoom-ctrl">
      <button class="vpz-btn" id="vbtn-zi" title="+">+</button>
      <button class="vpz-btn" id="vbtn-zo" title="-">−</button>
      <button class="vpz-btn" id="vbtn-fit" title="Fit (F)">⊡</button>
      <button class="vpz-btn" id="vbtn-1" style="font-size:9px" title="1:1 (0)">1:1</button>
    </div>
  </div>

  <div class="spl-h" id="spl-r"></div>
  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="panel-tab-bar">
      <div class="panel-tab on">Properties</div>
    </div>
    <div class="props-scroll" id="right-content"></div>
  </div>
</div>

<div class="spl-v" id="spl-tl"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
// DragonBones Web Editor  –  Clean Working Implementation
// Key fix: mesh deformation uses verified affine-triangle
// rendering so a single sprite deforms per-bone correctly
// ═══════════════════════════════════════════════════════
const D2R=Math.PI/180,R2D=180/Math.PI;
const IS_TOUCH=('ontouchstart' in window)||navigator.maxTouchPoints>0;
const DFPS=24,DDUR=60,DLEN=80,GRID=20;
const MIN_Z=0.04,MAX_Z=20;
let _uid=1; const uid=p=>`${p||'x'}${_uid++}`;

/* ── Matrix ── */
class M2{
  constructor(a=1,b=0,c=0,d=1,e=0,f=0){this.a=a;this.b=b;this.c=c;this.d=d;this.e=e;this.f=f}
  static id(){return new M2()}
  static make(x,y,rot,sx,sy){
    const r=rot*D2R,C=Math.cos(r),S=Math.sin(r);
    return new M2(sx*C,sx*S,-sy*S,sy*C,x,y);
  }
  mul(o){return new M2(
    this.a*o.a+this.c*o.b,this.b*o.a+this.d*o.b,
    this.a*o.c+this.c*o.d,this.b*o.c+this.d*o.d,
    this.a*o.e+this.c*o.f+this.e,this.b*o.e+this.d*o.f+this.f)}
  pt(x,y){return{x:this.a*x+this.c*y+this.e,y:this.b*x+this.d*y+this.f}}
  inv(){
    const det=this.a*this.d-this.b*this.c;
    if(Math.abs(det)<1e-10)return M2.id();
    const id=1/det;
    return new M2(this.d*id,-this.b*id,-this.c*id,this.a*id,
      (this.c*this.f-this.d*this.e)*id,(this.b*this.e-this.a*this.f)*id);
  }
}

/* ── Data classes ── */
class Bone{
  constructor(name='bone',pid=null){
    this.id=uid('b');this.name=name;this.parentId=pid;
    this.x=0;this.y=0;this.rot=0;this.sx=1;this.sy=1;
    this.len=DLEN;this.vis=true;
  }
}
class Slot{
  constructor(name='slot',bid=null){
    this.id=uid('s');this.name=name;this.boneId=bid;
    this.dispIdx=0;this.z=0;this.vis=true;this.alpha=1;
  }
}
class Display{
  constructor(name='',type='image'){
    this.name=name;this.type=type;
    this.w=100;this.h=100;this.pivX=0.5;this.pivY=0.5;
    this.x=0;this.y=0;this.rot=0;this.sx=1;this.sy=1;
    this.dataURL=null;this._img=null;
    // Mesh (when type==='mesh')
    this.mesh=null; // {verts:[{x,y}], uvs:[{u,v}], tris:[i,j,k...], weights:[[{bid,w,lx,ly}],...]}
  }
}
class Skin{
  constructor(name='default'){this.name=name;this.slots={}}
  ensure(id){if(!this.slots[id])this.slots[id]=[];return this.slots[id]}
  all(id){return this.slots[id]||[]}
  add(sid,d){const a=this.ensure(sid);a.push(d);return a.length-1}
  del(id){delete this.slots[id]}
}
class BoneTrack{
  constructor(id){this.boneId=id;this.tf=[];this.rf=[];this.sf=[]}
  set(k,t,v,ease=0){const a=this[k],e=a.find(f=>f.time===t);
    if(e)Object.assign(e,{...v,ease});else{a.push({time:t,...v,ease});a.sort((a,b)=>a.time-b.time)}}
  del(k,t){this[k]=this[k].filter(f=>f.time!==t)}
  has(){return this.tf.length||this.rf.length||this.sf.length}
  times(){const s=new Set();[...this.tf,...this.rf,...this.sf].forEach(f=>s.add(f.time));return[...s].sort((a,b)=>a-b)}
  eval(frame){return{x:this._lerp(this.tf,'x',frame),y:this._lerp(this.tf,'y',frame),
    rot:this._lerp(this.rf,'rot',frame),sx:this._lerp(this.sf,'sx',frame),sy:this._lerp(this.sf,'sy',frame)}}
  _lerp(arr,prop,frame){
    if(!arr.length)return null;
    if(frame<=arr[0].time)return arr[0][prop]??null;
    const last=arr[arr.length-1];if(frame>=last.time)return last[prop]??null;
    for(let i=0;i<arr.length-1;i++){const a=arr[i],b=arr[i+1];
      if(frame>=a.time&&frame<b.time){
        const t=(frame-a.time)/(b.time-a.time);
        const et=a.ease===1?t*t*(3-2*t):a.ease===2?(t<.5?2*t*t:1-2*(1-t)*(1-t)):t;
        return(a[prop]??0)+((b[prop]??0)-(a[prop]??0))*et;}}return null}
}
class SlotTrack{
  constructor(id){this.slotId=id;this.df=[]}
  set(t,v){const e=this.df.find(f=>f.time===t);if(e)Object.assign(e,v);
    else{this.df.push({time:t,...v});this.df.sort((a,b)=>a.time-b.time)}}
  del(t){this.df=this.df.filter(f=>f.time!==t)}
  has(){return this.df.length>0}
  times(){return this.df.map(f=>f.time)}
  evalIdx(frame){if(!this.df.length)return null;let v=this.df[0];for(const f of this.df){if(f.time<=frame)v=f;else break}return v.idx??0}
}
class Animation{
  constructor(name='anim',fps=DFPS){this.name=name;this.fps=fps;this.dur=DDUR;this.loop=true;this.bt={};this.st={}}
  bt_(id){if(!this.bt[id])this.bt[id]=new BoneTrack(id);return this.bt[id]}
  st_(id){if(!this.st[id])this.st[id]=new SlotTrack(id);return this.st[id]}
  evalBone(id,frame){return this.bt[id]?this.bt[id].eval(frame):{x:null,y:null,rot:null,sx:null,sy:null}}
}
class Armature{
  constructor(name='Armature'){this.id=uid('arm');this.name=name;this.fps=DFPS;
    this.bones=[];this.slots=[];this.skins=[new Skin()];this.anims={};this.ik=[]}
  get skin(){return this.skins[0]}
  bone(id){return this.bones.find(b=>b.id===id)}
  boneByName(n){return this.bones.find(b=>b.name===n)}
  slot(id){return this.slots.find(s=>s.id===id)}
  roots(){return this.bones.filter(b=>!b.parentId)}
  children(pid){return this.bones.filter(b=>b.parentId===pid)}
  allDesc(id){const r=[],q=[id];while(q.length){const p=q.shift();this.children(p).forEach(c=>{r.push(c.id);q.push(c.id)})}return r}
  // World matrix for a bone, optionally with animation override
  worldMat(boneId,anim,frame){
    const chain=[];let cur=this.bone(boneId);
    while(cur){chain.unshift(cur);cur=cur.parentId?this.bone(cur.parentId):null}
    let m=M2.id();
    for(const b of chain){
      let bx=b.x,by=b.y,br=b.rot,bsx=b.sx,bsy=b.sy;
      if(anim){const ev=anim.evalBone(b.id,frame);
        if(ev.x!==null)bx=ev.x;if(ev.y!==null)by=ev.y;
        if(ev.rot!==null)br=ev.rot;if(ev.sx!==null)bsx=ev.sx;if(ev.sy!==null)bsy=ev.sy;}
      m=m.mul(M2.make(bx,by,br,bsx,bsy));
    }
    return m;
  }
  aabb(){
    let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
    this.bones.forEach(b=>{const wm=this.worldMat(b.id,null,0);
      [wm.pt(0,0),wm.pt(b.len,0)].forEach(p=>{mnx=Math.min(mnx,p.x);mny=Math.min(mny,p.y);mxx=Math.max(mxx,p.x);mxy=Math.max(mxy,p.y)})});
    return isFinite(mnx)?{x:mnx,y:mny,w:Math.max(1,mxx-mnx),h:Math.max(1,mxy-mny)}:{x:-100,y:-100,w:200,h:200};
  }
  removeBone(id){
    const b=this.bone(id);if(!b)return;
    this.children(id).forEach(c=>c.parentId=b.parentId);
    this.slots.filter(s=>s.boneId===id).forEach(s=>this.removeSlot(s.id));
    this.bones=this.bones.filter(b=>b.id!==id);
    Object.values(this.anims).forEach(a=>{delete a.bt[id]});
  }
  removeSlot(id){
    this.slots=this.slots.filter(s=>s.id!==id);
    this.skins.forEach(sk=>sk.del(id));
    Object.values(this.anims).forEach(a=>{delete a.st[id]});
  }
}

/* ── State ── */
const S={
  arm:new Armature(),
  selBones:[],selSlot:null,
  anim:null,frame:0,playing:false,loop:true,speed:1,
  tool:'select',mode:'design',
  vp:{x:0,y:0,scale:1,w:800,h:600},
  boneDraw:{active:false,px:null,py:null,pid:null},
  drag:{on:false,type:null,sx:0,sy:0,orig:{},pvpx:0,pvpy:0},
  ui:{grid:true,bones:true,sprites:true,names:true,snap:false,ltab:'bones'},

  meshEdit:{slot:null,selVert:null,paintBone:null,paintW:1,dragOn:false,dsx:0,dsy:0,dov:{x:0,y:0}},
  hist:[],hIdx:-1,
  tl:{fpx:.5,sx:0,rowH:IS_TOUCH?30:26},
};

/* ── Toast ── */
let _toastT=null;
function toast(msg,t=''){document.querySelector('.toast')?.remove();const d=document.createElement('div');d.className='toast '+(t||'');d.textContent=msg;document.body.appendChild(d);clearTimeout(_toastT);_toastT=setTimeout(()=>d.remove(),2500)}

/* ══════════════════════════════════
   MESH DEFORMATION ENGINE
   Affine triangle texturing + LBS
   ══════════════════════════════════ */

/* Draw one texture-mapped triangle using verified affine formula */
function drawAffTri(c,img,sx0,sy0,sx1,sy1,sx2,sy2,tx0,ty0,tx1,ty1,tx2,ty2){
  /* Solve for M such that M*[tx,ty,1]=[sx,sy,1]
     ctx.setTransform(a,b,c,d,e,f) maps:
       screen_x = a*tex_x + c*tex_y + e
       screen_y = b*tex_x + d*tex_y + f */
  const det=tx0*(ty1-ty2)-tx1*(ty0-ty2)+tx2*(ty0-ty1);
  if(Math.abs(det)<0.001)return;
  const a=(sx0*(ty1-ty2)-sx1*(ty0-ty2)+sx2*(ty0-ty1))/det;
  const b=(sy0*(ty1-ty2)-sy1*(ty0-ty2)+sy2*(ty0-ty1))/det;
  const cc=(tx0*(sx1-sx2)-tx1*(sx0-sx2)+tx2*(sx0-sx1))/det;
  const d=(tx0*(sy1-sy2)-tx1*(sy0-sy2)+tx2*(sy0-sy1))/det;
  const e=(tx0*(ty1*sx2-ty2*sx1)-tx1*(ty0*sx2-ty2*sx0)+tx2*(ty0*sx1-ty1*sx0))/det;
  const f=(tx0*(ty1*sy2-ty2*sy1)-tx1*(ty0*sy2-ty2*sy0)+tx2*(ty0*sy1-ty1*sy0))/det;
  c.save();
  c.beginPath();c.moveTo(sx0,sy0);c.lineTo(sx1,sy1);c.lineTo(sx2,sy2);c.closePath();c.clip();
  c.setTransform(a,b,cc,d,e,f);c.drawImage(img,0,0);c.restore();
}

/* Distance from point to line segment */
function ptSegDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2<.001)return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-ax-t*dx,py-ay-t*dy);
}

/* Create auto-grid mesh on a display */
function meshCreate(disp,cols,rows){
  cols=Math.max(1,cols|0)||4;rows=Math.max(1,rows|0)||6;
  const W=disp.w,H=disp.h,px=disp.pivX*W,py=disp.pivY*H;
  const verts=[],uvs=[],tris=[],weights=[];
  for(let r=0;r<=rows;r++)for(let c=0;c<=cols;c++){
    uvs.push({u:c/cols,v:r/rows});
    verts.push({x:(c/cols)*W-px,y:(r/rows)*H-py});
    weights.push([]);
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const i=r*(cols+1)+c;tris.push(i,i+1,i+(cols+1),i+1,i+(cols+2),i+(cols+1));
  }
  disp.type='mesh';disp.mesh={verts,uvs,tris,weights,cols,rows};
  saveH();updateRight();render();toast(`Mesh created: ${verts.length} verts, ${tris.length/3|0} tris`,'ok');
}

/* Auto-bind bone weights by proximity (LBS bind) */
function meshBind(disp,slot,arm){
  if(!disp.mesh){toast('Create a mesh first','err');return}
  const bones=arm.bones.filter(b=>b.vis&&b.len>0);
  if(!bones.length){toast('Add bones first','err');return}
  // Get display world matrix at bind time
  const bone=arm.bone(slot.boneId);
  const dispBoneMat=bone?arm.worldMat(bone.id,null,0):M2.id();
  const dispLocalMat=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);
  const dispWorldMat=dispBoneMat.mul(dispLocalMat);
  disp.mesh.weights=disp.mesh.verts.map(v=>{
    const wp=dispWorldMat.pt(v.x,v.y);
    // Find distances to all bone line segments
    const dists=bones.map(b=>{
      const bm=arm.worldMat(b.id,null,0);const bt=bm.pt(b.len,0);
      const d=ptSegDist(wp.x,wp.y,bm.e,bm.f,bt.x,bt.y);
      return{id:b.id,d:Math.max(.1,d)};
    });
    // Inverse-square weighting, top 4
    const top=dists.sort((a,b2)=>a.d-b2.d).slice(0,4);
    const invSq=top.map(t=>1/(t.d*t.d));
    const total=invSq.reduce((s,v)=>s+v,0);
    return top.map((t,i)=>{
      const bm=arm.worldMat(t.id,null,0);const local=bm.inv().pt(wp.x,wp.y);
      return{bid:t.id,w:invSq[i]/total,lx:local.x,ly:local.y};
    });
  });
  saveH();updateRight();render();toast('Weights bound to '+bones.length+' bones','ok');
}

/* Deform mesh vertices using LBS, return screen positions */
function meshDeform(disp,slot,arm,anim,frame,sc,ox,oy){
  const mesh=disp.mesh;
  const bone=arm.bone(slot.boneId);
  const dispBoneMat=bone?arm.worldMat(bone.id,anim,frame):M2.id();
  const dispLocalMat=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);
  const dispWorldMat=dispBoneMat.mul(dispLocalMat);
  return mesh.verts.map((v,vi)=>{
    const bws=mesh.weights[vi];
    if(!bws||!bws.length){
      // No weights: rigid follow bone
      const wp=dispWorldMat.pt(v.x,v.y);return{x:wp.x*sc+ox,y:wp.y*sc+oy};
    }
    let wx=0,wy=0;
    for(const{bid,w,lx,ly}of bws){
      const bm=arm.worldMat(bid,anim,frame);const p=bm.pt(lx,ly);wx+=p.x*w;wy+=p.y*w;
    }
    return{x:wx*sc+ox,y:wy*sc+oy};
  });
}

/* Draw a mesh display */
function drawMesh(c,disp,slot,arm,anim,frame){
  if(!disp.mesh||!disp._img)return;
  const sc=S.vp.scale,ox=S.vp.x,oy=S.vp.y;
  const pts=meshDeform(disp,slot,arm,anim,frame,sc,ox,oy);
  const tris=disp.mesh.tris,uvs=disp.mesh.uvs,iw=disp._img.naturalWidth,ih=disp._img.naturalHeight;
  c.save();c.globalAlpha=slot.alpha;
  for(let i=0;i<tris.length;i+=3){
    const i0=tris[i],i1=tris[i+1],i2=tris[i+2];
    const p0=pts[i0],p1=pts[i1],p2=pts[i2],uv0=uvs[i0],uv1=uvs[i1],uv2=uvs[i2];
    drawAffTri(c,disp._img,p0.x,p0.y,p1.x,p1.y,p2.x,p2.y,uv0.u*iw,uv0.v*ih,uv1.u*iw,uv1.v*ih,uv2.u*iw,uv2.v*ih);
  }
  // Wireframe + vertex handles in edit mode
  if(S.tool==='mesh-vert'&&S.meshEdit.slot===slot.id)drawMeshEdit(c,disp,pts);
  if(S.tool==='mesh-weight'&&S.meshEdit.slot===slot.id)drawMeshWeight(c,disp,pts);
  c.restore();
}
function drawMeshEdit(c,disp,pts){
  const mesh=disp.mesh;c.save();
  const drawn=new Set();c.strokeStyle='rgba(80,200,255,.55)';c.lineWidth=1;
  for(let i=0;i<mesh.tris.length;i+=3){
    [[mesh.tris[i],mesh.tris[i+1]],[mesh.tris[i+1],mesh.tris[i+2]],[mesh.tris[i+2],mesh.tris[i]]].forEach(([a,b])=>{
      const k=Math.min(a,b)+'-'+Math.max(a,b);if(drawn.has(k))return;drawn.add(k);
      const pa=pts[a],pb=pts[b];c.beginPath();c.moveTo(pa.x,pa.y);c.lineTo(pb.x,pb.y);c.stroke();
    });
  }
  pts.forEach((p,vi)=>{const sel=S.meshEdit.selVert===vi;
    const r=sel?7:4.5;c.beginPath();c.arc(p.x,p.y,r,0,Math.PI*2);
    c.fillStyle=sel?'#fff':'rgba(80,200,255,.9)';c.fill();c.strokeStyle='#000a';c.lineWidth=1;c.stroke();
  });c.restore();
}
function drawMeshWeight(c,disp,pts){
  const mesh=disp.mesh,pb=S.meshEdit.paintBone;c.save();
  const drawn=new Set();c.strokeStyle='rgba(100,100,100,.3)';c.lineWidth=.5;
  for(let i=0;i<mesh.tris.length;i+=3){
    [[mesh.tris[i],mesh.tris[i+1]],[mesh.tris[i+1],mesh.tris[i+2]],[mesh.tris[i+2],mesh.tris[i]]].forEach(([a,b])=>{
      const k=Math.min(a,b)+'-'+Math.max(a,b);if(drawn.has(k))return;drawn.add(k);
      const pa=pts[a],pb2=pts[b];c.beginPath();c.moveTo(pa.x,pa.y);c.lineTo(pb2.x,pb2.y);c.stroke();
    });
  }
  pts.forEach((p,vi)=>{
    let w=0;if(pb){const inf=mesh.weights[vi]?.find(inf2=>inf2.bid===pb);w=inf?inf.w:0}
    const r=Math.max(3,7*w+3);
    const R=Math.round(255*w),G=Math.round(50*(1-w)),B2=Math.round(200*(1-w));
    c.beginPath();c.arc(p.x,p.y,r,0,Math.PI*2);
    c.fillStyle=`rgba(${R},${G},${B2},.85)`;c.fill();c.strokeStyle='#000a';c.lineWidth=1;c.stroke();
  });c.restore();
}

/* Paint weight on a vertex */
function paintVtxWeight(disp,slot,vi,boneId,w){
  const mesh=disp.mesh;if(!mesh)return;
  const arm=S.arm;const bone=arm.bone(boneId);if(!bone)return;
  // Find vertex world position
  const slotBone=arm.bone(slot.boneId);
  const dispBoneMat=slotBone?arm.worldMat(slotBone.id,null,0):M2.id();
  const dispMat=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);
  const vw=dispBoneMat.mul(dispMat).pt(mesh.verts[vi].x,mesh.verts[vi].y);
  const local=arm.worldMat(boneId,null,0).inv().pt(vw.x,vw.y);
  const bws=mesh.weights[vi]||(mesh.weights[vi]=[]);
  const ex=bws.find(f=>f.bid===boneId);
  if(ex){ex.w=w;ex.lx=local.x;ex.ly=local.y}else bws.push({bid:boneId,w,lx:local.x,ly:local.y});
  // Normalize
  const total=bws.reduce((s,f)=>s+f.w,0);if(total>0)bws.forEach(f=>f.w/=total);
  render();
}

/* ══════════════════════════════════
   MAIN RENDER
   ══════════════════════════════════ */
let _mouse={x:0,y:0};
function render(){
  const c=ctx,W=S.vp.w,H=S.vp.h,sc=S.vp.scale,ox=S.vp.x,oy=S.vp.y;
  c.clearRect(0,0,W,H);c.fillStyle='#080808';c.fillRect(0,0,W,H);
  // Grid
  if(S.ui.grid){
    const gs=GRID*sc,mgs=gs*5;
    const drawLines=(sz,col)=>{c.strokeStyle=col;c.lineWidth=1;
      for(let x=(ox%sz+sz)%sz;x<W;x+=sz){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke()}
      for(let y=(oy%sz+sz)%sz;y<H;y+=sz){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke()}};
    drawLines(gs,'rgba(255,255,255,.03)');drawLines(mgs,'rgba(255,255,255,.07)');
    const o=VP.w2c(0,0);c.strokeStyle='rgba(255,255,255,.18)';c.lineWidth=1;
    c.beginPath();c.moveTo(o.x-10,o.y);c.lineTo(o.x+10,o.y);c.stroke();
    c.beginPath();c.moveTo(o.x,o.y-10);c.lineTo(o.x,o.y+10);c.stroke();
  }
  const anim=animState(),frame=animFrame(),arm=S.arm;
  // Sprites
  if(S.ui.sprites){
    [...arm.slots].sort((a,b)=>a.z-b.z).forEach(slot=>{
      if(!slot.vis)return;
      const bone=arm.bone(slot.boneId);if(!bone||!bone.vis)return;
      let idx=slot.dispIdx;
      if(anim&&anim.st[slot.id]){const di=anim.st[slot.id].evalIdx(frame);if(di!==null)idx=di}
      const dsps=arm.skin.all(slot.id),disp=dsps[idx];if(!disp||!disp._img)return;
      if(disp.type==='mesh'){drawMesh(c,disp,slot,arm,anim,frame);return}
      // Plain image with correct transform
      const wm=arm.worldMat(bone.id,anim,frame);
      const dm=M2.make(disp.x,disp.y,disp.rot,disp.sx,disp.sy);
      const fm=wm.mul(dm);
      const px=disp.pivX*disp.w,py=disp.pivY*disp.h;
      c.save();c.globalAlpha=slot.alpha;
      c.setTransform(fm.a*sc,fm.b*sc,fm.c*sc,fm.d*sc,fm.e*sc+ox,fm.f*sc+oy);
      if(S.selSlot===slot.id){c.strokeStyle='rgba(80,180,255,.9)';c.lineWidth=2/sc;c.strokeRect(-px,-py,disp.w,disp.h)}
      c.drawImage(disp._img,-px,-py,disp.w,disp.h);c.restore();
    });
  }
  // Bones
  if(S.ui.bones){arm.bones.forEach(b=>{if(b.vis)drawBone(c,b,anim,frame)})}
  // Bone draw preview
  if(S.boneDraw.active){
    const s=VP.w2c(S.boneDraw.px,S.boneDraw.py);
    c.save();c.strokeStyle='rgba(251,191,36,.7)';c.lineWidth=2;c.setLineDash([5,4]);
    c.beginPath();c.moveTo(s.x,s.y);c.lineTo(_mouse.x,_mouse.y);c.stroke();c.setLineDash([]);
    c.beginPath();c.arc(s.x,s.y,6,0,Math.PI*2);c.fillStyle='rgba(251,191,36,.8)';c.fill();c.restore();
  }
  // Status
  const wp=VP.c2w(_mouse.x,_mouse.y);
  document.getElementById('vp-coords').textContent=`X:${wp.x.toFixed(1)} Y:${wp.y.toFixed(1)}  |  Zoom:${Math.round(sc*100)}%`;
  document.getElementById('st-zoom').textContent=Math.round(sc*100)+'%';
}

function drawBone(c,b,anim,frame){
  const arm=S.arm,wm=arm.worldMat(b.id,anim,frame);
  const op=VP.w2c(wm.e,wm.f),tp0=wm.pt(b.len,0),tp=VP.w2c(tp0.x,tp0.y);
  const sel=S.selBones.includes(b.id),sc=S.vp.scale;
  const dx=tp.x-op.x,dy=tp.y-op.y,len=Math.hypot(dx,dy);
  c.save();
  if(len>1){
    const nx=-dy/len,ny=dx/len,rw=9*sc,tw=2.5*sc;
    c.beginPath();c.moveTo(op.x+nx*rw,op.y+ny*rw);c.lineTo(tp.x+nx*tw,tp.y+ny*tw);
    c.lineTo(tp.x-nx*tw,tp.y-ny*tw);c.lineTo(op.x-nx*rw,op.y-ny*rw);c.closePath();
    const g=c.createLinearGradient(op.x,op.y,tp.x,tp.y);
    g.addColorStop(0,sel?'rgba(249,115,22,.95)':'rgba(251,191,36,.9)');
    g.addColorStop(1,sel?'rgba(253,186,116,.5)':'rgba(253,224,71,.35)');
    c.fillStyle=g;c.fill();c.strokeStyle=sel?'#f97316':'rgba(251,191,36,.75)';c.lineWidth=1;c.stroke();
    c.beginPath();c.arc(tp.x,tp.y,(sel?6:4)*sc,0,Math.PI*2);
    c.fillStyle=sel?'#fb923c':'rgba(251,191,36,.8)';c.fill();c.strokeStyle='#0009';c.lineWidth=1;c.stroke();
  }
  c.beginPath();c.arc(op.x,op.y,(sel?10:8)*sc,0,Math.PI*2);
  c.fillStyle=sel?'#f97316':'#fbbf24';c.fill();c.strokeStyle='#0009';c.lineWidth=1.5;c.stroke();
  if(sel&&S.tool==='rotate'){c.beginPath();c.arc(op.x,op.y,14*sc,0,Math.PI*2);
    c.strokeStyle='rgba(96,165,250,.6)';c.lineWidth=1.5;c.stroke()}
  if(S.ui.names&&sc>.3&&len>1){
    const mx=(op.x+tp.x)/2,my=(op.y+tp.y)/2;
    c.font=`${Math.max(9,11*sc)}px -apple-system,Arial`;
    c.fillStyle=sel?'#fff':'rgba(255,255,255,.6)';c.textAlign='center';c.textBaseline='middle';
    c.fillText(b.name,mx,my-(13*sc));
  }
  // Keyframe dot
  if(S.mode==='anim'&&S.anim&&S.anim.bt[b.id]&&S.anim.bt[b.id].times().includes(Math.round(S.frame))){
    c.beginPath();c.arc(op.x,op.y,3*sc,0,Math.PI*2);c.fillStyle='#fde047';c.fill();
  }
  c.restore();
}

/* ══════════════════════════════════
   TIMELINE RENDER
   ══════════════════════════════════ */
function renderTL(){
  renderTLTracks();renderTLCanvas();
}
function tlRows(){
  if(!S.anim)return[];
  return[...S.arm.bones.map(b=>({type:'bone',id:b.id,name:b.name})),
         ...S.arm.slots.map(s=>({type:'slot',id:s.id,name:s.name}))];
}
function renderTLTracks(){
  const cont=document.getElementById('tl-tracks');
  cont.innerHTML='<div class="tl-track-hdr"><span style="font-size:10px;color:var(--txt2)">TRACKS</span></div>';
  if(!S.anim){const d=document.createElement('div');d.className='tl-track-row';d.style.cssText='color:var(--txt3);font-size:11px';d.textContent='Create an animation';cont.appendChild(d);return}
  tlRows().forEach(row=>{
    const hasKF=row.type==='bone'?(S.anim.bt[row.id]?.has()):(S.anim.st[row.id]?.has());
    const isSel=row.type==='bone'?S.selBones.includes(row.id):S.selSlot===row.id;
    const d=document.createElement('div');d.className='tl-track-row'+(isSel?' sel':'');
    d.style.height=S.tl.rowH+'px';
    d.innerHTML=`<span style="font-size:10px;color:${row.type==='bone'?'#fbbf24':'#60a5fa'}">${row.type==='bone'?'⬡':'◆'}</span>`+
      `<span style="flex:1;font-size:11px;color:${hasKF?'#fff':'var(--txt2)'};margin-left:4px">${row.name}</span>`+
      (hasKF?`<span style="color:var(--kf);font-size:9px">◆</span>`:'');
    d.addEventListener('click',()=>{if(row.type==='bone')selBone(row.id);else selSlot(row.id)});
    cont.appendChild(d);
  });
}
function renderTLCanvas(){
  const c=tlx,W=tlc.width,H=tlc.height;
  c.clearRect(0,0,W,H);c.fillStyle='#0d0d0d';c.fillRect(0,0,W,H);
  if(!S.anim)return;
  const dur=S.anim.dur,fpx=S.tl.fpx,sx=S.tl.sx,rowH=S.tl.rowH,hH=26;
  c.fillStyle='#1a1a1a';c.fillRect(0,0,W,hH);c.fillStyle='#2a2a2a';c.fillRect(0,hH-1,W,1);
  const step=Math.max(1,Math.ceil(55*fpx));
  c.font='9px monospace';c.textAlign='center';
  for(let f=0;f<=dur;f+=step){const x=(f-sx)/fpx;if(x<-2||x>W+2)continue;
    c.fillStyle='#333';c.fillRect(x,hH-5,1,5);
    if(f%(step*5)===0||step>4){c.fillStyle='#777';c.fillText(f,x,hH-8)}}
  const rows=tlRows();
  rows.forEach((row,i)=>{
    const y=hH+i*rowH;if(y>H)return;
    c.fillStyle=i%2?'#0f0f0f':'#0c0c0c';c.fillRect(0,y,W,rowH);
    let times=[];
    if(row.type==='bone'&&S.anim.bt[row.id])times=S.anim.bt[row.id].times();
    else if(row.type==='slot'&&S.anim.st[row.id])times=S.anim.st[row.id].times();
    if(times.length>1){c.strokeStyle='rgba(253,224,71,.2)';c.lineWidth=2;c.beginPath();
      const ky=y+rowH/2;let first=true;
      times.forEach(t=>{const x=(t-sx)/fpx;if(first){c.moveTo(x,ky);first=false}else c.lineTo(x,ky)});c.stroke()}
    times.forEach(t=>{const x=(t-sx)/fpx;if(x<-8||x>W+8)return;
      const ky=y+rowH/2,at=Math.abs(t-S.frame)<.5;
      c.save();c.translate(x,ky);c.rotate(Math.PI/4);const sz=IS_TOUCH?5:4;
      c.fillStyle=at?'#fff':'#fde047';c.strokeStyle='#0009';c.lineWidth=1;
      c.fillRect(-sz,-sz,sz*2,sz*2);c.strokeRect(-sz,-sz,sz*2,sz*2);c.restore()});
    const isSel=row.type==='bone'?S.selBones.includes(row.id):S.selSlot===row.id;
    if(isSel){c.fillStyle='rgba(37,99,235,.18)';c.fillRect(0,y,W,rowH);c.fillStyle='rgba(59,130,246,.9)';c.fillRect(0,y,3,rowH)}
    c.fillStyle='rgba(255,255,255,.03)';c.fillRect(0,y+rowH-1,W,1);
  });
  const ex=(dur-sx)/fpx;
  if(ex>0&&ex<W){c.fillStyle='rgba(239,68,68,.18)';c.fillRect(ex,0,W,H);c.fillStyle='#ef4444';c.fillRect(ex-1,0,2,H)}
  const phX=(S.frame-sx)/fpx;
  if(phX>=-2&&phX<=W+2){
    c.fillStyle='rgba(255,255,255,.1)';c.fillRect(phX,hH,1,H);
    c.fillStyle='#fff';c.fillRect(phX-1.5,0,3,hH);
    c.beginPath();c.moveTo(phX-5,0);c.lineTo(phX+5,0);c.lineTo(phX,8);c.closePath();c.fill();
    c.font='9px monospace';c.textAlign='center';c.fillText(Math.floor(S.frame),phX,hH+10);
  }
}

function renderBoneTree(cont){

function updateRight(){

  else if(S.selBones.length>1){const d=document.createElement('div');d.className='props-empty';d.textContent=`${S.selBones.length} bones selected\nDrag to move all`;cont.appendChild(d)}

function mkSec(cont,title,open=true){
  const s=document.createElement('div');s.className='section';
  const h=document.createElement('div');h.className='section-hdr'+(open?'':' col');h.textContent=title;
  const b=document.createElement('div');b.className='section-body';b.style.display=open?'block':'none';
  h.addEventListener('click',()=>{h.classList.toggle('col');b.style.display=h.classList.contains('col')?'none':'block'});
  s.appendChild(h);s.appendChild(b);cont.appendChild(s);return b;
}
function mkField(par,label,el){const r=document.createElement('div');r.className='field';
  if(label){const l=document.createElement('span');l.className='field-label';l.textContent=label;r.appendChild(l)}
  r.appendChild(el);par.appendChild(r);return r}
function numInput(val,fn,step=.1){
  const i=document.createElement('input');i.type='number';i.className='field-input';
  i.value=+parseFloat(val).toFixed(step<.1?3:step<1?2:1);i.step=step;
  let t;i.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(()=>{const v=+i.value;if(!isNaN(v))fn(v)},60)});
  i.addEventListener('change',()=>{const v=+i.value;if(!isNaN(v))fn(v)});return i}
function txtInput(val,fn){const i=document.createElement('input');i.type='text';i.className='field-input';i.value=val||'';i.addEventListener('change',()=>fn(i.value));return i}
function xyFields(par,label,xv,yv,fnx,fny,step=.1){
  const r=document.createElement('div');r.className='field';
  if(label){const l=document.createElement('span');l.className='field-label';l.textContent=label;r.appendChild(l)}
  const g=document.createElement('div');g.className='field-2col';
  const xi=numInput(xv,fnx,step);xi.placeholder='X';const yi=numInput(yv,fny,step);yi.placeholder='Y';
  g.appendChild(xi);g.appendChild(yi);r.appendChild(g);par.appendChild(r)}
function selInput(par,label,opts,cur,fn){const r=document.createElement('div');r.className='field';
  if(label){const l=document.createElement('span');l.className='field-label';l.textContent=label;r.appendChild(l)}
  const s=document.createElement('select');s.className='field-select';
  opts.forEach(([v,lbl])=>{const o=document.createElement('option');o.value=v;o.textContent=lbl||v;if(v===cur)o.selected=true;s.appendChild(o)});
  s.addEventListener('change',()=>fn(s.value));r.appendChild(s);par.appendChild(r);return s}
function aBtn(par,label,cls,fn){const b=document.createElement('button');b.className='action-btn '+(cls||'');
  b.innerHTML=label;b.addEventListener('click',fn);par.appendChild(b);return b}

function rightBone(cont,bone){
  if(!bone)return;
  const b=mkSec(cont,'Transform');
  mkField(b,'Name',txtInput(bone.name,v=>{bone.name=v;saveH();renderLeft()}));
  xyFields(b,'Position',bone.x,bone.y,v=>{bone.x=v;saveH();render()},v=>{bone.y=v;saveH();render()});
  mkField(b,'Rotation',numInput(bone.rot,v=>{bone.rot=v;saveH();render()}));
  xyFields(b,'Scale',bone.sx,bone.sy,v=>{bone.sx=v;saveH();render()},v=>{bone.sy=v;saveH();render()},0.001);
  mkField(b,'Length',numInput(bone.len,v=>{bone.len=Math.max(1,v);saveH();render()},1));
  const h=mkSec(cont,'Hierarchy');
  selInput(h,'Parent',[['','(root — no parent)'],...S.arm.bones.filter(x=>x.id!==bone.id).map(x=>[x.id,x.name])],bone.parentId||'',v=>{bone.parentId=v||null;saveH();renderLeft();render()});
  aBtn(h,'✕ Delete Bone','danger',()=>deleteBone(bone.id));
  if(S.mode==='anim'&&S.anim){
    const aa=mkSec(cont,'Keyframe');
    const times=S.anim.bt[bone.id]?.times()||[];
    const info=document.createElement('div');info.style.cssText='font-size:11px;color:var(--txt2);margin-bottom:8px;line-height:1.6';
    info.textContent=times.length?`Keyframes at: ${times.join(', ')}f`:'No keyframes yet — move the bone then press K';
    aa.appendChild(info);
    aBtn(aa,`◆ Add Keyframe at frame ${Math.round(S.frame)}`,'prim',addKF);
    aBtn(aa,'✕ Delete Keyframe Here','danger',delKF);
  }
}

function rightSlot(cont,slot){
  if(!slot)return;
  const b=mkSec(cont,'Slot');
  mkField(b,'Name',txtInput(slot.name,v=>{slot.name=v;saveH();renderLeft()}));
  selInput(b,'Bone',[['','(none)'],...S.arm.bones.map(x=>[x.id,x.name])],slot.boneId||'',v=>{slot.boneId=v||null;saveH();render()});

   BONE / SLOT OPERATIONS
   ══════════════════════════════════ */
function createBoneAt(wx,wy,ex,ey,pid=null){
  const dx=ex-wx,dy=ey-wy,len=Math.hypot(dx,dy)||DLEN,rot=Math.atan2(dy,dx)*R2D;
  let bx=wx,by=wy;
  if(pid){const pm=S.arm.worldMat(pid,null,0);const local=pm.inv().pt(wx,wy);bx=local.x;by=local.y}
  const b=new Bone('bone_'+S.arm.bones.length,pid);
  b.x=VP.snap(bx);b.y=VP.snap(by);b.rot=rot;b.len=Math.max(5,len);
  S.arm.bones.push(b);
  const sl=new Slot(b.name+'_slot',b.id);sl.z=S.arm.slots.length;
  S.arm.slots.push(sl);S.arm.skin.ensure(sl.id);
  S.selBones=[b.id];saveH();renderLeft();updateRight();render();renderTL();
  toast('Bone: '+b.name,'ok');return b;
}
function deleteBone(id){
  const desc=S.arm.allDesc(id);
  [id,...desc].forEach(bid=>S.arm.removeBone(bid));
  S.selBones=S.selBones.filter(bid=>!([id,...desc].includes(bid)));
  saveH();renderLeft();updateRight();render();renderTL();toast('Bone deleted');
}
function deleteSlot(id){
  if(S.selSlot===id)S.selSlot=null;
  S.arm.removeSlot(id);saveH();renderLeft();updateRight();render();toast('Slot deleted');
}

  S.frame=Math.max(0,Math.min(S.anim?S.anim.dur:9999,S.frame));updFrmCnt();render();renderTL();if(S.playing)tick()})}

function goEnd(){S.frame=S.anim?S.anim.dur:0;updFrmCnt();render();renderTL()}

function getAnimPose(bid){
  // Returns current effective bone position (animated or rest)
  const b=S.arm.bone(bid);if(!b)return null;
  if(S.mode==='anim'&&S.anim){
    const ev=S.anim.bt[bid]?S.anim.bt[bid].eval(S.frame):{x:null,y:null,rot:null,sx:null,sy:null};
    return{x:ev.x??b.x,y:ev.y??b.y,rot:ev.rot??b.rot,sx:ev.sx??b.sx,sy:ev.sy??b.sy};
  }
  return{x:b.x,y:b.y,rot:b.rot,sx:b.sx,sy:b.sy};
}
function addKF(){
  if(!S.anim||S.mode!=='anim'){toast('Switch to Animate mode first','err');return}
  if(!S.selBones.length&&!S.selSlot){toast('Select a bone or slot first','err');return}
  const frame=Math.round(S.frame);
  S.selBones.forEach(bid=>{
    const b=S.arm.bone(bid);if(!b)return;
    const cur=getAnimPose(bid);const tr=S.anim.bt_(bid);
    tr.set('tf',frame,{x:cur.x,y:cur.y});tr.set('rf',frame,{rot:cur.rot});tr.set('sf',frame,{sx:cur.sx,sy:cur.sy});
  });
  if(S.selSlot){const s=S.arm.slot(S.selSlot);if(s)S.anim.st_(S.selSlot).set(frame,{idx:s.dispIdx})}
  saveH();renderTL();updateRight();render();toast('Keyframe at '+frame,'ok');
}
function delKF(){if(!S.anim)return;const frame=Math.round(S.frame);
  S.selBones.forEach(bid=>{const t=S.anim.bt[bid];if(t){t.del('tf',frame);t.del('rf',frame);t.del('sf',frame)}});
  if(S.selSlot){const t=S.anim.st[S.selSlot];if(t)t.del(frame)}
  saveH();renderTL();updateRight();toast('Keyframe deleted')}

/* ══════════════════════════════════
   HIT TESTING
   ══════════════════════════════════ */
const BONE_HIT=()=>(IS_TOUCH?18:10)*S.vp.scale;
function findBoneAt(cx,cy){
  const arm=S.arm,anim=animState(),frame=animFrame(),hr=BONE_HIT();
  for(let i=arm.bones.length-1;i>=0;i--){
    const b=arm.bones[i];if(!b.vis)continue;
    const wm=arm.worldMat(b.id,anim,frame);
    const op=VP.w2c(wm.e,wm.f);
    if(Math.hypot(cx-op.x,cy-op.y)<hr)return b.id;
    if(b.len>0){const tp=wm.pt(b.len,0);const tc=VP.w2c(tp.x,tp.y);
      if(Math.hypot(cx-tc.x,cy-tc.y)<hr*.6)return b.id;
      const dx=tc.x-op.x,dy=tc.y-op.y,l2=dx*dx+dy*dy;
      if(l2>0){const t=Math.max(0,Math.min(1,((cx-op.x)*dx+(cy-op.y)*dy)/l2));
        if(Math.hypot(cx-op.x-t*dx,cy-op.y-t*dy)<hr*.7)return b.id;}}
  }
  return null;
}
function findMeshVertAt(cx,cy,disp,slot){
  if(!disp||!disp.mesh)return -1;
  const pts=meshDeform(disp,slot,S.arm,animState(),animFrame(),S.vp.scale,S.vp.x,S.vp.y);
  const hr=IS_TOUCH?20:10;let nearest=-1,nd=Infinity;
  pts.forEach((p,vi)=>{const d=Math.hypot(cx-p.x,cy-p.y);if(d<hr&&d<nd){nearest=vi;nd=d}});
  return nearest;
}

  }
  if(btn!==0)return;
  // Mesh vertex tools
  if((S.tool==='mesh-vert'||S.tool==='mesh-weight')&&S.meshEdit.slot){
    const slot=S.arm.slot(S.meshEdit.slot);const disp=getActiveDispForSlot(S.meshEdit.slot);
    if(slot&&disp&&disp.mesh){
      const vi=findMeshVertAt(cx,cy,disp,slot);
      if(vi>=0){
        S.meshEdit.selVert=vi;
        if(S.tool==='mesh-weight'&&S.meshEdit.paintBone){
          paintVtxWeight(disp,slot,vi,S.meshEdit.paintBone,S.meshEdit.paintW);saveH();updateRight();
        } else if(S.tool==='mesh-vert'){
          S.meshEdit.dragOn=true;S.meshEdit.dsx=cx;S.meshEdit.dsy=cy;
          S.meshEdit.dov={x:disp.mesh.verts[vi].x,y:disp.mesh.verts[vi].y};
        }
        updateRight();render();return;
      } else {S.meshEdit.selVert=null;updateRight();render()}
    }
  }
  if(S.tool==='bone'){
    const wp=VP.c2w(cx,cy);S.boneDraw={active:true,px:VP.snap(wp.x),py:VP.snap(wp.y),pid:findBoneAt(cx,cy)||null};return;
  }
  const hit=findBoneAt(cx,cy);
  if(hit){
    if(!S.selBones.includes(hit))selBone(hit,mods.ctrl);
    const orig={};S.selBones.forEach(bid=>{const p=getAnimPose(bid);if(p)orig[bid]=p});
    let type=S.tool==='rotate'?'rotate':S.tool==='scale'?'scale':'move';
    S.drag={on:true,type,sx:cx,sy:cy,orig};
  }else if(!mods.ctrl){deselect()}
  render();
}
function onMove(cx,cy,buttons){
  _mouse={x:cx,y:cy};
  if(S.drag.on){
    if(S.drag.type==='pan'){S.vp.x=S.drag.pvpx+(cx-S.drag.sx);S.vp.y=S.drag.pvpy+(cy-S.drag.sy)}
    else if(S.drag.type==='move'){
      const dx=(cx-S.drag.sx)/S.vp.scale,dy=(cy-S.drag.sy)/S.vp.scale;
      S.selBones.forEach(bid=>{const b=S.arm.bone(bid),ot=S.drag.orig[bid];if(!b||!ot)return;
        const nx=VP.snap(ot.x+dx),ny=VP.snap(ot.y+dy);
        if(S.mode==='anim'&&S.anim){S.anim.bt_(bid).set('tf',Math.round(S.frame),{x:nx,y:ny})}else{b.x=nx;b.y=ny}});
    }else if(S.drag.type==='rotate'){
      S.selBones.forEach(bid=>{const b=S.arm.bone(bid),ot=S.drag.orig[bid];if(!b||!ot)return;
        const wm=S.arm.worldMat(bid,null,0),oc=VP.w2c(wm.e,wm.f);
        const sa=Math.atan2(S.drag.sy-oc.y,S.drag.sx-oc.x),ca=Math.atan2(cy-oc.y,cx-oc.x);
        const nr=((ot.rot+(ca-sa)*R2D)%360+360)%360;
        if(S.mode==='anim'&&S.anim){S.anim.bt_(bid).set('rf',Math.round(S.frame),{rot:nr})}else{b.rot=nr}});
    }else if(S.drag.type==='scale'){
      S.selBones.forEach(bid=>{const b=S.arm.bone(bid),ot=S.drag.orig[bid];if(!b||!ot)return;
        const wm=S.arm.worldMat(bid,null,0),oc=VP.w2c(wm.e,wm.f);
        const sd=Math.hypot(S.drag.sx-oc.x,S.drag.sy-oc.y)||1;
        const cd=Math.hypot(cx-oc.x,cy-oc.y)||1;const ratio=cd/sd;
        const ns=Math.max(0.01,ot.sx*ratio);
        if(S.mode==='anim'&&S.anim){S.anim.bt_(bid).set('sf',Math.round(S.frame),{sx:ns,sy:Math.max(0.01,ot.sy*ratio)})}else{b.sx=ns;b.sy=ns}});
    }
    render();if(S.drag.type!=='pan')renderTL();
  } else if(S.meshEdit.dragOn&&buttons){
    const slot=S.arm.slot(S.meshEdit.slot);const disp=getActiveDispForSlot(S.meshEdit.slot);
    if(slot&&disp&&disp.mesh&&S.meshEdit.selVert!==null){
      const vi=S.meshEdit.selVert;
      disp.mesh.verts[vi].x=S.meshEdit.dov.x+(cx-S.meshEdit.dsx)/S.vp.scale;
      disp.mesh.verts[vi].y=S.meshEdit.dov.y+(cy-S.meshEdit.dsy)/S.vp.scale;
      render();
    }
  } else if(S.boneDraw.active&&buttons){render()}
  // Cursor
  if(!S.drag.on&&!S.meshEdit.dragOn){
    if(S.tool==='bone')vp.style.cursor='crosshair';
    else if(S.tool==='rotate')vp.style.cursor='alias';
    else if(S.tool==='scale')vp.style.cursor='nwse-resize';
    else if(S.tool==='mesh-vert'||S.tool==='mesh-weight')vp.style.cursor='crosshair';
    else if(findBoneAt(cx,cy))vp.style.cursor='pointer';
    else vp.style.cursor='default';
  }
}
function onUp(cx,cy,btn){
  if(S.boneDraw.active&&btn===0){S.boneDraw.active=false;
    const wp=VP.c2w(cx,cy);const d=Math.hypot(wp.x-S.boneDraw.px,wp.y-S.boneDraw.py);
    if(d>4/S.vp.scale)createBoneAt(S.boneDraw.px,S.boneDraw.py,VP.snap(wp.x),VP.snap(wp.y),S.boneDraw.pid);
    render();return;}
  if(S.meshEdit.dragOn){S.meshEdit.dragOn=false;saveH();return}
  if(S.drag.on){if(S.drag.type!=='pan')saveH();S.drag.on=false}
  if(S.tool==='bone')vp.style.cursor='crosshair';else vp.style.cursor='default';
}

/* Mouse */
vp.addEventListener('mousedown',e=>{const r=vp.getBoundingClientRect();_mouse={x:e.clientX-r.left,y:e.clientY-r.top};onDown(e.clientX-r.left,e.clientY-r.top,e.button,{alt:e.altKey,ctrl:e.ctrlKey||e.metaKey})});
vp.addEventListener('mousemove',e=>{const r=vp.getBoundingClientRect();onMove(e.clientX-r.left,e.clientY-r.top,e.buttons)});
vp.addEventListener('mouseup',e=>{const r=vp.getBoundingClientRect();onUp(e.clientX-r.left,e.clientY-r.top,e.button)});
vp.addEventListener('mouseleave',()=>{S.boneDraw.active=false;S.meshEdit.dragOn=false});
vp.addEventListener('wheel',e=>{e.preventDefault();const r=vp.getBoundingClientRect();
  zoomBy(e.deltaY<0?1.1:1/1.1,e.clientX-r.left,e.clientY-r.top)},{passive:false});
vp.addEventListener('contextmenu',e=>{e.preventDefault();const r=vp.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  const hit=findBoneAt(cx,cy);if(hit)showBoneCtx(hit,e.clientX,e.clientY);else showVpCtx(e.clientX,e.clientY)});
vp.addEventListener('dblclick',e=>{const r=vp.getBoundingClientRect();
  const hit=findBoneAt(e.clientX-r.left,e.clientY-r.top);if(hit)promptRename('bone',hit,S.arm.bone(hit)?.name||'')});

/* Touch */
const T={dist:0,midX:0,midY:0,longTmr:null,lastTap:0,tapX:0,tapY:0};
vp.addEventListener('touchstart',e=>{e.preventDefault();clearTimeout(T.longTmr);
  const r=vp.getBoundingClientRect();
  if(e.touches.length===1){const t=e.touches[0],cx=t.clientX-r.left,cy=t.clientY-r.top;
    _mouse={x:cx,y:cy};
    const now=Date.now();
    if(now-T.lastTap<300&&Math.abs(cx-T.tapX)<20&&Math.abs(cy-T.tapY)<20){
      const hit=findBoneAt(cx,cy);if(hit){promptRename('bone',hit,S.arm.bone(hit)?.name||'');return}}
    T.lastTap=now;T.tapX=cx;T.tapY=cy;
    T.longTmr=setTimeout(()=>{const hit=findBoneAt(cx,cy);if(hit)showBoneCtx(hit,t.clientX,t.clientY);else showVpCtx(t.clientX,t.clientY)},600);
    onDown(cx,cy,0,{alt:false,ctrl:false});
  }else if(e.touches.length===2){S.drag.on=false;S.boneDraw.active=false;S.meshEdit.dragOn=false;
    const t0=e.touches[0],t1=e.touches[1];
    T.dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    T.midX=(t0.clientX+t1.clientX)/2-r.left;T.midY=(t0.clientY+t1.clientY)/2-r.top;}
},{passive:false});
vp.addEventListener('touchmove',e=>{e.preventDefault();clearTimeout(T.longTmr);
  const r=vp.getBoundingClientRect();
  if(e.touches.length===1){const t=e.touches[0];_mouse={x:t.clientX-r.left,y:t.clientY-r.top};
    onMove(t.clientX-r.left,t.clientY-r.top,1);}
  else if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    const nd=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    const nm={x:(t0.clientX+t1.clientX)/2-r.left,y:(t0.clientY+t1.clientY)/2-r.top};
    if(T.dist>0)zoomBy(nd/T.dist,nm.x,nm.y);
    S.vp.x+=nm.x-T.midX;S.vp.y+=nm.y-T.midY;T.dist=nd;T.midX=nm.x;T.midY=nm.y;render();}
},{passive:false});
vp.addEventListener('touchend',e=>{clearTimeout(T.longTmr);e.preventDefault();
  if(e.changedTouches.length){const t=e.changedTouches[0],r=vp.getBoundingClientRect();onUp(t.clientX-r.left,t.clientY-r.top,0)}
  if(e.touches.length===0)T.dist=0;},{passive:false});
vp.addEventListener('touchcancel',()=>{clearTimeout(T.longTmr);S.drag.on=false;S.boneDraw.active=false;S.meshEdit.dragOn=false;T.dist=0;},{passive:false});

/* Timeline input */
function tlClick(cx,cy){const hH=26,rowH=S.tl.rowH,fpx=S.tl.fpx,sx=S.tl.sx;
  if(cy<hH){S.frame=Math.max(0,Math.min(S.anim?S.anim.dur:9999,cx*fpx+sx));updFrmCnt();render();renderTL();return}
  const ri=Math.floor((cy-hH)/rowH);const rows=tlRows();
  if(ri>=0&&ri<rows.length){const row=rows[ri];if(row.type==='bone')selBone(row.id);else selSlot(row.id)}
  S.frame=Math.max(0,Math.min(S.anim?S.anim.dur:9999,cx*fpx+sx));updFrmCnt();render();renderTL();}
document.getElementById('tl-canvas').addEventListener('mousedown',e=>{const r=document.getElementById('tl-canvas').getBoundingClientRect();tlClick(e.clientX-r.left,e.clientY-r.top)});
document.getElementById('tl-canvas').addEventListener('mousemove',e=>{if(e.buttons!==1)return;const r=document.getElementById('tl-canvas').getBoundingClientRect();S.frame=Math.max(0,Math.min(S.anim?S.anim.dur:9999,(e.clientX-r.left)*S.tl.fpx+S.tl.sx));updFrmCnt();render();renderTL()});
document.getElementById('tl-canvas').addEventListener('touchstart',e=>{e.preventDefault();const r=document.getElementById('tl-canvas').getBoundingClientRect();tlClick(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:false});
document.getElementById('tl-canvas').addEventListener('touchmove',e=>{e.preventDefault();const r=document.getElementById('tl-canvas').getBoundingClientRect();S.frame=Math.max(0,Math.min(S.anim?S.anim.dur:9999,(e.touches[0].clientX-r.left)*S.tl.fpx+S.tl.sx));updFrmCnt();render();renderTL()},{passive:false});
document.getElementById('tl-canvas').addEventListener('wheel',e=>{e.preventDefault();if(e.ctrlKey){S.tl.fpx=Math.max(.04,Math.min(6,S.tl.fpx*(e.deltaY>0?1.15:.87)))}else{S.tl.sx=Math.max(0,S.tl.sx+(e.deltaX+e.deltaY)*.4)}renderTL()},{passive:false});

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
  const k=e.key.toLowerCase();
  if(e.ctrlKey||e.metaKey){
    if(k==='z'){e.preventDefault();undo()}else if(k==='y'||(k==='z'&&e.shiftKey)){e.preventDefault();redo()}
    else if(k==='s'){e.preventDefault();saveProject()}else if(k==='o'){e.preventDefault();document.getElementById('file-json').click()}
    else if(k==='n'){e.preventDefault();newProject()}else if(k==='d'){e.preventDefault();dupBones()}
    else if(k==='a'){e.preventDefault();S.selBones=[...S.arm.bones.map(b=>b.id)];renderLeft();updateRight();render()}
    return;
  }
  if(k==='v')setTool('select');else if(k==='w')setTool('move');else if(k==='e')setTool('rotate');
  else if(k==='r')setTool('scale');else if(k==='a')setTool('bone');
  else if(k==='m')setTool(S.tool==='mesh-vert'?'select':'mesh-vert');
  else if(k==='p')setTool(S.tool==='mesh-weight'?'select':'mesh-weight');
  else if(k==='g'){S.ui.grid=!S.ui.grid;document.getElementById('tb-grid').classList.toggle('on',S.ui.grid);render()}
  else if(k==='b'){S.ui.bones=!S.ui.bones;document.getElementById('tb-bones').classList.toggle('on',S.ui.bones);render()}
  else if(k==='s'){S.ui.sprites=!S.ui.sprites;document.getElementById('tb-sprites').classList.toggle('on',S.ui.sprites);render()}
  else if(k==='n'){S.ui.names=!S.ui.names;document.getElementById('tb-names').classList.toggle('on',S.ui.names);render()}
  else if(k==='x'){S.ui.snap=!S.ui.snap;document.getElementById('tb-snap').classList.toggle('on',S.ui.snap)}
  else if(k==='f')zoomFit();else if(k==='0')zoomReset();
  else if(k==='+'||k==='=')zoomBy(1.2);else if(k==='-')zoomBy(1/1.2);
  else if(k==='k')addKF();else if(k===' '){e.preventDefault();togglePlay()}
  else if(k==='home')goStart();else if(k==='end')goEnd();
  else if(k===',')stepFrame(-1);else if(k==='.')stepFrame(1);
  else if(k==='escape')deselect();
  else if(k==='delete'||k==='backspace'){e.preventDefault();if(S.selBones.length)deleteBone(S.selBones[0]);else if(S.selSlot)deleteSlot(S.selSlot)}
});

/* Zoom */
function zoomBy(f,cx,cy){if(cx===undefined){cx=S.vp.w/2;cy=S.vp.h/2}
  const ns=Math.max(0.04,Math.min(20,S.vp.scale*f));S.vp.x=cx-(cx-S.vp.x)*(ns/S.vp.scale);S.vp.y=cy-(cy-S.vp.y)*(ns/S.vp.scale);S.vp.scale=ns;render()}
function zoomFit(){const a=S.arm.aabb(),pad=60,sc=Math.min((S.vp.w-pad*2)/a.w,(S.vp.h-pad*2)/a.h,20);
  S.vp.scale=Math.max(.04,sc);S.vp.x=S.vp.w/2-(a.x+a.w/2)*S.vp.scale;S.vp.y=S.vp.h/2-(a.y+a.h/2)*S.vp.scale;render()}
function zoomReset(){S.vp.scale=1;S.vp.x=S.vp.w/2;S.vp.y=S.vp.h/2;render()}

function dupBones(){if(!S.selBones.length)return;const newIds=[];
  S.selBones.forEach(bid=>{const src=S.arm.bone(bid);if(!src)return;const b=new Bone(src.name+'_copy',src.parentId);
    Object.assign(b,{x:src.x+20,y:src.y+20,rot:src.rot,sx:src.sx,sy:src.sy,len:src.len});
    S.arm.bones.push(b);newIds.push(b.id)});
  S.selBones=newIds;saveH();renderLeft();render();toast('Duplicated')}

function showVpCtx(x,y){const wp=VP.c2w(_mouse.x,_mouse.y);
  showCtxAt(x,y,`<div class="ctx-item" data-a="add-root-here">⬡ New Root Bone Here</div>

function showCtxAt(x,y,html){
  const m=document.getElementById('ctx-menu');m.innerHTML=html;m.style.display='block';
  m.style.left=Math.min(x,window.innerWidth-200)+'px';m.style.top=Math.min(y,window.innerHeight-280)+'px';
  m.querySelectorAll('.ctx-item[data-a]').forEach(el=>el.addEventListener('click',()=>{handleCtxAct(el.dataset.a,el.dataset.id);closeCtxMenu()}));

function closeCtxMenu(){document.getElementById('ctx-menu').style.display='none'}
document.addEventListener('mousedown',e=>{if(!e.target.closest('#ctx-menu'))closeCtxMenu()});
document.addEventListener('touchstart',e=>{if(!e.target.closest('#ctx-menu'))closeCtxMenu()},{passive:true});
function handleCtxAct(act,id){const wp=VP.c2w(_mouse.x,_mouse.y);
  if(act==='rename-bone')promptRename('bone',id,S.arm.bone(id)?.name||'');
  else if(act==='del-bone')deleteBone(id);
  else if(act==='add-child'){const b=new Bone('bone_'+S.arm.bones.length,id);S.arm.bones.push(b);const sl=new Slot(b.name+'_slot',b.id);sl.z=S.arm.slots.length;S.arm.slots.push(sl);S.arm.skin.ensure(sl.id);S.selBones=[b.id];saveH();renderLeft();updateRight();render()}
  else if(act==='add-slot-for'){const sl=new Slot('slot_'+S.arm.slots.length,id);sl.z=S.arm.slots.length;S.arm.slots.push(sl);S.arm.skin.ensure(sl.id);S.selSlot=sl.id;S.selBones=[];saveH();renderLeft();updateRight()}
  else if(act==='add-kf-for'){const prev=S.selBones;S.selBones=[id];addKF();S.selBones=prev}
  else if(act==='dup-bone'){const prev=S.selBones;S.selBones=[id];dupBones();S.selBones=prev}
  else if(act==='add-root-here'){const b=new Bone('bone_'+S.arm.bones.length);b.x=VP.snap(wp.x);b.y=VP.snap(wp.y);S.arm.bones.push(b);const sl=new Slot(b.name+'_slot',b.id);sl.z=S.arm.slots.length;S.arm.slots.push(sl);S.arm.skin.ensure(sl.id);S.selBones=[b.id];saveH();renderLeft();updateRight();render()}
  else if(act==='import-imgs')importImages();
  else if(act==='zoom-fit')zoomFit();
  else if(act==='zoom-reset')zoomReset();
}

/* Modals */
function promptModal(title,label,def,cb){
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-title">${title}</div>
    <div class="modal-field"><label class="modal-label">${label}</label>
    <input class="modal-input" id="_mi" type="text" value="${(def||'').replace(/"/g,'&quot;')}"></div>
    <div class="modal-btns"><button class="modal-btn" id="_mc">Cancel</button><button class="modal-btn prim" id="_mo">OK</button></div></div>`;
  document.body.appendChild(ov);const inp=ov.querySelector('#_mi');inp.focus();inp.select();
  const done=v=>{ov.remove();cb(v)};
  ov.querySelector('#_mo').addEventListener('click',()=>done(inp.value));
  ov.querySelector('#_mc').addEventListener('click',()=>done(null));
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')done(inp.value);else if(e.key==='Escape')done(null)});

function pickModal(title,label,opts,cb){

  ov.querySelector('#_mc').addEventListener('click',()=>{ov.remove();cb(null)});
